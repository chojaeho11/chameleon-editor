<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Pretendard',sans-serif;background:linear-gradient(135deg,#ede9fe,#fae8ff,#fce7f3);color:#1e293b;min-height:100vh;}
.nav{background:#fff;border-bottom:1px solid #f1f5f9;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none;color:#1e293b;font-size:18px;font-weight:900;}
.nav-logo i{color:#a855f7;font-size:20px;}
.wrap{max-width:1000px;margin:0 auto;padding:30px 20px 60px;}
.hero{text-align:center;margin-bottom:28px;}
.hero h1{font-size:clamp(22px,4vw,32px);font-weight:900;letter-spacing:-1px;margin-bottom:8px;color:#581c87;}
.hero p{color:#64748b;font-size:14px;}

.stage{display:grid;grid-template-columns:320px 1fr;gap:24px;}
@media(max-width:720px){.stage{grid-template-columns:1fr;}}

.preview{background:#fff;border-radius:24px;padding:24px;box-shadow:0 12px 40px -10px rgba(168,85,247,0.25);border:1px solid #f3e8ff;position:sticky;top:80px;align-self:start;}
.preview-svg{width:100%;height:280px;display:block;}
.preview-name{text-align:center;font-weight:900;font-size:18px;margin-top:10px;color:#6d28d9;}
.preview-hint{text-align:center;font-size:11px;color:#94a3b8;margin-top:4px;}

.builder{background:#fff;border-radius:24px;padding:20px;box-shadow:0 8px 30px -8px rgba(0,0,0,0.08);}
.builder-tabs{display:flex;gap:4px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;}
.builder-tabs::-webkit-scrollbar{display:none;}
.b-tab{flex:0 0 auto;padding:10px 14px;border:none;background:#f5f3ff;color:#6d28d9;border-radius:12px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;}
.b-tab.active{background:linear-gradient(135deg,#a855f7,#ec4899);color:#fff;box-shadow:0 4px 12px -2px rgba(168,85,247,0.5);}

.parts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:10px;}
.part{aspect-ratio:1;border:2px solid transparent;border-radius:14px;background:#fafafa;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:0.15s;padding:4px;}
.part:hover{background:#f5f3ff;}
.part.active{border-color:#a855f7;background:#f5f3ff;box-shadow:0 4px 14px -4px rgba(168,85,247,0.45);}
.part svg{width:100%;height:100%;}

.color-row{display:flex;gap:8px;flex-wrap:wrap;}
.color-chip{width:36px;height:36px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:0.15s;}
.color-chip.active{border-color:#a855f7;transform:scale(1.1);}

.signup-form{background:#fff;border-radius:24px;padding:24px;margin-top:24px;box-shadow:0 8px 30px -8px rgba(0,0,0,0.08);}
.signup-form h2{font-size:18px;font-weight:900;margin-bottom:14px;color:#581c87;}
.field{margin-bottom:12px;}
.field label{display:block;font-size:12px;font-weight:700;color:#475569;margin-bottom:6px;}
.field input{width:100%;padding:12px 14px;border:1.5px solid #e2e8f0;border-radius:12px;font-size:14px;font-family:inherit;outline:none;transition:0.15s;}
.field input:focus{border-color:#a855f7;box-shadow:0 0 0 3px rgba(168,85,247,0.15);}
.btn-primary{width:100%;padding:14px;border:none;border-radius:14px;background:linear-gradient(135deg,#a855f7,#ec4899);color:#fff;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;margin-top:8px;transition:0.15s;box-shadow:0 8px 24px -6px rgba(168,85,247,0.5);}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 12px 30px -6px rgba(168,85,247,0.6);}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.msg{font-size:12px;padding:10px 12px;border-radius:10px;margin-top:10px;}
.msg.err{background:#fee2e2;color:#b91c1c;}
.msg.ok{background:#dcfce7;color:#166534;}
</style>

        <div id="msgBox"></div>
    </div>
</div>

            <!-- 볼터치 -->
            <circle cx="68" cy="145" r="8" fill="#fca5a5" opacity="0.5"/>
            <circle cx="132" cy="145" r="8" fill="#fca5a5" opacity="0.5"/>
        </g>
    `;
    (target||document.getElementById('avatarPreview')).innerHTML=svg;
}

// 미니 아바타 썸네일 (파츠 선택 칸용)
function miniAvatar(partKey, idx){
    const tmp={...A};tmp[partKey]=idx;
    const skin=SKIN_COLORS[tmp.skin],hairC=HAIR_COLORS[tmp.hairColor];
    return `<svg viewBox="0 0 200 240">
        <ellipse cx="100" cy="115" rx="54" ry="62" fill="${skin}"/>
        ${partKey==='hair'?PARTS.hair[idx].draw(hairC):PARTS.hair[A.hair].draw(hairC)}
        ${partKey==='brow'?PARTS.brow[idx].draw():PARTS.brow[A.brow].draw()}
        ${partKey==='eye'?PARTS.eye[idx].draw():PARTS.eye[A.eye].draw()}
        ${partKey==='glasses'?PARTS.glasses[idx].draw():PARTS.glasses[A.glasses].draw()}
        ${partKey==='mouth'?PARTS.mouth[idx].draw():PARTS.mouth[A.mouth].draw()}
        ${partKey==='face'?PARTS.face[idx].draw(skin):''}
        ${partKey==='outfit'?PARTS.outfit[idx].draw(A.outfitColor):''}
    </svg>`;
}

// 탭 정의
const TABS=[
    {k:'gender',i:'fa-venus-mars',label:L.gender,type:'choice',opts:['female','male']},
    {k:'face',i:'fa-circle',label:L.face,type:'parts',list:PARTS.face},
    {k:'skin',i:'fa-palette',label:L.skin,type:'colors',list:SKIN_COLORS},
    {k:'hair',i:'fa-scissors',label:L.hair,type:'parts',list:PARTS.hair,withColor:HAIR_COLORS,colorKey:'hairColor'},
    {k:'brow',i:'fa-arrow-up',label:L.brow,type:'parts',list:PARTS.brow},
    {k:'eye',i:'fa-eye',label:L.eye,type:'parts',list:PARTS.eye},
    {k:'glasses',i:'fa-glasses',label:L.glasses,type:'parts',list:PARTS.glasses},
    {k:'mouth',i:'fa-smile',label:L.mouth,type:'parts',list:PARTS.mouth},
    {k:'outfit',i:'fa-shirt',label:L.outfit,type:'parts',list:PARTS.outfit,withOutfitColor:true},
    {k:'bg',i:'fa-image',label:L.bg,type:'colors',list:BG_COLORS}
];
let currentTab=0;

function renderTabs(){
    document.getElementById('tabBar').innerHTML=TABS.map((t,i)=>
        `<button class="b-tab${i===currentTab?' active':''}" onclick="setTab(${i})"><i class="fa-solid ${t.i}"></i> ${t.label}</button>`
    ).join('');
    renderTabContent();
}
function renderTabContent(){
    const t=TABS[currentTab];
    const box=document.getElementById('tabContent');
    if(t.type==='choice'){
        box.innerHTML=`<div class="parts-grid">
            <div class="part${A.gender==='female'?' active':''}" onclick="A.gender='female';renderAvatar();renderTabContent();"><div style="font-size:40px;">👩</div></div>
            <div class="part${A.gender==='male'?' active':''}" onclick="A.gender='male';renderAvatar();renderTabContent();"><div style="font-size:40px;">👨</div></div>
        </div>`;
    } else if(t.type==='parts'){
        let html='<div class="parts-grid">';
        t.list.forEach((p,i)=>{
            html+=`<div class="part${A[t.k]===i?' active':''}" onclick="A.${t.k}=${i};renderAvatar();renderTabContent();">${miniAvatar(t.k,i)}</div>`;
        });
        html+='</div>';
        if(t.withColor){
            html+='<div style="margin-top:14px;font-size:11px;color:#64748b;font-weight:700;margin-bottom:8px;">머리 색상</div><div class="color-row">';
            t.withColor.forEach((c,i)=>{
                html+=`<div class="color-chip${A[t.colorKey]===i?' active':''}" style="background:${c}" onclick="A.${t.colorKey}=${i};renderAvatar();renderTabContent();"></div>`;
            });
            html+='</div>';
        }
        if(t.withOutfitColor){
            const outfitCs=['#a855f7','#ec4899','#ef4444','#f59e0b','#10b981','#3b82f6','#1e293b','#fff'];
            html+='<div style="margin-top:14px;font-size:11px;color:#64748b;font-weight:700;margin-bottom:8px;">옷 색상</div><div class="color-row">';
            outfitCs.forEach((c)=>{
                html+=`<div class="color-chip${A.outfitColor===c?' active':''}" style="background:${c};border:1.5px solid #e2e8f0;" onclick="A.outfitColor='${c}';renderAvatar();renderTabContent();"></div>`;
            });
            html+='</div>';
        }
        box.innerHTML=html;
    } else if(t.type==='colors'){
        box.innerHTML='<div class="color-row">'+t.list.map((c,i)=>
            `<div class="color-chip${A[t.k]===i?' active':''}" style="background:${c};border:1.5px solid #e2e8f0;" onclick="A.${t.k}=${i};renderAvatar();renderTabContent();"></div>`
        ).join('')+'</div>';
    }
}
window.setTab=function(i){currentTab=i;renderTabs();};

renderAvatar();
renderTabs();

// 별명 → 프리뷰 동기화
document.getElementById('inpNick').addEventListener('input',e=>{
    document.getElementById('previewName').textContent=e.target.value||L.noName;
});

// ========== 가입 처리 ==========
function showMsg(text,cls){
    document.getElementById('msgBox').innerHTML=`<div class="msg ${cls}">${text}</div>`;
}

async function signup(){
    const nick=document.getElementById('inpNick').value.trim();
    const phoneRaw=document.getElementById('inpPhone').value.trim();
    const pw=document.getElementById('inpPw').value;
    const pw2=document.getElementById('inpPw2').value;

    if(!nick){showMsg(L.errNick,'err');return;}
    const phone=phoneRaw.replace(/[^\d]/g,'');
    if(phone.length<9||phone.length>15){showMsg(L.errPhone,'err');return;}
    if(pw.length<6){showMsg(L.errPw,'err');return;}
    if(pw!==pw2){showMsg(L.errPwMatch,'err');return;}

    const btn=document.getElementById('btnSignup');
    btn.disabled=true;
    try{
        // 가상 이메일 생성 (Supabase Auth는 email 필수)
        const fakeEmail=`u${phone}@phone.chameleon.local`;
        const {data,error}=await sb.auth.signUp({email:fakeEmail,password:pw,options:{data:{phone,nickname:nick}}});
        if(error){
            const msg=error.message||'';
            if(msg.toLowerCase().includes('already')||msg.toLowerCase().includes('registered')){showMsg(L.errDup,'err');}
            else{showMsg(L.err+': '+msg,'err');}
            btn.disabled=false;return;
        }
        // 프로필 저장
        const uid=data.user?.id;
        if(uid){
            await sb.from('profiles').upsert({id:uid,username:nick,email:fakeEmail,avatar_json:A,site:(window.__SITE_CODE||'KR')});
        }
        showMsg(L.ok,'ok');
        setTimeout(()=>{const back=new URLSearchParams(location.search).get('back')||'/services';location.href=back;},1500);
    }catch(e){
        showMsg(L.err+': '+e.message,'err');
        btn.disabled=false;
    }
}
document.getElementById('btnSignup').addEventListener('click',signup);
</script>
