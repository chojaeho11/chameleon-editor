<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>자기 만들기 - Chameleon</title>
<script>
(function(){
    var p=new URLSearchParams(location.search),l=(p.get('lang')||'').toLowerCase(),h=location.hostname;
    if(l){if(l==='jp'||l==='ja')l='ja';else if(l==='en'||l==='us')l='en';else if(!['es','de','fr','zh'].includes(l))l='ko';}
    else if(h.includes('cafe0101'))l='ja';else if(h.includes('cafe3355')||h.includes('chameleon.design'))l='en';else l='ko';
    document.documentElement.lang=l;window.__LANG=l;
})();
</script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Pretendard',sans-serif;background:linear-gradient(135deg,#ede9fe,#fae8ff,#fce7f3);color:#1e293b;min-height:100vh;}
.nav{background:#fff;border-bottom:1px solid #f1f5f9;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none;color:#1e293b;font-size:18px;font-weight:900;}
.nav-logo i{color:#a855f7;font-size:20px;}
.wrap{max-width:960px;margin:0 auto;padding:30px 20px 60px;}
.hero{text-align:center;margin-bottom:22px;}
.hero h1{font-size:clamp(22px,4vw,32px);font-weight:900;letter-spacing:-1px;margin-bottom:8px;color:#581c87;}
.hero p{color:#64748b;font-size:14px;}

.selected-box{background:#fff;border-radius:24px;padding:20px;box-shadow:0 12px 40px -10px rgba(168,85,247,0.25);border:1.5px solid #f3e8ff;margin-bottom:20px;display:flex;align-items:center;gap:20px;}
.selected-img{width:110px;height:143px;border-radius:20px;background:#f5f3ff;background-size:cover;background-position:center;flex-shrink:0;border:3px solid #a855f7;box-shadow:0 6px 20px -4px rgba(168,85,247,0.4);}
.selected-empty{width:110px;height:143px;border-radius:20px;background:#f5f3ff;display:flex;align-items:center;justify-content:center;color:#c4b5fd;font-size:42px;flex-shrink:0;border:3px dashed #c4b5fd;}
.selected-text{flex:1;min-width:0;}
.selected-text .label{font-size:11px;color:#94a3b8;font-weight:700;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px;}
.selected-text .title{font-size:18px;font-weight:900;color:#581c87;line-height:1.3;}
.selected-text .sub{font-size:12px;color:#64748b;margin-top:4px;}

.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px;background:#fff;border-radius:24px;padding:16px;box-shadow:0 8px 30px -8px rgba(0,0,0,0.08);}
@media(max-width:640px){.gallery{grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;padding:12px;}}
.ava-item{position:relative;aspect-ratio:1/1.3;border-radius:14px;overflow:hidden;cursor:pointer;background:#f8fafc;border:3px solid transparent;transition:transform 0.18s,border-color 0.18s,box-shadow 0.18s;}
.ava-item img{width:100%;height:100%;object-fit:cover;display:block;}
.ava-item:hover{transform:translateY(-3px) scale(1.02);box-shadow:0 10px 24px -8px rgba(168,85,247,0.35);}
.ava-item.selected{border-color:#a855f7;transform:scale(1.04);box-shadow:0 10px 30px -6px rgba(168,85,247,0.55);}
.ava-item.selected::after{content:'✓';position:absolute;top:6px;right:6px;width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#a855f7,#ec4899);color:#fff;font-size:14px;font-weight:900;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 8px rgba(0,0,0,0.2);}

.signup-form{background:#fff;border-radius:24px;padding:24px;margin-top:20px;box-shadow:0 8px 30px -8px rgba(0,0,0,0.08);}
.signup-form h2{font-size:18px;font-weight:900;margin-bottom:14px;color:#581c87;}
.field{margin-bottom:12px;}
.field label{display:block;font-size:12px;font-weight:700;color:#475569;margin-bottom:6px;}
.field input{width:100%;padding:12px 14px;border:1.5px solid #e2e8f0;border-radius:12px;font-size:14px;font-family:inherit;outline:none;transition:0.15s;}
.field input:focus{border-color:#a855f7;box-shadow:0 0 0 3px rgba(168,85,247,0.15);}
.btn-primary{width:100%;padding:14px;border:none;border-radius:14px;background:linear-gradient(135deg,#a855f7,#ec4899);color:#fff;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;margin-top:8px;transition:0.15s;box-shadow:0 8px 24px -6px rgba(168,85,247,0.5);}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 12px 30px -6px rgba(168,85,247,0.6);}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.msg{font-size:13px;padding:10px 12px;border-radius:10px;margin-top:10px;}
.msg.err{background:#fee2e2;color:#b91c1c;}
.msg.ok{background:#dcfce7;color:#166534;}

.section-label{font-size:12px;font-weight:800;color:#7c3aed;margin:0 4px 10px;letter-spacing:0.3px;}
</style>
</head>
<body>
<nav class="nav">
    <a class="nav-logo" href="/services"><i class="fa-solid fa-palette"></i> Chameleon</a>
    <a href="/services" style="font-size:12px;color:#64748b;text-decoration:none;">← <span id="backTxt">돌아가기</span></a>
</nav>

<div class="wrap">
    <div class="hero">
        <h1 id="heroTitle">🎨 자기 만들기</h1>
        <p id="heroSub">마음에 드는 아바타를 골라주세요</p>
    </div>

    <div class="selected-box">
        <div id="selectedImg" class="selected-empty">?</div>
        <div class="selected-text">
            <div class="label" id="selLabel">선택된 아바타</div>
            <div class="title" id="selTitle">아래에서 골라보세요 👇</div>
            <div class="sub" id="selSub">마음에 드는 걸 탭하면 여기에 나타나요</div>
        </div>
    </div>

    <div class="section-label" id="galleryLabel">✨ 아바타 갤러리</div>
    <div class="gallery" id="gallery"></div>

    <div class="signup-form" id="signupForm" style="visibility:hidden;">
        <h2 id="signupTitle">📱 가입 정보</h2>
        <div class="field">
            <label id="lblNick">별명</label>
            <input type="text" id="inpNick" placeholder="예: 초록이" maxlength="20">
        </div>
        <div class="field">
            <label id="lblPhone">전화번호</label>
            <div style="display:flex;gap:8px;">
                <select id="selCC" style="width:130px;padding:12px 8px;border:1.5px solid #e2e8f0;border-radius:12px;font-size:13px;font-family:inherit;background:#fff;outline:none;">
                    <option value="+82">🇰🇷 +82</option>
                    <option value="+81">🇯🇵 +81</option>
                    <option value="+1">🇺🇸 +1</option>
                    <option value="+86">🇨🇳 +86</option>
                    <option value="+212">🇲🇦 +212</option>
                    <option value="+966">🇸🇦 +966</option>
                    <option value="+971">🇦🇪 +971</option>
                    <option value="+44">🇬🇧 +44</option>
                    <option value="+49">🇩🇪 +49</option>
                    <option value="+33">🇫🇷 +33</option>
                    <option value="+34">🇪🇸 +34</option>
                    <option value="+39">🇮🇹 +39</option>
                    <option value="+65">🇸🇬 +65</option>
                    <option value="+60">🇲🇾 +60</option>
                    <option value="+66">🇹🇭 +66</option>
                    <option value="+84">🇻🇳 +84</option>
                    <option value="+91">🇮🇳 +91</option>
                    <option value="+61">🇦🇺 +61</option>
                    <option value="+55">🇧🇷 +55</option>
                    <option value="+52">🇲🇽 +52</option>
                </select>
                <input type="tel" id="inpPhone" placeholder="10-1234-5678" style="flex:1;">
            </div>
        </div>
        <div class="field">
            <label id="lblPw">비밀번호 (6자 이상)</label>
            <input type="password" id="inpPw" placeholder="••••••">
        </div>
        <div class="field">
            <label id="lblPw2">비밀번호 확인</label>
            <input type="password" id="inpPw2" placeholder="••••••">
        </div>
        <button class="btn-primary" id="btnSignup"><span id="btnSignupTxt">🎉 아바타로 가입하기</span></button>
        <div id="msgBox"></div>
    </div>
</div>

<script>
const SB_URL='https://qinvtnhiidtmrzosyvys.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFpbnZ0bmhpaWR0bXJ6b3N5dnlzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjMyMDE3NjQsImV4cCI6MjA3ODc3Nzc2NH0.3z0f7R4w3bqXTOMTi19ksKSeAkx8HOOTONNSos8Xz8Y';
const sb=supabase.createClient(SB_URL,SB_KEY);
const LANG=(window.__LANG||'ko');

const T={
    ko:{title:'🎨 자기 만들기',sub:'마음에 드는 아바타를 골라주세요',back:'돌아가기',sTitle:'📱 가입 정보',nick:'별명',phone:'전화번호',pw:'비밀번호 (6자 이상)',pw2:'비밀번호 확인',btn:'🎉 아바타로 가입하기',gallery:'✨ 아바타 갤러리',selLabel:'선택된 아바타',selTitle:'아래에서 골라보세요 👇',selSub:'마음에 드는 걸 탭하면 여기에 나타나요',chosen:'좋은 선택이에요!',errNick:'별명을 입력하세요',errPhone:'전화번호 형식이 올바르지 않습니다',errPw:'비밀번호는 6자 이상',errPwMatch:'비밀번호가 일치하지 않습니다',errPick:'먼저 아바타를 골라주세요',ok:'가입 완료! 돌아갑니다...',errDup:'이미 가입된 전화번호입니다',err:'가입 실패'},
    ja:{title:'🎨 アバター選び',sub:'お気に入りのアバターを選んでください',back:'戻る',sTitle:'📱 登録情報',nick:'ニックネーム',phone:'電話番号',pw:'パスワード (6文字以上)',pw2:'パスワード確認',btn:'🎉 アバターで登録',gallery:'✨ アバターギャラリー',selLabel:'選択中',selTitle:'下から選んでください 👇',selSub:'タップすると上に表示されます',chosen:'素敵な選択！',errNick:'ニックネームを入力',errPhone:'電話番号の形式が正しくありません',errPw:'パスワードは6文字以上',errPwMatch:'パスワードが一致しません',errPick:'まずアバターを選んでください',ok:'登録完了！戻ります...',errDup:'この電話番号は既に登録済みです',err:'登録失敗'},
    en:{title:'🎨 Choose Your Avatar',sub:'Pick the avatar you like',back:'Back',sTitle:'📱 Signup Info',nick:'Nickname',phone:'Phone',pw:'Password (6+ chars)',pw2:'Confirm Password',btn:'🎉 Sign up with Avatar',gallery:'✨ Avatar Gallery',selLabel:'Selected',selTitle:'Pick one below 👇',selSub:'Tap the one you like',chosen:'Great choice!',errNick:'Enter a nickname',errPhone:'Invalid phone format',errPw:'Password must be 6+ chars',errPwMatch:'Passwords do not match',errPick:'Please pick an avatar first',ok:'Signed up! Going back...',errDup:'This phone is already registered',err:'Signup failed'}
};
const L=T[LANG]||T.en;
document.getElementById('heroTitle').textContent=L.title;
document.getElementById('heroSub').textContent=L.sub;
document.getElementById('backTxt').textContent=L.back;
document.getElementById('signupTitle').textContent=L.sTitle;
document.getElementById('lblNick').textContent=L.nick;
document.getElementById('lblPhone').textContent=L.phone;
document.getElementById('lblPw').textContent=L.pw;
document.getElementById('lblPw2').textContent=L.pw2;
document.getElementById('btnSignupTxt').textContent=L.btn;
document.getElementById('galleryLabel').textContent=L.gallery;
document.getElementById('selLabel').textContent=L.selLabel;
document.getElementById('selTitle').textContent=L.selTitle;
document.getElementById('selSub').textContent=L.selSub;

// ==== 아바타 이미지 리스트 (avatar/ 폴더) ====
const AVATARS=[
    '101a2d9a69f59713891a80e23e61173c.jpg',
    '2023d1ae2edba00099fd4ea53e744449.jpg',
    '5ee40b298c2e2c75f17f65e47eb6a6d9.jpg',
    '635751971ad3dd62bbabd006eab2ea49.jpg',
    '6f2d04514b92c5159c14605d3bd29a9e.jpg',
    '8617191b8f92cdd8b519a84ccccccdfa.jpg',
    '883b16583c399ac242c5047e5401ee3c.jpg',
    '8b8a7125e1f9cc9eab12a17a8187bd24.jpg',
    '8cd60a33bb4bcc3db388dc8c9a5cb7e9.jpg',
    '95f910960caee7e6b648764ea059c917.jpg',
    '9a76bd948f5be2795127325a63f332f6.jpg',
    '9dff1a69628fed4e402943f3991fe9a1.jpg',
    'b239ebec83760ee3a6d82828a39f50d9.jpg',
    'd4c96364c929488f96a6bc008fbdd7e3.jpg',
    'd65994b43d4e223c5fa0495f084c7385.jpg',
    'd9f7509e9d7ae342d05fc65adc57ac74.jpg',
    'e1def68bb6012e5cd8842acc1bcc3614.jpg',
    'e3c00131ff552529c6ba8cd2df24ae41.jpg'
].map(f=>'/avatar/'+f);

let selectedIdx=null;

function renderGallery(){
    const box=document.getElementById('gallery');
    box.innerHTML=AVATARS.map((url,i)=>
        `<div class="ava-item${selectedIdx===i?' selected':''}" onclick="pickAvatar(${i})"><img src="${url}" alt="avatar ${i+1}" loading="lazy"></div>`
    ).join('');
}

window.pickAvatar=function(i){
    selectedIdx=i;
    const el=document.getElementById('selectedImg');
    el.className='selected-img';
    el.style.backgroundImage=`url('${AVATARS[i]}')`;
    el.textContent='';
    document.getElementById('selTitle').textContent=(document.getElementById('inpNick').value||'').trim()||L.chosen;
    document.getElementById('selSub').textContent='#'+(i+1);
    renderGallery();
};

document.getElementById('inpNick').addEventListener('input',e=>{
    if(selectedIdx!==null){
        document.getElementById('selTitle').textContent=e.target.value.trim()||L.chosen;
    }
});

renderGallery();

function showMsg(text,cls){
    document.getElementById('msgBox').innerHTML=`<div class="msg ${cls}">${text}</div>`;
}

// 사이트 기본 국가 코드 자동 선택
const HOST=location.hostname;
const DEFAULT_CC=HOST.includes('cafe0101')?'+81':HOST.includes('cafe3355')||HOST.includes('chameleon.design')?'+1':'+82';
document.getElementById('selCC').value=DEFAULT_CC;

// 로그인 상태 확인 — 기존 고객이면 가입폼 숨기고 아바타 저장만
let EXISTING_USER=null;
(async()=>{
    const form=document.getElementById('signupForm');
    try{
        const {data:{user}}=await sb.auth.getUser();
        if(user){
            EXISTING_USER=user;
            const {data:prof}=await sb.from('profiles').select('avatar_url,username').eq('id',user.id).maybeSingle();
            if(prof?.avatar_url){
                const i=AVATARS.indexOf(prof.avatar_url);
                if(i>=0) window.pickAvatar(i);
            }
            form.innerHTML=`<h2>🎨 ${L.selLabel}</h2>
                <p style="font-size:13px;color:#64748b;margin-bottom:14px;">${prof?.username?prof.username+' 님':''} — 원하는 아바타를 골라 저장하세요.</p>
                <button class="btn-primary" id="btnSave">💾 ${LANG==='ja'?'アバターを保存':LANG==='en'?'Save Avatar':'아바타 저장'}</button>
                <div id="msgBox"></div>`;
            document.getElementById('btnSave').addEventListener('click',async()=>{
                if(selectedIdx===null){showMsg(L.errPick,'err');return;}
                const btn=document.getElementById('btnSave');btn.disabled=true;
                const {error}=await sb.from('profiles').update({avatar_url:AVATARS[selectedIdx]}).eq('id',user.id);
                if(error){showMsg(L.err+': '+error.message,'err');btn.disabled=false;return;}
                showMsg(L.ok,'ok');
                setTimeout(()=>{const back=new URLSearchParams(location.search).get('back')||'/services';location.href=back;},1200);
            });
        }
    }catch(e){console.warn(e);}
    form.style.visibility='visible';
})();

async function signup(){
    if(selectedIdx===null){showMsg(L.errPick,'err');return;}
    const nick=document.getElementById('inpNick').value.trim();
    const cc=document.getElementById('selCC').value;
    const phoneRaw=document.getElementById('inpPhone').value.trim();
    const pw=document.getElementById('inpPw').value;
    const pw2=document.getElementById('inpPw2').value;

    if(!nick){showMsg(L.errNick,'err');return;}
    const phoneDigits=phoneRaw.replace(/[^\d]/g,'').replace(/^0+/,'');
    if(phoneDigits.length<7||phoneDigits.length>14){showMsg(L.errPhone,'err');return;}
    const fullPhone=cc+phoneDigits;
    if(pw.length<6){showMsg(L.errPw,'err');return;}
    if(pw!==pw2){showMsg(L.errPwMatch,'err');return;}

    const btn=document.getElementById('btnSignup');
    btn.disabled=true;
    try{
        const fakeEmail=`u${fullPhone.replace(/\+/g,'')}@phone.chameleon.local`;
        const {data,error}=await sb.auth.signUp({email:fakeEmail,password:pw,options:{data:{phone:fullPhone,nickname:nick,avatar_url:AVATARS[selectedIdx]}}});
        if(error){
            const msg=error.message||'';
            if(msg.toLowerCase().includes('already')||msg.toLowerCase().includes('registered')){showMsg(L.errDup,'err');}
            else{showMsg(L.err+': '+msg,'err');}
            btn.disabled=false;return;
        }
        const uid=data.user?.id;
        if(uid){
            await sb.from('profiles').upsert({id:uid,username:nick,email:fakeEmail,avatar_url:AVATARS[selectedIdx],site:(window.__SITE_CODE||'KR')});
        }
        showMsg(L.ok,'ok');
        setTimeout(()=>{const back=new URLSearchParams(location.search).get('back')||'/services';location.href=back;},1500);
    }catch(e){
        showMsg(L.err+': '+e.message,'err');
        btn.disabled=false;
    }
}
document.getElementById('btnSignup').addEventListener('click',signup);
</script>
</body>
</html>
