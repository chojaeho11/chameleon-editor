.tab-btn.active{background:#ec4899;color:#fff;border-color:#ec4899;}

.filters select{padding:8px 12px;border:1px solid #d1d5db;border-radius:10px;font-size:13px;font-family:inherit;background:#fff;}

.profile-actions{display:flex;gap:8px;}

.btn-like{background:linear-gradient(135deg,#ec4899,#db2777);color:#fff;}.btn-like:hover{opacity:0.9;}

.btn-report:hover{color:#ef4444;}

.match-popup{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:200;align-items:center;justify-content:center;}

.form-group{margin-bottom:14px;}

async function checkAuth(){
    const{data:{session}}=await sb.auth.getSession();
    if(session){currentUser=session.user;document.getElementById('authLoggedOut').style.display='none';document.getElementById('authLoggedIn').style.display='block';document.getElementById('userEmail').textContent=session.user.email;document.getElementById('profileForm').classList.remove('disabled');loadMyProfile();}
    else{currentUser=null;document.getElementById('authLoggedOut').style.display='block';document.getElementById('authLoggedIn').style.display='none';document.getElementById('profileForm').classList.add('disabled');}
}
async function doLogin(){const e=document.getElementById('authEmail').value.trim(),p=document.getElementById('authPw').value;const{error}=await sb.auth.signInWithPassword({email:e,password:p});if(error){document.getElementById('authError').textContent=error.message;document.getElementById('authError').style.display='block';return;}document.getElementById('authError').style.display='none';checkAuth();}
async function doSignup(){const e=document.getElementById('authEmail').value.trim(),p=document.getElementById('authPw').value;const{error}=await sb.auth.signUp({email:e,password:p});if(error){document.getElementById('authError').textContent=error.message;document.getElementById('authError').style.display='block';return;}document.getElementById('authError').style.display='none';toast(t('signup')+' OK!');checkAuth();}
async function doLogout(){await sb.auth.signOut();currentUser=null;checkAuth();}

function switchTab(tab){document.getElementById('browseTab').style.display=tab==='browse'?'block':'none';document.getElementById('profileTab').style.display=tab==='profile'?'block':'none';document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===(tab==='browse'?0:1)));}

function addInterest(){
    const inp=document.getElementById('fInterestInput');
    const val=inp.value.trim();
    if(val&&!myInterests.includes(val)){myInterests.push(val);renderInterests();}
    inp.value='';
}
function removeInterest(i){myInterests.splice(i,1);renderInterests();}
function renderInterests(){
    document.getElementById('myInterests').innerHTML=myInterests.map((t,i)=>`<span class="my-interest" onclick="removeInterest(${i})">${esc(t)} &times;</span>`).join('');
}

async function loadMyProfile(){
    if(!currentUser)return;
    const{data}=await sb.from('community_dating_profiles').select('*').eq('user_id',currentUser.id).maybeSingle();
    if(data){
        document.getElementById('fName').value=data.display_name||'';
        document.getElementById('fAge').value=data.age||'';
        document.getElementById('fGender').value=data.gender||'male';
        document.getElementById('fLooking').value=data.looking_for||'both';
        document.getElementById('fBio').value=data.bio||'';
        document.getElementById('fCity').value=data.city||'';
        document.getElementById('fAgeMin').value=data.age_min||18;
        document.getElementById('fAgeMax').value=data.age_max||99;
        myInterests=Array.isArray(data.interests)?data.interests:[];
        renderInterests();
    }
}

async function loadProfiles(){
    const gender=document.getElementById('filterGender').value;
    const looking=document.getElementById('filterLooking').value;
    const city=document.getElementById('filterCity').value;
    let q=sb.from('community_dating_profiles').select('*').eq('is_active',true).order('last_active',{ascending:false}).limit(50);
    if(gender)q=q.eq('gender',gender);
    if(looking)q=q.eq('looking_for',looking);
    if(city)q=q.eq('city',city);
    if(currentUser)q=q.neq('user_id',currentUser.id);
    const{data,error}=await q;
    const grid=document.getElementById('profileGrid');
    if(error||!data||data.length===0){grid.innerHTML=`<div class="empty"><i class="fa-solid fa-heart-crack"></i>${t('empty')}</div>`;return;}
    grid.innerHTML=data.map(p=>{
        const interests=Array.isArray(p.interests)?p.interests:[];
        return `
        <div class="profile-card">
            <button class="btn-report" onclick="toast('${t('report')}')">${t('report')}</button>
            <div class="profile-photo">${(Array.isArray(p.photos)&&p.photos.length>0)?`<img src="${p.photos[0]}" style="width:100%;height:100%;object-fit:cover;" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><i class="fa-solid fa-user" style="display:none;font-size:72px;color:#f9a8d4;"></i>`:`<i class="fa-solid fa-user"></i>`}</div>
            <div class="profile-body">
                <h3>${esc(p.display_name)}</h3>
                <div class="age-gender">${p.age||'?'} ${t('yearsOld')} &middot; ${genderLabel(p.gender)} &middot; ${lookingLabel(p.looking_for)}</div>
                ${p.bio?`<div class="bio">${esc(p.bio)}</div>`:''}
                <div class="interest-tags">${interests.slice(0,5).map(i=>`<span class="interest-tag">${esc(i)}</span>`).join('')}</div>
                <div style="font-size:11px;color:#94a3b8;margin-bottom:8px;"><i class="fa-solid fa-location-dot"></i> ${esc(p.city||'')}</div>
                <div class="profile-actions">
                    <button class="btn-pass" onclick="doPass('${p.user_id}')"><i class="fa-solid fa-xmark"></i> ${t('pass')}</button>
                    <button class="btn-like" onclick="doLike('${p.user_id}')"><i class="fa-solid fa-heart"></i> ${t('like')}</button>
                </div>
            </div>
        </div>`;
    }).join('');
    // cities
    const cities=[...new Set(data.map(p=>p.city).filter(Boolean))];
    const cf=document.getElementById('filterCity');
    const cv=cf.value;
    cf.innerHTML=`<option value="">${t('allCities')}</option>`+cities.map(c=>`<option value="${esc(c)}"${c===cv?' selected':''}>${esc(c)}</option>`).join('');
}

async function saveProfile(){
    if(!currentUser){toast(t('loginFirst'));return;}
    const name=document.getElementById('fName').value.trim();
    if(!name){toast(t('name')+' required');return;}
    const row={
        user_id:currentUser.id,
        display_name:name,
        age:parseInt(document.getElementById('fAge').value)||null,
        gender:document.getElementById('fGender').value,
        bio:document.getElementById('fBio').value.trim()||null,
        interests:myInterests,
        city:document.getElementById('fCity').value.trim()||null,
        country:LANG==='ja'?'JP':LANG==='en'?'US':'KR',
        looking_for:document.getElementById('fLooking').value,
        age_min:parseInt(document.getElementById('fAgeMin').value)||18,
        age_max:parseInt(document.getElementById('fAgeMax').value)||99,
        last_active:new Date().toISOString()
    };
    const{error}=await sb.from('community_dating_profiles').upsert(row,{onConflict:'user_id'});
    if(error){toast(error.message);return;}
    toast(t('saved'));
}

async function doLike(toUser){
    if(!currentUser){toast(t('loginFirst'));return;}
    const{error}=await sb.from('community_dating_likes').upsert({from_user:currentUser.id,to_user:toUser,is_like:true},{onConflict:'from_user,to_user'});
    if(error){toast(error.message);return;}
    toast(t('liked'));
    // Check for mutual like
    const{data}=await sb.from('community_dating_likes').select('id').eq('from_user',toUser).eq('to_user',currentUser.id).eq('is_like',true).maybeSingle();
    if(data){document.getElementById('matchPopup').classList.add('show');}
}
async function doPass(toUser){
    if(!currentUser){toast(t('loginFirst'));return;}
    await sb.from('community_dating_likes').upsert({from_user:currentUser.id,to_user:toUser,is_like:false},{onConflict:'from_user,to_user'});
    toast(t('passed'));
}
function closeMatch(){document.getElementById('matchPopup').classList.remove('show');}

function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2500);}

renderI18n();checkAuth();loadProfiles();
</script>
<script src="/avatar-render.js?v=1"></script>
<script src="/community-nav.js?v=2" defer></script>
</body>
