<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>관리자 — 디자인 템플릿</title>
<meta name="robots" content="noindex,nofollow">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root { --brand:#7c3aed; --brand-dark:#5b21b6; --gray-50:#f8fafc; --gray-100:#f1f5f9; --gray-200:#e2e8f0; --gray-300:#cbd5e1; --gray-500:#64748b; --gray-700:#334155; --gray-900:#0f172a; --red:#dc2626; --green:#16a34a; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Noto Sans KR',sans-serif; background:var(--gray-50); color:var(--gray-900); }
header { background:var(--gray-900); color:#fff; padding:14px 22px; display:flex; align-items:center; gap:16px; }
header h1 { font-size:18px; font-weight:900; flex:1; }
header .meta { font-size:11.5px; color:#94a3b8; }
.container { max-width:1200px; margin:18px auto; padding:0 18px; }
.panel { background:#fff; border-radius:14px; box-shadow:0 1px 3px rgba(15,23,42,0.06); padding:18px; }
.panel h2 { font-size:14px; font-weight:900; color:var(--brand-dark); margin-bottom:12px; display:flex; align-items:center; gap:8px; }
.btn { display:inline-flex; align-items:center; gap:6px; padding:9px 14px; border:none; border-radius:8px; font-family:inherit; font-size:13px; font-weight:700; cursor:pointer; background:var(--brand); color:#fff; transition:filter .15s; }
.btn:hover { filter:brightness(1.1); }
.btn:disabled { opacity:0.5; cursor:not-allowed; }
.btn-secondary { background:var(--gray-200); color:var(--gray-700); }
.btn-danger { background:var(--red); }
.btn-success { background:var(--green); }
.btn-sm { padding:6px 10px; font-size:11.5px; }
.field { margin-bottom:14px; }
.field label { display:block; font-size:11.5px; font-weight:800; color:var(--gray-700); margin-bottom:6px; letter-spacing:.02em; }
.field input, .field select { width:100%; padding:9px 11px; border:1.5px solid var(--gray-200); border-radius:8px; font-size:13px; font-family:inherit; }
.field input:focus, .field select:focus { outline:none; border-color:var(--brand); }

.toolbar { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:16px; }
.toolbar .field { margin-bottom:0; flex:1; min-width:240px; }

.tpl-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(220px, 1fr)); gap:14px; }
.tpl-card { background:#fff; border:1.5px solid var(--gray-200); border-radius:12px; overflow:hidden; display:flex; flex-direction:column; transition:border-color .15s, box-shadow .15s; }
.tpl-card:hover { border-color:var(--brand); box-shadow:0 4px 14px rgba(124,58,237,0.15); }
.tpl-card .thumb { aspect-ratio:5/3; background:var(--gray-100); display:flex; align-items:center; justify-content:center; overflow:hidden; }
.tpl-card .thumb img { width:100%; height:100%; object-fit:contain; }
.tpl-card .body { padding:12px 14px; flex:1; display:flex; flex-direction:column; gap:6px; }
.tpl-card .name { font-size:13.5px; font-weight:900; color:var(--gray-900); }
.tpl-card .meta { font-size:11px; color:var(--gray-500); line-height:1.5; }
.tpl-card .footer { padding:10px 12px; border-top:1px solid var(--gray-100); display:flex; gap:8px; }
.tpl-card .footer .btn { flex:1; justify-content:center; }
.tpl-empty { padding:60px 20px; text-align:center; color:var(--gray-500); font-size:13px; }
.tpl-empty i { font-size:42px; opacity:0.3; display:block; margin-bottom:10px; }

.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); padding:12px 22px; background:var(--gray-900); color:#fff; border-radius:24px; font-size:13px; font-weight:700; z-index:99999; box-shadow:0 10px 30px rgba(15,23,42,0.3); }
@keyframes pulse { 0%,100% { transform:scale(1); } 50% { transform:scale(1.06); } }
</style>
</head>
<body>
<header>
    <h1><i class="fa-solid fa-palette"></i> 디자인 템플릿 관리</h1>
    <span class="meta" id="hdrUser">-</span>
    <a href="/global_admin.html" class="btn btn-secondary" style="background:#475569; color:#fff;"><i class="fa-solid fa-arrow-left"></i> 관리자 메인</a>
</header>

<div class="container">
    <div class="panel" style="margin-bottom:16px;">
        <div style="background:#f3f0ff; border-left:4px solid var(--brand); padding:12px 14px; border-radius:8px; margin-bottom:14px;">
            <div style="font-size:13px; font-weight:800; color:var(--brand-dark); margin-bottom:4px;">
                <i class="fa-solid fa-circle-info"></i> 템플릿 등록 안내
            </div>
            <div style="font-size:12px; color:var(--gray-700); line-height:1.55;">
                새 템플릿은 <b>상품 페이지의 미니에디터</b> 에서 자유롭게 디자인 후 등록합니다.<br>
                관리자 계정으로 로그인 → 상품 페이지 진입 → 디자인 → <b>「💾 템플릿으로 저장」</b> 버튼.<br>
                이 페이지에서는 등록된 템플릿을 <b>확인 / 삭제</b> 만 가능합니다.
            </div>
        </div>
        <div class="toolbar">
            <div class="field">
                <label>상품 카테고리 필터 <span style="color:var(--gray-500); font-weight:600;">(DB 실시간 로드)</span></label>
                <select id="filterCategory" onchange="onCategoryChange()">
                    <option value="">로딩 중...</option>
                </select>
            </div>
            <div class="field" id="customCategoryField" style="display:none;">
                <label>커스텀 카테고리</label>
                <input type="text" id="customCategory" placeholder="예: pp_st_a4" oninput="loadTemplates()">
            </div>
            <button id="btnReviewPending" class="btn" style="background:#ef4444; align-self:end; height:38px;" onclick="openPendingReview()">
                <i class="fa-solid fa-gavel"></i> 디자이너 검토 대기
                <span id="pendingBadge" style="background:#fff; color:#ef4444; border-radius:980px; padding:1px 7px; margin-left:4px; font-size:11px; font-weight:900;">0</span>
            </button>
        </div>
    </div>

    <div class="panel">
        <h2 style="margin-bottom:14px;"><i class="fa-solid fa-list"></i> 등록된 템플릿 <span id="tplCount" style="font-size:12px; color:var(--gray-500); font-weight:600; margin-left:6px;"></span></h2>
        <div id="tplGrid" class="tpl-grid">
            <div class="tpl-empty"><i class="fa-solid fa-image"></i>카테고리를 선택하세요</div>
        </div>
    </div>
</div>

<script>
const SB_URL = 'https://qinvtnhiidtmrzosyvys.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFpbnZ0bmhpaWR0bXJ6b3N5dnlzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjMyMDE3NjQsImV4cCI6MjA3ODc3Nzc2NH0.3z0f7R4w3bqXTOMTi19ksKSeAkx8HOOTONNSos8Xz8Y';
const sb = window.supabase.createClient(SB_URL, SB_KEY, {
    auth: { persistSession:true, storage:localStorage, storageKey:'sb-qinvtnhiidtmrzosyvys-auth-token' }
});

let state = { user: null };

function toast(msg, ms=2200) {
    const t = document.createElement('div');
    t.className = 'toast'; t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), ms);
}
function escapeHtml(s) { return (s||'').replace(/[<>&"']/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c])); }

(async function init() {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) {
        toast('로그인이 필요합니다. 메인 사이트에서 로그인 후 다시 접속해주세요.', 4000);
        setTimeout(() => location.href = '/', 2000);
        return;
    }
    state.user = session.user;
    const { data: prof } = await sb.from('profiles').select('username,role').eq('id', session.user.id).maybeSingle();
    if (!prof || prof.role !== 'admin') {
        toast('관리자만 접근 가능합니다.', 4000);
        setTimeout(() => location.href = '/', 2500);
        return;
    }
    document.getElementById('hdrUser').textContent = `${prof.username || session.user.email} (admin)`;
    await loadCategories();
    loadTemplates();
    refreshPendingBadge();
})();

async function loadCategories() {
    try {
        const { data, error } = await sb.from('admin_templates')
            .select('product_category')
            .eq('status', 'approved')
            .order('product_category');
        if (error) throw error;
        const cats = [...new Set((data || []).map(r => r.product_category).filter(Boolean))];
        const sel = document.getElementById('filterCategory');
        sel.innerHTML = '<option value="">전체</option>'
            + cats.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('')
            + '<option value="OTHER">직접 입력</option>';
    } catch(e) {
        console.warn('[loadCategories]', e);
        toast('카테고리 로드 실패');
    }
}

function onCategoryChange() {
    const v = document.getElementById('filterCategory').value;
    document.getElementById('customCategoryField').style.display = v === 'OTHER' ? '' : 'none';
    loadTemplates();
}

function getCategory() {
    const sel = document.getElementById('filterCategory').value;
    if (sel === 'OTHER') return (document.getElementById('customCategory').value || '').trim();
    return sel;
}

async function loadTemplates() {
    const grid = document.getElementById('tplGrid');
    const countEl = document.getElementById('tplCount');
    grid.innerHTML = '<div class="tpl-empty"><i class="fa-solid fa-spinner fa-spin"></i>불러오는 중...</div>';
    try {
        const cat = getCategory();
        let q = sb.from('admin_templates').select('*').eq('status', 'approved').order('id', { ascending: false });
        if (cat) q = q.eq('product_category', cat);
        const { data, error } = await q;
        if (error) throw error;
        if (!data || !data.length) {
            grid.innerHTML = '<div class="tpl-empty"><i class="fa-solid fa-folder-open"></i>등록된 템플릿이 없습니다.</div>';
            countEl.textContent = '';
            return;
        }
        countEl.textContent = `(${data.length}개)`;
        grid.innerHTML = data.map(t => {
            const thumb = t.thumbnail_url || t.background_url || '';
            const meta = [
                t.product_category || '?',
                t.product_code ? `<span style="color:var(--brand);">${escapeHtml(t.product_code)}</span>` : null,
                (t.width_mm && t.height_mm) ? `${t.width_mm}×${t.height_mm}mm` : null,
                `슬롯 ${(t.slots||[]).length}개`,
                t.site_code || null
            ].filter(Boolean).join(' · ');
            return `
                <div class="tpl-card" data-id="${t.id}">
                    <div class="thumb">${thumb ? `<img src="${escapeHtml(thumb)}" alt="">` : '<i class="fa-solid fa-image" style="font-size:32px; color:var(--gray-300);"></i>'}</div>
                    <div class="body">
                        <div class="name">${escapeHtml(t.name || '(이름 없음)')}</div>
                        <div class="meta">${meta}</div>
                    </div>
                    <div class="footer">
                        ${thumb ? `<a href="${escapeHtml(thumb)}" target="_blank" class="btn btn-secondary btn-sm"><i class="fa-solid fa-up-right-from-square"></i> 원본</a>` : ''}
                        <button class="btn btn-danger btn-sm" onclick="deleteTemplate(${t.id}, this)"><i class="fa-solid fa-trash"></i> 삭제</button>
                    </div>
                </div>`;
        }).join('');
    } catch(e) {
        console.error('[loadTemplates]', e);
        grid.innerHTML = `<div class="tpl-empty" style="color:var(--red);">불러오기 실패: ${escapeHtml(e.message || String(e))}</div>`;
        countEl.textContent = '';
    }
}

async function deleteTemplate(id, btn) {
    if (!confirm('정말 삭제할까요?\n\n이 템플릿은 고객 페이지에서 즉시 사라집니다.')) return;
    if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 삭제 중...'; }
    try {
        const { error } = await sb.from('admin_templates').delete().eq('id', id);
        if (error) throw error;
        toast('✅ 삭제되었습니다.');
        const card = document.querySelector(`.tpl-card[data-id="${id}"]`);
        if (card) card.remove();
        // 카운트 갱신
        const remaining = document.querySelectorAll('.tpl-card').length;
        document.getElementById('tplCount').textContent = remaining ? `(${remaining}개)` : '';
        if (!remaining) {
            document.getElementById('tplGrid').innerHTML = '<div class="tpl-empty"><i class="fa-solid fa-folder-open"></i>등록된 템플릿이 없습니다.</div>';
        }
    } catch(e) {
        console.error('[deleteTemplate]', e);
        alert('삭제 실패: ' + (e.message || e));
        if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-trash"></i> 삭제'; }
    }
}

// ────────────────────── 디자이너 검토 큐 (별개 흐름) ──────────────────────
async function refreshPendingBadge() {
    try {
        const { count, error } = await sb.from('admin_templates')
            .select('id', { count: 'exact', head: true })
            .eq('status', 'pending');
        if (error) return;
        const badge = document.getElementById('pendingBadge');
        if (badge) {
            badge.textContent = count || 0;
            if (count > 0) {
                document.getElementById('btnReviewPending').style.animation = 'pulse 1.5s infinite';
            }
        }
    } catch(e) { console.warn('[pending badge]', e); }
}

async function openPendingReview() {
    const ex = document.getElementById('pendingReviewModal');
    if (ex) ex.remove();
    const m = document.createElement('div');
    m.id = 'pendingReviewModal';
    m.style.cssText = 'position:fixed; inset:0; z-index:99999; background:rgba(15,23,42,0.85); display:flex; align-items:center; justify-content:center; padding:20px;';
    m.innerHTML = `
        <div style="background:#fff; max-width:1000px; width:100%; max-height:88vh; border-radius:16px; overflow:hidden; display:flex; flex-direction:column;">
            <div style="padding:18px 22px; background:linear-gradient(135deg,#ef4444,#b91c1c); color:#fff;">
                <div style="font-weight:900; font-size:16px;">⚖️ 디자이너 검토 대기 템플릿</div>
                <div style="font-size:12px; opacity:0.92; margin-top:4px;">승인 시 디자이너 예치금 30,000원 자동 적립 · 거절 시 row 즉시 삭제</div>
            </div>
            <div id="pendingReviewGrid" style="flex:1; overflow-y:auto; padding:18px 22px;">
                <div style="text-align:center; padding:40px; color:#94a3b8;">로딩 중...</div>
            </div>
            <div style="padding:14px 22px; border-top:1px solid #e2e8f0; text-align:right;">
                <button onclick="document.getElementById('pendingReviewModal').remove()" style="padding:9px 18px; background:#e2e8f0; color:#334155; border:none; border-radius:8px; font-size:12.5px; font-weight:700;">닫기</button>
            </div>
        </div>`;
    document.body.appendChild(m);
    m.addEventListener('click', e => { if (e.target === m) m.remove(); });
    loadPendingReviewList();
}

async function loadPendingReviewList() {
    const g = document.getElementById('pendingReviewGrid');
    if (!g) return;
    try {
        const { data, error } = await sb.from('admin_templates')
            .select('*')
            .eq('status', 'pending')
            .order('submitted_at', { ascending: false });
        if (error) throw error;
        if (!data || !data.length) {
            g.innerHTML = '<div style="text-align:center; padding:60px 20px; color:#94a3b8; font-size:13px;">검토 대기 중인 템플릿이 없습니다.</div>';
            return;
        }
        const designerIds = [...new Set(data.map(d => d.submitted_by).filter(Boolean))];
        let profMap = {};
        if (designerIds.length) {
            const { data: profs } = await sb.from('profiles')
                .select('id, username, email').in('id', designerIds);
            (profs || []).forEach(p => profMap[p.id] = p);
        }
        // 2026-06-19 v642: asset_type 별 보상 — template 3K, vector 1K, image 500, logo 200.
        //   asset_type 컬럼 NULL 이면 slot 유무로 추정 (slots 있으면 template, 없으면 vector).
        const REWARD = { template: 3000, vector: 1000, image: 500, logo: 200 };
        const TYPE_LBL = { template: '템플릿', vector: '벡터 (SVG)', image: 'PNG 이미지', logo: '로고' };
        const TYPE_COLOR = { template: '#7c3aed', vector: '#0369a1', image: '#16a34a', logo: '#d97706' };
        g.innerHTML = data.map(t => {
            const p = profMap[t.submitted_by] || {};
            const designerName = p.username || (p.email || '').split('@')[0] || '익명';
            const dt = t.submitted_at ? new Date(t.submitted_at).toLocaleString('ko-KR') : '-';
            // v642: asset_type 결정 — 명시값 우선, 없으면 asset_url 유무로 (asset 면 vector default), slots 있으면 template
            let aType = t.asset_type;
            if (!aType) {
                if ((t.slots || []).length > 0) aType = 'template';
                else if (t.asset_url) aType = 'vector';  // 자산이지만 type 모를 때 안전한 default
                else aType = 'template';
            }
            const reward = REWARD[aType] || 0;
            const typeLbl = TYPE_LBL[aType] || aType;
            const typeColor = TYPE_COLOR[aType] || '#64748b';
            const rewardLbl = reward >= 1000 ? `${(reward/1000).toFixed(0)},000원` : `${reward}원`;
            const previewUrl = t.thumbnail_url || t.background_url || t.asset_url || '';
            const originUrl = t.asset_url || t.background_url || t.thumbnail_url || '';
            const metaLine = (aType === 'template')
                ? `사이즈: ${t.width_mm || '?'}×${t.height_mm || '?'}mm · 슬롯: ${(t.slots||[]).length}개<br>`
                : '';
            // v642: 키워드 — 5개 언어 표시 (있으면)
            let kwBlock = '';
            if (t.keywords && typeof t.keywords === 'object') {
                const kw = t.keywords;
                const items = [];
                if (kw.ko) items.push(`<span style="color:#475569;"><b style="color:#7c3aed;font-size:10px;">KO</b> ${escapeHtml(kw.ko)}</span>`);
                if (kw.ja) items.push(`<span style="color:#475569;"><b style="color:#7c3aed;font-size:10px;">JA</b> ${escapeHtml(kw.ja)}</span>`);
                if (kw.en) items.push(`<span style="color:#475569;"><b style="color:#7c3aed;font-size:10px;">EN</b> ${escapeHtml(kw.en)}</span>`);
                if (kw.fr) items.push(`<span style="color:#475569;"><b style="color:#7c3aed;font-size:10px;">FR</b> ${escapeHtml(kw.fr)}</span>`);
                if (kw.ar) items.push(`<span style="color:#475569;"><b style="color:#7c3aed;font-size:10px;">AR</b> ${escapeHtml(kw.ar)}</span>`);
                if (items.length) {
                    kwBlock = `<div style="margin-bottom:10px; padding:8px 10px; background:#f1f5f9; border-radius:8px; display:flex; flex-direction:column; gap:3px; font-size:11px;">${items.join('')}</div>`;
                }
            }
            return `
                <div style="background:#f8fafc; border:1.5px solid #e2e8f0; border-radius:14px; padding:14px; margin-bottom:14px;">
                    <div style="display:grid; grid-template-columns:160px 1fr; gap:14px; align-items:start;">
                        <div style="aspect-ratio:1/1; background:#fff; border-radius:10px; overflow:hidden; display:flex; align-items:center; justify-content:center; padding:10px;">
                            <img src="${escapeHtml(previewUrl)}" style="max-width:100%; max-height:100%; object-fit:contain;" onerror="this.style.display='none';this.parentNode.innerHTML+='<div style=color:#94a3b8;font-size:11px;>미리보기 없음</div>'">
                        </div>
                        <div>
                            <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
                                <span style="background:${typeColor};color:#fff;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600;">${typeLbl}</span>
                                <span style="font-size:14px; font-weight:600; color:#0f172a;">${escapeHtml(t.name)}</span>
                            </div>
                            <div style="font-size:11.5px; color:#64748b; margin-bottom:10px; line-height:1.5;">
                                카테고리: ${escapeHtml(t.product_category)}${t.product_code ? ' · 상품: ' + escapeHtml(t.product_code) : ''}<br>
                                ${metaLine}
                                디자이너: <b>${escapeHtml(designerName)}</b> · 제출: ${dt}
                            </div>
                            ${kwBlock}
                            <div style="display:flex; gap:8px;">
                                <button onclick="approveTpl(${t.id}, this, ${reward})" style="padding:8px 16px; background:#16a34a; color:#fff; border:none; border-radius:8px; font-size:12.5px; font-weight:600; cursor:pointer;">승인 (+${rewardLbl})</button>
                                <button onclick="rejectTpl(${t.id}, this)" style="padding:8px 16px; background:#dc2626; color:#fff; border:none; border-radius:8px; font-size:12.5px; font-weight:600; cursor:pointer;">거절 (삭제)</button>
                                <a href="${escapeHtml(originUrl)}" target="_blank" style="padding:8px 16px; background:#e2e8f0; color:#334155; border:none; border-radius:8px; font-size:12.5px; font-weight:600; text-decoration:none;">원본 보기</a>
                            </div>
                        </div>
                    </div>
                </div>`;
        }).join('');
    } catch(e) {
        console.error('[loadPendingReviewList]', e);
        g.innerHTML = `<div style="text-align:center; padding:40px; color:#dc2626;">로드 실패: ${escapeHtml(e.message || String(e))}</div>`;
    }
}

async function approveTpl(id, btn, reward) {
    // 2026-06-19 v631: reward 매개변수 — asset_type 별 차등 (template 30K, vector 1K, image 500, logo 100)
    if (typeof reward !== 'number') reward = 30000;
    const rewardLabel = reward.toLocaleString();
    if (!confirm(`승인 시 디자이너 예치금 ${rewardLabel}원이 자동 적립됩니다. 계속할까요?`)) return;
    btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 처리 중...';
    try {
        const { data: tpl, error: gErr } = await sb.from('admin_templates').select('submitted_by').eq('id', id).single();
        if (gErr) throw gErr;
        const { error } = await sb.from('admin_templates')
            .update({ status: 'approved', approved_by: state.user.id, approved_at: new Date().toISOString() })
            .eq('id', id);
        if (error) throw error;
        if (tpl && tpl.submitted_by && reward > 0) {
            const { data: prof } = await sb.from('profiles').select('mileage').eq('id', tpl.submitted_by).single();
            const cur = (prof && prof.mileage) || 0;
            await sb.from('profiles').update({ mileage: cur + reward }).eq('id', tpl.submitted_by);
        }
        toast(`✅ 승인 + ${rewardLabel}원 적립 완료`);
        loadPendingReviewList();
        refreshPendingBadge();
        loadTemplates();
    } catch(e) {
        console.error('[approveTpl]', e);
        alert('승인 실패: ' + (e.message || e));
        btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-check"></i> 승인';
    }
}

async function rejectTpl(id, btn) {
    if (!confirm('거절 시 해당 row 가 즉시 삭제됩니다. 계속할까요?')) return;
    btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 처리 중...';
    try {
        const { error } = await sb.from('admin_templates').delete().eq('id', id);
        if (error) throw error;
        toast('거절 완료 (row 삭제)');
        loadPendingReviewList();
        refreshPendingBadge();
    } catch(e) {
        console.error('[rejectTpl]', e);
        alert('거절 실패: ' + (e.message || e));
        btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-xmark"></i> 거절 (삭제)';
    }
}
</script>
