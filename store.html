<head>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Pretendard','Noto Sans KR',-apple-system,sans-serif;background:#f5f6fa;color:#1e2233;-webkit-text-size-adjust:100%;}
a{text-decoration:none;color:inherit;}
img{display:block;}
.st-header{position:sticky;top:0;z-index:50;background:#fff;border-bottom:1px solid #eceaf3;box-shadow:0 2px 12px rgba(30,27,75,0.05);}
.st-header-in{max-width:1140px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:14px;}
.st-brand{display:flex;align-items:center;gap:12px;min-width:0;}
.st-brand img{height:42px;max-width:160px;object-fit:contain;border-radius:8px;}
.st-brand .nm{font-size:18px;font-weight:900;letter-spacing:-0.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.st-callbtn{display:inline-flex;align-items:center;gap:7px;background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;font-weight:800;font-size:14px;padding:10px 18px;border-radius:999px;white-space:nowrap;}
.st-hero{background:linear-gradient(135deg,#2e1065,#4c1d95 45%,#7c3aed);color:#fff;}
.st-hero-in{max-width:1140px;margin:0 auto;padding:48px 20px 54px;text-align:center;}
.st-hero .tag{display:inline-block;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25);font-size:12px;font-weight:800;padding:6px 14px;border-radius:999px;margin-bottom:16px;letter-spacing:.3px;}
.st-hero h1{font-size:34px;font-weight:900;line-height:1.25;letter-spacing:-0.5px;}
.st-hero p{margin-top:12px;font-size:15px;color:#d8ccff;line-height:1.6;}
.st-hero .meta{margin-top:18px;font-size:14px;font-weight:700;color:#e9e2ff;}
.st-tools{background:#fff;border-bottom:1px solid #eceaf3;}
.st-tools-in{max-width:1140px;margin:0 auto;padding:14px 20px;display:flex;justify-content:center;gap:12px;flex-wrap:wrap;}
.st-tool{min-width:200px;text-align:center;padding:13px 36px;border-radius:999px;font-weight:800;font-size:14px;border:1.5px solid #e1ddef;color:#4b4669;background:#fbfaff;transition:all .15s;}
.st-tool:hover{border-color:#a855f7;color:#7c3aed;}
.st-wrap{max-width:1140px;margin:0 auto;padding:34px 20px 70px;}
.st-secttl{font-size:20px;font-weight:900;margin-bottom:4px;}
.st-sectsub{font-size:13px;color:#7c7795;margin-bottom:18px;}
.st-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;}
.st-chip{padding:8px 15px;border-radius:999px;border:1.5px solid #e1ddef;background:#fff;color:#4b4669;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;}
.st-chip:hover{border-color:#a855f7;}
.st-chip.on{background:linear-gradient(135deg,#7c3aed,#a855f7);border-color:transparent;color:#fff;}
.st-cat-header{font-size:19px;font-weight:900;color:#1e2233;margin:32px 0 15px;padding-bottom:9px;border-bottom:2px solid #ece8f6;}
.st-cat-header:first-child{margin-top:6px;}
.st-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:18px;}
.st-card{background:#fff;border:1px solid #eceaf3;border-radius:16px;overflow:hidden;transition:transform .18s,box-shadow .18s;box-shadow:0 4px 16px rgba(30,27,75,0.06);}
.st-card:hover{transform:translateY(-4px);box-shadow:0 14px 34px rgba(124,58,237,0.16);}
.st-card .ci{width:100%;aspect-ratio:1;object-fit:cover;background:#f0eef7;}
.st-card .cb{padding:14px 15px 16px;}
.st-card .cn{font-size:14px;font-weight:700;line-height:1.4;min-height:38px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.st-card .cp{margin-top:8px;font-size:17px;font-weight:900;color:#7c3aed;}
.st-card .cgo{margin-top:10px;font-size:12px;font-weight:800;color:#a855f7;}
.st-rev{margin-top:46px;padding-top:34px;border-top:1px solid #ece8f6;}
.st-rev-lookup{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;}
.st-rev-lookup input{flex:1;min-width:200px;padding:13px 14px;border:1.5px solid #e1ddef;border-radius:10px;font-size:14px;}
.st-rev-lookup button{padding:13px 24px;border:none;border-radius:10px;background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;font-weight:800;font-size:14px;cursor:pointer;}
.st-rev-order{border:1px solid #eceaf3;border-radius:14px;padding:16px 18px;margin-bottom:14px;background:#fff;box-shadow:0 4px 14px rgba(30,27,75,0.05);}
.st-rev-order .roh{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;font-size:14px;font-weight:700;}
.st-rev-order .ro-items{font-size:12.5px;color:#6b6785;margin-top:5px;line-height:1.5;}
.st-stars{display:inline-flex;gap:2px;font-size:26px;cursor:pointer;user-select:none;}
.st-stars .s{color:#d8d3e8;}
.st-stars .s.on{color:#fbbf24;}
.st-rev-form{margin-top:12px;padding-top:12px;border-top:1px solid #f0eef7;}
.st-rev-form textarea{width:100%;padding:10px;border:1.5px solid #e1ddef;border-radius:9px;font-size:13px;font-family:inherit;resize:vertical;margin-top:9px;box-sizing:border-box;}
.st-rev-btns{display:flex;gap:8px;margin:9px 0;flex-wrap:wrap;}
.st-rev-btns button{padding:9px 16px;border-radius:8px;font-weight:800;font-size:13px;cursor:pointer;border:1.5px solid #e1ddef;background:#fff;color:#4b4669;}
.st-rev-btns button.ok.sel{background:#16a34a;color:#fff;border-color:#16a34a;}
.st-rev-btns button.bad.sel{background:#ef4444;color:#fff;border-color:#ef4444;}
.st-rev-submit{padding:11px 26px;border:none;border-radius:9px;background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;font-weight:800;font-size:13px;cursor:pointer;}
.st-rev-done{margin-top:10px;font-size:13px;font-weight:700;padding:9px 12px;border-radius:8px;}
.st-rev-done.ok{background:#dcfce7;color:#15803d;}
.st-rev-done.bad{background:#fee2e2;color:#b91c1c;}
.st-foot{background:#1e1b3a;color:#b9b3d6;}
.st-foot-in{max-width:1140px;margin:0 auto;padding:30px 20px;font-size:13px;line-height:1.8;}
.st-foot .fc{color:#fff;font-weight:800;font-size:15px;margin-bottom:6px;}
.st-foot .pw{margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,0.1);font-size:12px;color:#8a84ad;}
.st-center{max-width:440px;margin:90px auto;text-align:center;padding:0 20px;}
.st-center .ic{font-size:54px;margin-bottom:14px;}
.st-center h1{font-size:22px;font-weight:900;margin-bottom:10px;}
.st-center p{font-size:14px;color:#7c7795;line-height:1.7;}
.st-center a{display:inline-block;margin-top:20px;background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;font-weight:800;padding:12px 24px;border-radius:10px;font-size:14px;}
#stLoading{text-align:center;padding:120px 0;color:#9b94c4;font-size:15px;}
@media(max-width:600px){
  .st-hero h1{font-size:25px;}
  .st-hero-in{padding:38px 18px 42px;}
  .st-grid{grid-template-columns:repeat(2,1fr);gap:12px;}
  .st-card .cn{font-size:13px;}
}
</style>

<body>
<div id="stLoading">스토어를 불러오는 중…</div>
<div id="stApp" style="display:none;"></div>

<script>
(function(){
  'use strict';
  var SB_URL = 'https://qinvtnhiidtmrzosyvys.supabase.co';
  var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFpbnZ0bmhpaWR0bXJ6b3N5dnlzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjMyMDE3NjQsImV4cCI6MjA3ODc3Nzc2NH0.3z0f7R4w3bqXTOMTi19ksKSeAkx8HOOTONNSos8Xz8Y';
  var sb = window.supabase.createClient(SB_URL, SB_KEY);

  var m = location.pathname.match(/\/store\/([^\/?#]+)/);
  var slug = m ? decodeURIComponent(m[1]).toLowerCase().trim() : '';

  var CCY = { KR:{s:'₩',f:'price',n:'name'}, JP:{s:'¥',f:'price_jp',n:'name_jp'},
              US:{s:'$',f:'price_us',n:'name_us'} };

  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }

  function notFound(msg){
    document.getElementById('stLoading').style.display='none';
    var app = document.getElementById('stApp');
    app.style.display='block';
    app.innerHTML = '<div class="st-center"><div class="ic">🔍</div>'
      + '<h1>매장을 찾을 수 없습니다</h1>'
      + '<p>' + esc(msg||'요청하신 가맹점 스토어가 존재하지 않거나 준비 중입니다.') + '</p>'
      + '<a href="/franchise">가맹점 안내 보기</a></div>';
    document.title = '매장을 찾을 수 없습니다';
  }

  async function run(){
    if (!slug){ notFound(); return; }
    var fr = null;
    try {
      var r = await sb.from('franchises').select('*').eq('slug', slug).maybeSingle();
      if (r.error) throw r.error;
      fr = r.data;
    } catch(e){ notFound('스토어 정보를 불러오지 못했습니다.'); return; }
    if (!fr){ notFound(); return; }
    if (fr.status === 'suspended'){ notFound('현재 운영이 중단된 매장입니다.'); return; }

    var codes = Array.isArray(fr.selected_products) ? fr.selected_products : [];
    var products = [];
    if (codes.length){
      try {
        var pr = await sb.from('admin_products')
          .select('code,name,name_jp,name_us,price,price_jp,price_us,img_url,category,sort_order,is_custom_size')
          .in('code', codes).order('sort_order',{ascending:true});
        if (!pr.error) products = pr.data || [];
      } catch(e){ console.warn('products', e); }
    }

    // 카테고리명
    var topMap = {}, subToTop = {};
    try {
      var tc = await sb.from('admin_top_categories').select('code,name,sort_order').order('sort_order',{ascending:true});
      (tc.data||[]).forEach(function(t){ topMap[t.code]=t.name||t.code; });
      var sc = await sb.from('admin_categories').select('code,name,top_category_code');
      (sc.data||[]).forEach(function(c){ subToTop[c.code]=c.top_category_code||null; if(!c.top_category_code&&!topMap[c.code])topMap[c.code]=c.name||c.code; });
    } catch(e){}
    function topOf(p){ var t=subToTop[p.category]; if(t&&topMap[t])return t; if(topMap[p.category])return p.category; return '_etc'; }
    products.forEach(function(p){ p._top = topOf(p); });

    render(fr, products, topMap);
  }

  function render(fr, products, topMap){
    var ccy = CCY[fr.country] || CCY.KR;
    var company = fr.company_name || '가맹점 스토어';
    var phone = fr.phone || '';
    var telHref = phone.replace(/[^0-9+]/g,'');

    document.title = company + ' — 공식 온라인 스토어';

    var logoHtml = fr.logo_url
      ? '<img src="'+esc(fr.logo_url)+'" alt="'+esc(company)+'">'
      : '';
    var callHtml = phone
      ? '<a class="st-callbtn" href="tel:'+esc(telHref)+'">📞 '+esc(phone)+'</a>'
      : '';

    var app = document.getElementById('stApp');
    app.innerHTML =
      '<header class="st-header"><div class="st-header-in">'
      + '<div class="st-brand">'+logoHtml+'<div class="nm">'+esc(company)+'</div></div>'
      + callHtml
      + '</div></header>'
      + '<section class="st-hero"><div class="st-hero-in">'
      + '<div class="tag">✨ 카멜레온프린팅 공식 가맹점</div>'
      + '<h1>'+esc(company)+'</h1>'
      + '<p>'+esc(fr.tagline || '원하는 제품을 합리적인 가격에 주문하세요.')+'</p>'
      + '</div></section>'
      + '<div class="st-tools"><div class="st-tools-in">'
      + '<a class="st-tool" href="/?fr='+encodeURIComponent(slug)+'&editor=1">🎨 디자인 에디터</a>'
      + '</div></div>'
      + '<div class="st-wrap">'
      + '<div class="st-secttl">취급 제품</div>'
      + '<div class="st-sectsub">제품을 선택하면 주문 페이지로 이동합니다.</div>'
      + '<div id="stGrid"></div>'
      + (products.length?'':'<p style="color:#9b94c4;font-size:14px;padding:30px 0;">아직 등록된 제품이 없습니다.</p>')
      + '<div class="st-rev">'
      + '<div class="st-secttl">📦 주문 수령 확인 · 후기</div>'
      + '<div class="st-sectsub">주문 시 입력한 전화번호로 조회하여, 제품을 잘 받으셨는지 확인하고 후기를 남겨주세요.</div>'
      + '<div class="st-rev-lookup"><input id="revPhone" type="tel" placeholder="주문 시 전화번호 입력"><button id="revLookupBtn">내 주문 조회</button></div>'
      + '<div id="revResult"></div>'
      + '</div>'
      + '</div>'
      + '<footer class="st-foot"><div class="st-foot-in">'
      + '<div class="fc">'+esc(company)+'</div>'
      + (phone?'<div>📞 '+esc(phone)+'</div>':'')
      + (fr.email?'<div>✉️ '+esc(fr.email)+'</div>':'')
      + '<div class="pw">Powered by Chameleon Printing · 본 스토어의 결제·제작은 카멜레온프린팅 시스템으로 안전하게 처리됩니다.</div>'
      + '</div></footer>';

    document.getElementById('stLoading').style.display='none';
    app.style.display='block';

    // 카테고리별 섹션 — 허니콤보드(topMap sort_order 순)부터 아래로 쭉, 기타 마지막
    function cardHtml(p){
      var nm = (p[ccy.n] || p.name || p.code).replace(/<br\s*\/?>/gi,' ');
      var pv = p[ccy.f] || p.price || 0;
      var price = pv ? (ccy.s + Number(pv).toLocaleString()) : '가격 문의';
      // 면적가(회배당) 상품 — 1m² 단가 대신 5×5cm 기준가 표시 (아크릴·스티커)
      var _cat = (p.category||'').toLowerCase();
      var _nm = ((p.name||'')+' '+(p.name_us||'')).toLowerCase();
      if (p.is_custom_size === true && pv > 0 && (
            /^acr/.test(_cat) || _cat === 'acrylic' ||
            _cat.indexOf('sticker') >= 0 || /스티커|sticker/i.test(_nm))) {
        price = ccy.s + Math.round(Number(pv) * 25 / 10000).toLocaleString() + '~';
      }
      var img = p.img_url || 'https://placehold.co/400?text=No+Image';
      return '<a class="st-card" href="/?product='+encodeURIComponent(p.code)+'&fr='+encodeURIComponent(slug)+'">'
        + '<img class="ci" src="'+esc(img)+'" loading="lazy" onerror="this.src=\'https://placehold.co/400?text=No+Image\'">'
        + '<div class="cb"><div class="cn">'+esc(nm)+'</div>'
        + '<div class="cp">'+price+'</div>'
        + '<div class="cgo">주문하기 →</div></div></a>';
    }
    (function drawSections(){
      var grid = document.getElementById('stGrid');
      var groups = {};
      products.forEach(function(p){ (groups[p._top]=groups[p._top]||[]).push(p); });
      var html = '';
      function section(name, g){
        return '<div class="st-cat-header">'+esc(name)+'</div>'
             + '<div class="st-grid">'+g.map(cardHtml).join('')+'</div>';
      }
      Object.keys(topMap).forEach(function(code){
        var g = groups[code]; if (g && g.length) html += section(topMap[code], g);
      });
      if (groups['_etc'] && groups['_etc'].length) html += section('기타', groups['_etc']);
      grid.innerHTML = html;
    })();

    // ===== 주문 수령 확인 · 후기 =====
    var DONE_ST = ['완료됨','완료','구매확정','배송완료','발송완료'];
    var revBtn = document.getElementById('revLookupBtn');
    if (revBtn){
      revBtn.onclick = lookupOrders;
      document.getElementById('revPhone').addEventListener('keydown', function(e){ if(e.key==='Enter') lookupOrders(); });
    }
    async function lookupOrders(){
      var phone = (document.getElementById('revPhone').value||'').replace(/[^0-9]/g,'');
      var res = document.getElementById('revResult');
      if (phone.length < 8){ res.innerHTML = '<p style="color:#ef4444;font-size:13px;">전화번호를 정확히 입력해주세요.</p>'; return; }
      res.innerHTML = '<p style="color:#9b94c4;font-size:13px;">조회 중…</p>';
      try {
        var r = await sb.from('orders')
          .select('id,order_date,total_amount,status,items,phone')
          .eq('franchise_slug', slug).order('order_date',{ascending:false}).limit(80);
        var mine = (r.data||[]).filter(function(o){ return String(o.phone||'').replace(/[^0-9]/g,'') === phone; });
        if (!mine.length){ res.innerHTML = '<p style="color:#7c7795;font-size:13px;">해당 전화번호로 조회된 주문이 없습니다. 주문 시 입력한 번호를 확인해주세요.</p>'; return; }
        var revMap = {};
        try {
          var rv = await sb.from('franchise_order_reviews').select('*')
            .eq('franchise_slug', slug).in('order_id', mine.map(function(o){return o.id;}));
          (rv.data||[]).forEach(function(x){ revMap[x.order_id] = x; });
        } catch(e){}
        renderRevOrders(mine, revMap, phone);
      } catch(e){
        res.innerHTML = '<p style="color:#ef4444;font-size:13px;">조회 실패: '+esc(e.message||e)+'</p>';
      }
    }
    function renderRevOrders(orders, revMap, phone){
      var res = document.getElementById('revResult');
      res.innerHTML = orders.map(function(o){
        var items = (typeof o.items==='string' ? (JSON.parse(o.items||'[]')) : (o.items||[]));
        var itemTxt = items.map(function(it){
          var n = (it.product && (it.product.name)) || it.productName || it.product_name || it.name || '상품';
          return n + ' (' + (it.qty||1) + ')';
        }).join(', ') || '주문 내역';
        var d = o.order_date ? new Date(o.order_date).toLocaleDateString() : '';
        var rev = revMap[o.id];
        var body;
        if (rev){
          body = '<div class="st-rev-done '+(rev.received_ok?'ok':'bad')+'">'
            + (rev.received_ok ? '✅ 정상 수령 확인 완료' : '⚠️ 문제 접수됨 — 본사가 확인합니다')
            + (rev.rating ? ' · 평점 '+rev.rating+'점' : '')
            + (rev.comment ? '<div style="font-weight:500;margin-top:4px;">'+esc(rev.comment)+'</div>' : '')
            + '</div>';
        } else {
          body = '<div class="st-rev-form" data-oid="'+o.id+'">'
            + '<div style="font-size:13px;font-weight:700;margin-bottom:4px;">제품을 받으셨나요?</div>'
            + '<div class="st-rev-btns">'
            + '<button type="button" class="ok" data-ok="1">✅ 정상 수령</button>'
            + '<button type="button" class="bad" data-ok="0">⚠️ 문제 있음</button>'
            + '</div>'
            + '<div style="font-size:13px;font-weight:700;">평점</div>'
            + '<div class="st-stars">' + [1,2,3,4,5].map(function(n){return '<span class="s" data-star="'+n+'">★</span>';}).join('') + '</div>'
            + '<textarea rows="2" placeholder="후기 또는 문제 내용을 적어주세요 (선택)"></textarea>'
            + '<div style="margin-top:9px;"><button type="button" class="st-rev-submit">후기 등록</button></div>'
            + '</div>';
        }
        return '<div class="st-rev-order">'
          + '<div class="roh"><span>주문 #'+o.id+'</span><span>'+esc(d)+' · ₩'+Number(o.total_amount||0).toLocaleString()+'</span></div>'
          + '<div class="ro-items">'+esc(itemTxt)+'</div>'
          + body
          + '</div>';
      }).join('');
      // wire forms
      res.querySelectorAll('.st-rev-form').forEach(function(f){
        var okv = null, star = 0;
        f.querySelectorAll('[data-ok]').forEach(function(b){
          b.onclick = function(){
            okv = b.getAttribute('data-ok') === '1';
            f.querySelectorAll('[data-ok]').forEach(function(x){ x.classList.remove('sel'); });
            b.classList.add('sel');
          };
        });
        var stars = f.querySelectorAll('[data-star]');
        stars.forEach(function(s){
          s.onclick = function(){
            star = parseInt(s.getAttribute('data-star'),10);
            stars.forEach(function(x){ x.classList.toggle('on', parseInt(x.getAttribute('data-star'),10) <= star); });
          };
        });
        f.querySelector('.st-rev-submit').onclick = async function(){
          if (okv === null){ alert('정상 수령 또는 문제 있음을 선택해주세요.'); return; }
          var btn = this; btn.disabled = true; btn.textContent = '등록 중…';
          try {
            var ins = await sb.from('franchise_order_reviews').insert({
              order_id: parseInt(f.getAttribute('data-oid'),10),
              franchise_slug: slug,
              customer_phone: phone,
              received_ok: okv,
              rating: star || null,
              comment: (f.querySelector('textarea').value||'').trim() || null
            });
            if (ins.error) throw ins.error;
            lookupOrders();
          } catch(e){
            alert('후기 등록 실패: ' + (e.message||e));
            btn.disabled = false; btn.textContent = '후기 등록';
          }
        };
      });
    }
  }

  run();
})();
</script>
</body>
</html>
