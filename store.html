  };
  function langOf(country){
    var c = String(country||'').toUpperCase();
    var map = { JP:'ja', KR:'kr', CN:'zh', SA:'ar', ES:'es', DE:'de', FR:'fr' };
    return map[c] || 'en';
  }
  var LANG = (function(){
    var h = location.hostname || '';
    return h.indexOf('cafe0101')>=0 ? 'ja' : (h.indexOf('cafe2626')>=0 ? 'kr' : 'en');
  })();
  var T = DICT[LANG];

  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
  // 카테고리명 다국어 — admin_*_categories 의 name / name_jp / name_us
  function locName(o){
    if (!o) return '';
    if (LANG==='ja') return o.name_jp || o.name || o.code;
    if (LANG==='kr') return o.name || o.code;
    // zh/ar/es/de/fr 는 전용 제품명 컬럼이 없어 영문명(name_us)을 사용
    return o.name_us || o.name || o.code;
  }

  function notFound(msg){
    document.getElementById('stLoading').style.display='none';
    var app = document.getElementById('stApp');
    app.style.display='block';
    app.innerHTML = '<div class="st-center"><div class="ic">🔍</div>'
      + '<h1>' + esc(T.notFoundTitle) + '</h1>'
      + '<p>' + esc(msg||T.notFoundMsg) + '</p>'
      + '<a href="/franchise">' + esc(T.franchiseGuide) + '</a></div>';
    document.title = T.notFoundTitle;
  }

  function expiredNotice(){
    document.getElementById('stLoading').style.display='none';
    var app = document.getElementById('stApp');
    app.style.display='block';
    app.innerHTML = '<div class="st-center"><div class="ic">⏰</div>'
      + '<h1>' + esc(T.expiredTitle) + '</h1>'
      + '<p>' + esc(T.expired) + '</p>'
      + '<a href="/franchise#join">' + esc(T.franchiseGuide) + '</a></div>';
    document.title = T.expiredTitle;
  }

  async function run(){
    if (!slug){ notFound(); return; }
    var fr = null;
    try {
      var r = await sb.from('franchises').select('*').eq('slug', slug).maybeSingle();
      if (r.error) throw r.error;
      fr = r.data;
    } catch(e){ notFound(T.loadFail); return; }
    if (!fr){ notFound(); return; }
    // 가맹점 국가 기준으로 스토어 언어 결정
    LANG = langOf(fr.country); T = DICT[LANG];
    if (fr.status === 'suspended'){ notFound(T.suspended); return; }

    // 6개월 무료 체험 — 이후 구독 필요. 구독 미가입 + 생성 6개월 경과 → 운영 중단 안내
    var subSt = String(fr.subscription_status || '').toLowerCase();
    var subPt = String(fr.plan_type || '').toLowerCase();
    var subscribed = subSt === 'active' || subPt.indexOf('lifetime') >= 0;
    if (!subscribed && fr.created_at &&
        (Date.now() - new Date(fr.created_at).getTime()) > 183*24*60*60*1000){
      expiredNotice(); return;
    }

    // 홈페이지 테마(상단 배지·배경) — 스토리지 JSON
    var theme = {};
    try {
      var tj = await fetch(SB_URL + '/storage/v1/object/public/logos/franchise/themes/' + encodeURIComponent(slug) + '.json?_t=' + Date.now());
      if (tj.ok) theme = (await tj.json()) || {};
    } catch(e){}

    var codes = Array.isArray(fr.selected_products) ? fr.selected_products : [];
    var products = [];
    if (codes.length){
      try {
        var pr = await sb.from('admin_products')
          .select('code,name,name_jp,name_us,price,price_jp,price_us,img_url,category,sort_order,is_custom_size')
          .in('code', codes).order('sort_order',{ascending:true});
        if (!pr.error) products = pr.data || [];
      } catch(e){ console.warn('products', e); }
    }

    // 카테고리명 (다국어)
    var topMap = {}, subToTop = {};
    try {
      var tc = await sb.from('admin_top_categories').select('code,name,name_jp,name_us,sort_order').order('sort_order',{ascending:true});
      (tc.data||[]).forEach(function(t){ topMap[t.code]=locName(t); });
      var sc = await sb.from('admin_categories').select('code,name,name_jp,name_us,top_category_code');
      (sc.data||[]).forEach(function(c){ subToTop[c.code]=c.top_category_code||null; if(!c.top_category_code&&!topMap[c.code])topMap[c.code]=locName(c); });
    } catch(e){}
    function topOf(p){ var t=subToTop[p.category]; if(t&&topMap[t])return t; if(topMap[p.category])return p.category; return '_etc'; }
    products.forEach(function(p){ p._top = topOf(p); });

    render(fr, products, topMap, theme);
  }

  function render(fr, products, topMap, theme){
    theme = theme || {};
    var ccy = CCY[String(fr.country||'').toUpperCase()] || CCY.KR;
    // 통화 표시 — 1 미만 소액은 소수점 2자리, 그 외는 반올림. 유로권은 기호를 뒤에.
    function fmtPrice(v){
      v = Number(v) || 0;
      var n = (v > 0 && v < 100) ? (Math.round(v*100)/100) : Math.round(v);
      n = n.toLocaleString();
      return ccy.post ? (n + ' ' + ccy.s) : (ccy.s + n);
    }
    var company = fr.company_name || T.storeFallback;
    var phone = fr.phone || '';
    var telHref = phone.replace(/[^0-9+]/g,'');

    document.documentElement.lang = (LANG==='kr'?'ko':LANG);
    if (LANG==='ar') document.documentElement.dir = 'rtl';
    document.title = company + T.titleSuffix;

    var logoHtml = fr.logo_url
      ? '<img src="'+esc(fr.logo_url)+'" alt="'+esc(company)+'">'
      : '';
    var callHtml = phone
      ? '<a class="st-callbtn" href="tel:'+esc(telHref)+'">📞 '+esc(phone)+'</a>'
      : '';

    // 히어로 배경 — 가맹점이 지정한 이미지/색상 우선 (테마 JSON)
    var heroStyle = '';
    if (theme.mode === 'image' && theme.image){
      heroStyle = ' style="background-image:linear-gradient(rgba(15,8,40,0.48),rgba(15,8,40,0.58)),url(\''+esc(theme.image)+'\');background-size:cover;background-position:center;"';
    } else if (theme.mode === 'color' && theme.color){
      heroStyle = ' style="background:'+esc(theme.color)+';"';
    }
    var badgeText = (theme.badge && String(theme.badge).trim()) ? theme.badge : T.officialBadge;

    var app = document.getElementById('stApp');
    app.innerHTML =
      '<header class="st-header"><div class="st-header-in">'
      + '<div class="st-brand">'+logoHtml+'<div class="nm">'+esc(company)+'</div></div>'
      + callHtml
      + '</div></header>'
      + '<section class="st-hero"'+heroStyle+'><div class="st-hero-in">'
      + '<div class="tag">'+esc(badgeText)+'</div>'
      + '<h1>'+esc(company)+'</h1>'
      + '<p>'+esc(fr.tagline || T.taglineFallback)+'</p>'
      + '</div></section>'
      + '<div class="st-tools"><div class="st-tools-in">'
      + '<a class="st-bigeditor" href="/?fr='+encodeURIComponent(slug)+'&editor=1">'
      +   '<div class="be-ic">🎨</div>'
      +   '<div class="be-tt">'+esc(T.designEditor)+'</div>'
      +   '<div class="be-sub">'+esc(T.editorSub)+'</div>'
      +   '<span class="be-go">'+esc(T.editorGo)+' →</span>'
      + '</a>'
      + '</div></div>'
      + '<div class="st-wrap">'
      + '<div class="st-secttl">'+esc(T.products)+'</div>'
      + '<div class="st-sectsub">'+esc(T.productsSub)+'</div>'
      + '<div id="stGrid"></div>'
      + ((products.length || (theme.customProducts||[]).length)?'':'<p style="color:#9b94c4;font-size:14px;padding:30px 0;">'+esc(T.noProducts)+'</p>')
      + '<div class="st-rev">'
      + '<div class="st-secttl">'+esc(T.reviewTitle)+'</div>'
      + '<div class="st-sectsub">'+esc(T.reviewSub)+'</div>'
      + '<div class="st-rev-lookup"><input id="revPhone" type="tel" placeholder="'+esc(T.phonePh)+'"><button id="revLookupBtn">'+esc(T.lookupBtn)+'</button></div>'
      + '<div id="revResult"></div>'
      + '</div>'
      + '</div>'
      + '<footer class="st-foot"><div class="st-foot-in">'
      + '<div class="fc">'+esc(company)+'</div>'
      + (phone?'<div>📞 '+esc(phone)+'</div>':'')
      + (fr.email?'<div>✉️ '+esc(fr.email)+'</div>':'')
      + '<div class="pw">Powered by Chameleon Printing · '+esc(T.poweredBy)+'</div>'
      + '</div></footer>';

    document.getElementById('stLoading').style.display='none';
    app.style.display='block';

    var _margin = Number(theme.margin) || 0;  // 가맹점 판매 마진율 (%)
    function cardHtml(p){
      var nm = (p[ccy.n] || p.name_us || p.name || p.code).replace(/<br\s*\/?>/gi,' ');
      var pv = (p[ccy.f] || p.price || 0) * (ccy.rate || 1) * (1 + _margin/100);
      var price = pv ? fmtPrice(pv) : T.priceAsk;
      // 면적가(회배당) 상품 — 1m² 단가 대신 5×5cm 기준가 표시 (아크릴·스티커)
      var _cat = (p.category||'').toLowerCase();
      var _nm = ((p.name||'')+' '+(p.name_us||'')).toLowerCase();
      if (p.is_custom_size === true && pv > 0 && (
            /^acr/.test(_cat) || _cat === 'acrylic' ||
            _cat.indexOf('sticker') >= 0 || /스티커|sticker/i.test(_nm))) {
        price = fmtPrice(Number(pv) * 25 / 10000) + '~';
      }
      var img = p.img_url || 'https://placehold.co/400?text=No+Image';
      return '<a class="st-card" href="/?product='+encodeURIComponent(p.code)+'&fr='+encodeURIComponent(slug)+'">'
        + '<img class="ci" src="'+esc(img)+'" loading="lazy" onerror="this.src=\'https://placehold.co/400?text=No+Image\'">'
        + '<div class="cb"><div class="cn">'+esc(nm)+'</div>'
        + '<div class="cp">'+price+'</div>'
        + '<div class="cgo">'+esc(T.orderNow)+'</div></div></a>';
    }
    // 가맹점 자체 등록 상품 카드 (주문은 가맹점이 직접 처리)
    function customCardHtml(p, idx){
      var imgs = (p.images && p.images.length) ? p.images : (p.img ? [p.img] : []);
      var img = imgs[0] || 'https://placehold.co/400?text=No+Image';
      var price = (p.price > 0) ? fmtPrice(Number(p.price)) : T.priceAsk;
      return '<div class="st-card" data-cp="'+idx+'" style="cursor:pointer;">'
        + '<img class="ci" src="'+esc(img)+'" loading="lazy" onerror="this.src=\'https://placehold.co/400?text=No+Image\'">'
        + '<div class="cb"><div class="cn">'+esc(p.name||'')+'</div>'
        + '<div class="cp">'+price+'</div>'
        + '<div class="cgo">'+esc(T.orderNow)+'</div></div></div>';
    }
    function openCustomOrder(p){
      if (!p) return;
      var imgs = (p.images && p.images.length) ? p.images : (p.img ? [p.img] : []);
      var opts = p.options || [];
      var bank = theme.bank || {};
      var hasBank = !!(bank.number && String(bank.number).trim());
      var hasPg = !!(theme.pg && String(theme.pg).trim());
      var qty = 1, mainIdx = 0, sel = {}, showGuide = false;
      var ov = document.createElement('div');
      ov.style.cssText = 'position:fixed;inset:0;background:rgba(15,8,40,0.62);z-index:300;display:flex;align-items:flex-start;justify-content:center;padding:24px 16px;overflow-y:auto;';
      ov.onclick = function(e){ if (e.target===ov) document.body.removeChild(ov); };
      var qbtn = 'width:32px;height:32px;border:1.5px solid #e1ddef;background:#fff;border-radius:8px;font-size:18px;font-weight:800;cursor:pointer;color:#4b4669;';
      function optSum(){ var s=0; opts.forEach(function(o,i){ if(sel[i]) s+=Number(o.price)||0; }); return s; }
      function draw(){
        var total = ((Number(p.price)||0) + optSum()) * qty;
        var thumbs = imgs.length>1 ? '<div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;">'+imgs.map(function(im,i){
          return '<div class="cpt" data-i="'+i+'" style="width:50px;height:50px;border-radius:7px;background:#000 url(\''+esc(im)+'\') center/cover;cursor:pointer;border:2px solid '+(i===mainIdx?'#7c3aed':'transparent')+';"></div>';
        }).join('')+'</div>' : '';
        var optHtml = opts.length ? '<div style="margin-top:14px;"><div style="font-size:13px;font-weight:800;margin-bottom:6px;">'+esc(T.optionsLabel)+'</div>'
          + opts.map(function(o,i){
            return '<label style="display:flex;align-items:center;gap:8px;padding:9px 11px;border:1.5px solid '+(sel[i]?'#a855f7':'#e1ddef')+';border-radius:9px;margin-bottom:6px;cursor:pointer;font-size:13px;">'
              + '<input type="checkbox" class="cpo" data-i="'+i+'" '+(sel[i]?'checked':'')+' style="width:16px;height:16px;accent-color:#7c3aed;">'
              + '<span style="flex:1;">'+esc(o.name||'')+'</span>'
              + '<span style="font-weight:800;color:#7c3aed;">+'+fmtPrice(Number(o.price)||0)+'</span></label>';
          }).join('') + '</div>' : '';
        var guideHtml = '';
        if (showGuide){
          guideHtml = '<div style="margin-top:14px;background:#f5f3ff;border:1px solid #ddd6fe;border-radius:12px;padding:14px;font-size:13px;line-height:1.8;">';
          if (hasPg) guideHtml += '<div style="font-weight:700;color:#5b21b6;margin-bottom:8px;">'+esc(T.pgNote)+'</div>';
          if (hasBank) guideHtml += '<div><b>'+esc(T.bankAccLabel)+'</b> — '+esc(bank.name||'')+' <b>'+esc(bank.number||'')+'</b>'+(bank.holder?(' ('+esc(bank.holder)+')'):'')+'</div>';
          if (fr.phone) guideHtml += '<div>📞 <a href="tel:'+esc(String(fr.phone).replace(/[^0-9+]/g,''))+'" style="color:#7c3aed;font-weight:700;">'+esc(fr.phone)+'</a></div>';
          if (fr.email) guideHtml += '<div>✉️ <a href="mailto:'+esc(fr.email)+'" style="color:#7c3aed;">'+esc(fr.email)+'</a></div>';
          guideHtml += '</div>';
        }
        var actionHtml = showGuide ? ''
          : '<button class="cpbuy" style="width:100%;margin-top:14px;padding:14px;border:none;border-radius:11px;background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;font-weight:900;font-size:15px;cursor:pointer;">'+esc(T.buyBtn)+'</button>';
        ov.innerHTML = '<div style="background:#fff;border-radius:18px;max-width:440px;width:100%;padding:22px;">'
          + (imgs.length?'<img src="'+esc(imgs[mainIdx])+'" style="width:100%;border-radius:12px;">':'')
          + thumbs
          + '<div style="font-size:19px;font-weight:900;margin-top:12px;">'+esc(p.name||'')+'</div>'
          + (p.desc?'<div style="font-size:13px;color:#6b6785;line-height:1.7;margin-top:6px;white-space:pre-wrap;">'+esc(p.desc)+'</div>':'')
          + optHtml
          + '<div style="display:flex;align-items:center;gap:10px;margin:14px 0;">'
          +   '<span style="font-size:13px;font-weight:700;flex:1;">'+esc(T.qtyLabel)+'</span>'
          +   '<button class="cpq" data-d="-1" style="'+qbtn+'">−</button>'
          +   '<span style="font-weight:800;min-width:28px;text-align:center;">'+qty+'</span>'
          +   '<button class="cpq" data-d="1" style="'+qbtn+'">+</button>'
          + '</div>'
          + '<div style="display:flex;justify-content:space-between;font-size:17px;font-weight:900;border-top:1px solid #eee;padding-top:12px;">'
          +   '<span>'+esc(T.totalLabel)+'</span><span style="color:#7c3aed;">'+fmtPrice(total)+'</span></div>'
          + actionHtml + guideHtml
          + '<button class="cpClose" style="width:100%;margin-top:10px;padding:11px;border:none;border-radius:10px;background:#1e1b3a;color:#fff;font-weight:800;font-size:13px;cursor:pointer;">'+esc(T.closeBtn)+'</button>'
          + '</div>';
        ov.querySelectorAll('.cpt').forEach(function(t){ t.onclick=function(){ mainIdx=parseInt(t.dataset.i,10); draw(); }; });
        ov.querySelectorAll('.cpo').forEach(function(c){ c.onchange=function(){ sel[c.dataset.i]=c.checked; draw(); }; });
        ov.querySelectorAll('.cpq').forEach(function(b){ b.onclick=function(){ qty=Math.max(1,qty+parseInt(b.dataset.d,10)); draw(); }; });
        var buy=ov.querySelector('.cpbuy'); if(buy) buy.onclick=function(){ showGuide=true; draw(); };
        ov.querySelector('.cpClose').onclick=function(){ document.body.removeChild(ov); };
      }
      draw();
      document.body.appendChild(ov);
    }
    (function drawSections(){
      var grid = document.getElementById('stGrid');
      var groups = {};
      products.forEach(function(p){ (groups[p._top]=groups[p._top]||[]).push(p); });
      var html = '';
      function section(name, g){
        return '<div class="st-cat-header">'+esc(name)+'</div>'
             + '<div class="st-grid">'+g.map(cardHtml).join('')+'</div>';
      }
      Object.keys(topMap).forEach(function(code){
        var g = groups[code]; if (g && g.length) html += section(topMap[code], g);
      });
      if (groups['_etc'] && groups['_etc'].length) html += section(T.etc, groups['_etc']);
      // 가맹점 자체 상품 섹션
      var cps = theme.customProducts || [];
      if (cps.length){
        html += '<div class="st-cat-header">'+esc(T.ownProducts)+'</div>';
        html += '<div class="st-sectsub" style="margin-top:-8px;">'+esc(T.ownProductsSub)+'</div>';
        html += '<div class="st-grid">'+cps.map(function(p,i){ return customCardHtml(p,i); }).join('')+'</div>';
      }
      grid.innerHTML = html;
      grid.querySelectorAll('[data-cp]').forEach(function(el){
        el.onclick = function(){ openCustomOrder(cps[parseInt(el.dataset.cp,10)]); };
      });
    })();

    // ===== 주문 수령 확인 · 후기 =====
    var revBtn = document.getElementById('revLookupBtn');
    if (revBtn){
      revBtn.onclick = lookupOrders;
      document.getElementById('revPhone').addEventListener('keydown', function(e){ if(e.key==='Enter') lookupOrders(); });
    }
    async function lookupOrders(){
      var phone = (document.getElementById('revPhone').value||'').replace(/[^0-9]/g,'');
      var res = document.getElementById('revResult');
      if (phone.length < 8){ res.innerHTML = '<p style="color:#ef4444;font-size:13px;">'+esc(T.phoneErr)+'</p>'; return; }
      res.innerHTML = '<p style="color:#9b94c4;font-size:13px;">'+esc(T.looking)+'</p>';
      try {
        var r = await sb.from('orders')
          .select('id,order_date,total_amount,status,items,phone')
          .eq('franchise_slug', slug).order('order_date',{ascending:false}).limit(80);
        var mine = (r.data||[]).filter(function(o){ return String(o.phone||'').replace(/[^0-9]/g,'') === phone; });
        if (!mine.length){ res.innerHTML = '<p style="color:#7c7795;font-size:13px;">'+esc(T.noOrdersFound)+'</p>'; return; }
        var revMap = {};
        try {
          var rv = await sb.from('franchise_order_reviews').select('*')
            .eq('franchise_slug', slug).in('order_id', mine.map(function(o){return o.id;}));
          (rv.data||[]).forEach(function(x){ revMap[x.order_id] = x; });
        } catch(e){}
        renderRevOrders(mine, revMap, phone);
      } catch(e){
        res.innerHTML = '<p style="color:#ef4444;font-size:13px;">'+esc(T.lookupFail)+esc(e.message||e)+'</p>';
      }
    }
    function renderRevOrders(orders, revMap, phone){
      var res = document.getElementById('revResult');
      res.innerHTML = orders.map(function(o){
        var items = (typeof o.items==='string' ? (JSON.parse(o.items||'[]')) : (o.items||[]));
        var itemTxt = items.map(function(it){
          var n = (it.product && (it.product.name)) || it.productName || it.product_name || it.name || T.itemProduct;
          return n + ' (' + (it.qty||1) + ')';
        }).join(', ') || T.orderItems;
        var d = o.order_date ? new Date(o.order_date).toLocaleDateString() : '';
        var rev = revMap[o.id];
        var body;
        if (rev){
          body = '<div class="st-rev-done '+(rev.received_ok?'ok':'bad')+'">'
            + (rev.received_ok ? T.revOkDone : T.revBadDone)
            + (rev.rating ? ' · '+T.ratingWord+rev.rating+T.ratingUnit : '')
            + (rev.comment ? '<div style="font-weight:500;margin-top:4px;">'+esc(rev.comment)+'</div>' : '')
            + '</div>';
        } else {
          body = '<div class="st-rev-form" data-oid="'+o.id+'">'
            + '<div style="font-size:13px;font-weight:700;margin-bottom:4px;">'+esc(T.receivedQ)+'</div>'
            + '<div class="st-rev-btns">'
            + '<button type="button" class="ok" data-ok="1">'+esc(T.revOk)+'</button>'
            + '<button type="button" class="bad" data-ok="0">'+esc(T.revBad)+'</button>'
            + '</div>'
            + '<div style="font-size:13px;font-weight:700;">'+esc(T.rating)+'</div>'
            + '<div class="st-stars">' + [1,2,3,4,5].map(function(n){return '<span class="s" data-star="'+n+'">★</span>';}).join('') + '</div>'
            + '<textarea rows="2" placeholder="'+esc(T.reviewPh)+'"></textarea>'
            + '<div style="margin-top:9px;"><button type="button" class="st-rev-submit">'+esc(T.reviewSubmit)+'</button></div>'
            + '</div>';
        }
        return '<div class="st-rev-order">'
          + '<div class="roh"><span>'+esc(T.orderNo)+o.id+'</span><span>'+esc(d)+' · '+fmtPrice(Number(o.total_amount||0)*(ccy.krw||1))+'</span></div>'
          + '<div class="ro-items">'+esc(itemTxt)+'</div>'
          + body
          + '</div>';
      }).join('');
      res.querySelectorAll('.st-rev-form').forEach(function(f){
        var okv = null, star = 0;
        f.querySelectorAll('[data-ok]').forEach(function(b){
          b.onclick = function(){
            okv = b.getAttribute('data-ok') === '1';
            f.querySelectorAll('[data-ok]').forEach(function(x){ x.classList.remove('sel'); });
            b.classList.add('sel');
          };
        });
        var stars = f.querySelectorAll('[data-star]');
        stars.forEach(function(s){
          s.onclick = function(){
            star = parseInt(s.getAttribute('data-star'),10);
            stars.forEach(function(x){ x.classList.toggle('on', parseInt(x.getAttribute('data-star'),10) <= star); });
          };
        });
        f.querySelector('.st-rev-submit').onclick = async function(){
          if (okv === null){ alert(T.pickReceived); return; }
          var btn = this; btn.disabled = true; btn.textContent = T.submitting;
          try {
            var ins = await sb.from('franchise_order_reviews').insert({
              order_id: parseInt(f.getAttribute('data-oid'),10),
              franchise_slug: slug,
              customer_phone: phone,
              received_ok: okv,
              rating: star || null,
              comment: (f.querySelector('textarea').value||'').trim() || null
            });
            if (ins.error) throw ins.error;
            lookupOrders();
          } catch(e){
            alert(T.reviewFail + (e.message||e));
            btn.disabled = false; btn.textContent = T.reviewSubmit;
          }
        };
      });
    }
  }

  run();
})();
</script>
</body>
</html>
