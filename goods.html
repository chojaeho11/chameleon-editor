}

}

}
.hero p {
    font-size: 16px; color: #475569; max-width: 640px; margin: 0 auto 28px;
    font-weight: 500;
}
.hero-cta {

.cat-icon { font-size: 15px; }

.product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px;

.product-card {
    background: #fff; border-radius: 14px; overflow: hidden;

    border: 1px solid var(--border);

.product-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 16px 32px -12px rgba(0,0,0,0.18);
    border-color: transparent;
}
.product-thumb {
    aspect-ratio: 1/1; position: relative; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
}
.product-thumb img {
    width: 100%; height: 100%; object-fit: cover;
    transition: transform 0.4s;
}
.product-card:hover .product-thumb img { transform: scale(1.06); }
.product-thumb-placeholder {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 64px; opacity: 0.55;

.product-info {
    padding: 14px 16px 16px;

            { id:'canvas',  dbCat:'pkg_pouch_canvas',  kr:'캔버스',     ja:'キャンバス', en:'Canvas' },
            { id:'leather', dbCat:'pkg_pouch_leather', kr:'가죽',       ja:'レザー',     en:'Leather' },
            { id:'pvc',     dbCat:'pkg_pouch_pvc',     kr:'비닐 파우치', ja:'ビニール',   en:'Clear PVC' }
        ]},
        { id:'folding', icon:'📂', dbCat:'pkg_fold', kr:'폴딩박스', ja:'折り畳みボックス', en:'Folding Box', subs:[
            { id:'mag',    dbCat:'pkg_fold_mag',    kr:'자석 폴딩',   ja:'マグネット折', en:'Magnetic' },
            { id:'ribbon', dbCat:'pkg_fold_ribbon', kr:'리본 폴딩',   ja:'リボン折',     en:'Ribbon' },
            { id:'auto',   dbCat:'pkg_fold_auto',   kr:'자동 조립',   ja:'自動組立',     en:'Auto-assembly' }
        ]},
        { id:'label', icon:'🏷️', dbCat:'pkg_label', kr:'라벨·스티커', ja:'ラベル・シール', en:'Label / Sticker', subs:[
            { id:'round', dbCat:'pkg_label_round', kr:'원형',     ja:'円形',         en:'Round' },
            { id:'sq',    dbCat:'pkg_label_sq',    kr:'사각',     ja:'角型',         en:'Square' },
            { id:'clear', dbCat:'pkg_label_clear', kr:'투명',     ja:'透明',         en:'Clear' },
            { id:'metal', dbCat:'pkg_label_metal', kr:'메탈',     ja:'メタル',       en:'Metallic' },
            { id:'holo',  dbCat:'pkg_label_holo',  kr:'홀로그램', ja:'ホログラム',   en:'Holographic' }
        ]},
        { id:'parts', icon:'🎀', dbCat:'pkg_parts', kr:'부자재', ja:'副資材', en:'Accessories', subs:[
            { id:'ribbon', dbCat:'pkg_parts_ribbon', kr:'리본',       ja:'リボン',       en:'Ribbon' },
            { id:'tissue', dbCat:'pkg_parts_tissue', kr:'티슈 페이퍼', ja:'ティッシュ',   en:'Tissue Paper' },
            { id:'string', dbCat:'pkg_parts_string', kr:'끈·핸들',    ja:'紐・ハンドル', en:'String / Handle' },
            { id:'seal',   dbCat:'pkg_parts_seal',   kr:'봉투 씰',     ja:'封筒シール',   en:'Envelope Seal' }
        ]}
    ];

    // 카테고리별 placeholder 그라데이션 (실제 이미지 등록 전까지)
    var CAT_GRADIENT = {
        all:      'linear-gradient(135deg,#f3e8ff,#fae8ff)',
        paperbox: 'linear-gradient(135deg,#fef3c7,#fde68a)',
        shopbag:  'linear-gradient(135deg,#fce7f3,#fbcfe8)',
        nonwoven: 'linear-gradient(135deg,#dcfce7,#bbf7d0)',
        plastic:  'linear-gradient(135deg,#dbeafe,#bfdbfe)',
        reuse:    'linear-gradient(135deg,#d1fae5,#a7f3d0)',
        tin:      'linear-gradient(135deg,#fef9c3,#fef08a)',
        pouch:    'linear-gradient(135deg,#fae8ff,#f5d0fe)',
        folding:  'linear-gradient(135deg,#fed7aa,#fdba74)',
        label:    'linear-gradient(135deg,#fecaca,#fca5a5)',
        parts:    'linear-gradient(135deg,#e9d5ff,#d8b4fe)'
    };

    var currentCatId = 'all';
    var currentSubId = null;   // 서브카테고리 필터 (null = 메인 카테고리 전체)
    var allProducts = [];      // DB 에서 로드한 패키지 카테고리 상품 전체

    // ─── i18n 라벨 적용 ───
    function applyI18n() {
        var $ = function(id){ return document.getElementById(id); };
        if ($('heroTitle'))    $('heroTitle').innerHTML    = t('heroTitle');
        if ($('heroDesc'))     $('heroDesc').textContent   = t('heroDesc');
        if ($('heroCtaLabel')) $('heroCtaLabel').textContent = t('heroCta');
        if ($('emptyMsg'))     $('emptyMsg').textContent   = t('emptyMsg');
        if ($('emptyHint'))    $('emptyHint').textContent  = t('emptyHint');
        if ($('footerDesc'))   $('footerDesc').textContent = t('footerDesc');
        // 페이지 타이틀
        document.title = LANG === 'ja' ? 'パッケージグッズ - Chameleon Printing'
                       : LANG === 'en' ? 'Package Goods - Chameleon Printing'
                       : '패키지 굿즈 - 카멜레온프린팅';
        // 언어 셀렉터 active
        document.querySelectorAll('#langSelector button').forEach(function(b){
            b.classList.toggle('active', b.getAttribute('data-lang') === LANG);
        });
    }

    // ─── 카테고리 탭 렌더 ───
    function renderCatNav() {
        var nav = document.getElementById('catNav');
        if (!nav) return;
        nav.innerHTML = CATS.map(function(c){
            var label = c[LANG] || c.kr;
            return '<button class="cat-btn' + (c.id === currentCatId ? ' active' : '') + '" ' +
                   'data-cat="' + c.id + '" onclick="window._goodsSwitchCat(\'' + c.id + '\')">' +
                   '<span class="cat-icon">' + c.icon + '</span>' +
                   '<span>' + label + '</span>' +
                   '</button>';
        }).join('');
        renderSubNav();
    }

    // ─── 서브카테고리 칩 렌더 (메인이 'all' 이거나 subs 가 비어있으면 숨김) ───
    function renderSubNav() {
        var subNav = document.getElementById('subNav');
        if (!subNav) return;
        var cat = CATS.find(function(c){ return c.id === currentCatId; });
        if (!cat || !cat.subs || cat.subs.length === 0) {
            subNav.style.display = 'none';
            subNav.innerHTML = '';
            return;
        }
        var allLabel = LANG === 'ja' ? 'すべて' : LANG === 'en' ? 'All' : '전체';
        var chips = '<button class="sub-btn' + (!currentSubId ? ' active' : '') + '" ' +
                    'onclick="window._goodsSwitchSub(null)">' + allLabel + '</button>';
        chips += cat.subs.map(function(s){
            var label = s[LANG] || s.kr;
            return '<button class="sub-btn' + (s.id === currentSubId ? ' active' : '') + '" ' +
                   'data-sub="' + s.id + '" onclick="window._goodsSwitchSub(\'' + s.id + '\')">' +
                   label + '</button>';
        }).join('');
        subNav.innerHTML = chips;
        subNav.style.display = 'flex';
    }

    // ─── 상품 카드 HTML ───
    function productCard(p) {
        var name = LANG === 'ja' ? (p.name_jp || p.name) :
                   LANG === 'en' ? (p.name_us || p.name) :
                                   (p.name_kr || p.name);
        var price = p.price || 0;
        var priceStr = price > 0 ? formatPrice(price) : '';
        var imgHtml = p.img_url
            ? '<img src="' + escapeHtml(p.img_url) + '" alt="' + escapeHtml(name) + '" loading="lazy">'
            : placeholderThumb(p);
        return '<div class="product-card" onclick="window._goodsOpenProduct(\'' + escapeJs(p.code) + '\')">' +
            '<div class="product-thumb" style="background:' + (CAT_GRADIENT[mapDbCatToId(p.category)] || CAT_GRADIENT.all) + ';">' +
            imgHtml +
            '</div>' +
            '<div class="product-info">' +
              '<div class="product-name">' + escapeHtml(name) + '</div>' +
              '<div class="product-meta">' +
                (priceStr ? '<span class="product-price">' + priceStr + '</span>'
                          : '<span class="badge-custom">' + t('customBadge') + '</span>') +
                '<span><i class="fa-solid fa-arrow-right" style="font-size:10px;"></i></span>' +
              '</div>' +
            '</div>' +
        '</div>';
    }

    function placeholderThumb(p) {
        // 메인 카테고리 prefix 매칭으로 아이콘 선택 (서브카 pkg_box_mag → 📦)
        var cat = findMainCat(p.category) || CATS[0];
        return '<div class="product-thumb-placeholder">' +
               '<div style="text-align:center;">' +
                 '<div style="font-size:72px; line-height:1;">' + cat.icon + '</div>' +
                 '<div style="margin-top:8px; font-size:10px; font-weight:800; color:rgba(30,41,59,0.4); letter-spacing:1px;">CHAMELEON</div>' +
               '</div>' +
               '</div>';
    }

    // 서브카 코드(pkg_box_mag)·메인 코드(pkg_box) 모두 메인 CAT 객체로 매핑
    function findMainCat(dbCat) {
        if (!dbCat) return null;
        return CATS.find(function(c){
            return c.dbCat && (c.dbCat === dbCat || dbCat.indexOf(c.dbCat + '_') === 0 || dbCat === c.dbCat);
        });
    }

    function mapDbCatToId(dbCat) {
        var hit = findMainCat(dbCat);
        return hit ? hit.id : 'all';
    }

    function formatPrice(krw) {
        if (LANG === 'ja') return '¥' + Math.round(krw * 0.1).toLocaleString();
        if (LANG === 'en') return '$' + (Math.round(krw * 0.001 * 100) / 100).toFixed(2);
        return krw.toLocaleString() + '원';
    }

    function escapeHtml(s) {
        return String(s || '').replace(/[&<>"']/g, function(c){
            return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
        });
    }
    function escapeJs(s) { return String(s || '').replace(/['\\]/g, '\\$&'); }

    // ─── 상품 그리드 렌더 ───
    function renderGrid() {
        var grid = document.getElementById('productGrid');
        var empty = document.getElementById('emptyState');
        var title = document.getElementById('curCatTitle');
        var countEl = document.getElementById('curCatCount');
        if (!grid) return;

        var cat = CATS.find(function(c){ return c.id === currentCatId; }) || CATS[0];
        var sub = (cat.subs || []).find(function(s){ return s.id === currentSubId; });

        // 타이틀: 서브 선택 시 "메인 · 서브" 표기
        var label = cat[LANG] || cat.kr;
        if (sub) label += ' · ' + (sub[LANG] || sub.kr);
        title.textContent = label;

        // 필터링: all → 전체 / sub 선택 → 정확 매칭 / 메인만 → prefix 매칭
        var list;
        if (currentCatId === 'all') {
            list = allProducts;
        } else if (sub) {
            list = allProducts.filter(function(p){ return p.category === sub.dbCat; });
        } else {
            // 메인 카테고리 prefix 매칭 — 서브카 코드 (pkg_box_mag) 도 포함
            list = allProducts.filter(function(p){
                return p.category && (p.category === cat.dbCat || p.category.indexOf(cat.dbCat + '_') === 0);
            });
        }

        countEl.textContent = list.length ? (list.length + t('countSuffix')) : '';

        if (list.length === 0) {
            grid.innerHTML = '';
            empty.style.display = '';
            return;
        }
        empty.style.display = 'none';
        grid.innerHTML = list.map(productCard).join('');
    }

    // ─── 상품 로드 (DB) ───
    async function loadProducts() {
        var grid = document.getElementById('productGrid');
        // 스켈레톤 표시
        if (grid) {
            var skel = '';
            for (var i = 0; i < 8; i++) {
                skel += '<div class="product-card"><div class="product-thumb skeleton"></div>' +
                        '<div class="product-info"><div style="height:14px; background:#f1f5f9; border-radius:4px; margin-bottom:8px;"></div>' +
                        '<div style="height:12px; background:#f1f5f9; border-radius:4px; width:60%;"></div></div></div>';
            }
            grid.innerHTML = skel;
        }
        if (!SB) {
            allProducts = [];
            renderGrid();
            return;
        }
        try {
            // 패키지 굿즈 카테고리 — pkg_* prefix 매칭 (서브카 코드 pkg_box_mag 등 모두 포함)
            var res = await SB.from('admin_products')
                .select('code, category, name, name_kr, name_jp, name_us, price, img_url, description')
                .like('category', 'pkg_%')
                .order('code', { ascending: true })
                .limit(2000);
            if (res.error) {
                console.warn('[goods] DB load error:', res.error.message);
                allProducts = [];
            } else {
                allProducts = res.data || [];
            }
        } catch (e) {
            console.warn('[goods] DB exception:', e);
            allProducts = [];
        }
        renderGrid();
    }

    // ─── 카테고리 전환 ───
    window._goodsSwitchCat = function(catId) {
        currentCatId = catId;
        currentSubId = null;   // 메인 바뀌면 서브 리셋
        document.querySelectorAll('.cat-btn').forEach(function(b){
            b.classList.toggle('active', b.getAttribute('data-cat') === catId);
        });
        renderSubNav();   // 서브 칩 갱신 (해당 카테고리의 subs 또는 숨김)
        renderGrid();
        if (window.innerWidth <= 768) {
            var sec = document.querySelector('.products-wrap');
            if (sec) sec.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
    };

    // ─── 서브카테고리 전환 ───
    window._goodsSwitchSub = function(subId) {
        currentSubId = subId;
        document.querySelectorAll('.sub-btn').forEach(function(b){
            b.classList.toggle('active', b.getAttribute('data-sub') === subId || (!subId && !b.getAttribute('data-sub')));
        });
        renderGrid();
    };

    // ─── 언어 전환 ───
    window._goodsSwitchLang = function(lang) {
        if (!I18N[lang]) return;
        var u = new URL(location.href);
        u.searchParams.set('lang', lang);
        location.href = u.toString();
    };

    // ─── 상품 클릭 → 메인 페이지의 simple_order 모달 진입 ───
    window._goodsOpenProduct = function(code) {
        if (!code) return;
        // 메인 페이지로 product 파라미터 전달 → loadProductDetailAndOpen 자동 호출
        var u = '/?product=' + encodeURIComponent(code);
        if (LANG !== 'ko') u += '&lang=' + LANG;
        location.href = u;
    };

    // ─── 초기화 ───
    function init() {
        applyI18n();
        renderCatNav();
        loadProducts();
    }
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
})();
</script>

</body>
</html>
