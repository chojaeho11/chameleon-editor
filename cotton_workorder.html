<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>작업지시서 - Cotton Print</title>
<meta name="robots" content="noindex,nofollow">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root { --brown-dark:#451a03; --brown:#78350f; --accent:#b45309; --cream:#faf6ed; --cream-dark:#f3ead4; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Noto Sans KR',sans-serif; background:#e7e5e4; color:#1f2937; padding:20px 0; }
.toolbar { max-width:794px; margin:0 auto 16px; display:flex; gap:8px; padding:0 8px; }
.toolbar button, .toolbar a { padding:10px 18px; border:none; border-radius:8px; background:var(--brown-dark); color:#fde047; font-weight:700; font-size:13px; cursor:pointer; font-family:inherit; text-decoration:none; display:inline-flex; align-items:center; gap:6px; }
.toolbar button.outline, .toolbar a.outline { background:#fff; color:var(--brown-dark); border:1px solid var(--cream-dark); }

.sheet { width:794px; min-height:1123px; margin:0 auto; background:#fff; padding:30px 38px; box-shadow:0 4px 20px rgba(0,0,0,0.1); position:relative; }
.head { display:flex; justify-content:space-between; align-items:center; padding-bottom:14px; border-bottom:3px solid var(--brown-dark); }
.head .logo { font-family:Georgia,serif; font-size:24px; font-weight:900; letter-spacing:5px; color:var(--brown-dark); }
.head .title { font-size:22px; font-weight:900; color:var(--brown-dark); letter-spacing:6px; }
.head .meta { text-align:right; font-size:11px; color:#6b7280; line-height:1.6; }

.section { margin-top:20px; }
.section-title { font-size:13px; font-weight:900; color:var(--brown-dark); padding:7px 12px; background:var(--cream); border-left:4px solid var(--accent); margin-bottom:8px; }
.kv { display:grid; grid-template-columns:120px 1fr 120px 1fr; gap:0; border:1px solid #d1d5db; }
.kv > div { padding:9px 12px; border-bottom:1px solid #e5e7eb; font-size:12px; }
.kv > div:nth-child(4n+1), .kv > div:nth-child(4n+3) { background:#f9fafb; font-weight:700; color:var(--brown-dark); }
.kv > div.fullkey { grid-column:span 1; }
.kv > div.fullval { grid-column:span 3; }

.item { border:1px solid #d1d5db; margin-bottom:14px; }
.item-head { display:flex; justify-content:space-between; align-items:center; padding:10px 14px; background:var(--cream); border-bottom:1px solid #d1d5db; }
.item-head .name { font-size:14px; font-weight:900; color:var(--brown-dark); }
.item-head .price { font-size:14px; font-weight:900; color:#dc2626; }
.item-body { display:grid; grid-template-columns:160px 1fr; gap:12px; padding:12px 14px; }
.item-thumb { width:160px; height:160px; background:#f5f5f4; border:1px solid #e5e7eb; border-radius:6px; overflow:hidden; display:flex; align-items:center; justify-content:center; }
.item-thumb img { max-width:100%; max-height:100%; object-fit:contain; }
.item-spec { display:grid; grid-template-columns:90px 1fr; gap:4px 8px; font-size:11px; align-content:start; }
.item-spec .lbl { color:#6b7280; font-weight:700; }
.item-spec .val { color:#1f2937; font-weight:600; }
.item-spec .val b { color:var(--accent); }

.summary { background:var(--brown-dark); color:#fde047; padding:14px 18px; border-radius:6px; display:flex; justify-content:space-between; align-items:center; margin-top:14px; }
.summary .lbl { font-size:13px; font-weight:700; opacity:0.9; }
.summary .amt { font-size:24px; font-weight:900; }

.foot { position:absolute; bottom:18px; left:38px; right:38px; padding-top:12px; border-top:1px solid #e5e7eb; font-size:10px; color:#9ca3af; display:flex; justify-content:space-between; }

.barcode-area { text-align:center; margin-top:16px; padding:14px; background:#f9fafb; border:1px dashed #d1d5db; border-radius:6px; }
.barcode-area .order-no { font-family:'SF Mono','Roboto Mono',monospace; font-size:18px; font-weight:900; color:var(--brown-dark); letter-spacing:2px; }
.barcode-area .order-date { font-size:11px; color:#6b7280; margin-top:4px; }

.note { margin-top:14px; padding:12px 14px; background:#fef9c3; border-left:4px solid #facc15; border-radius:4px; font-size:11px; color:#78350f; line-height:1.6; }

@media print {
    body { background:#fff; padding:0; }
    .toolbar { display:none !important; }
    .sheet { box-shadow:none; width:100%; min-height:auto; padding:20mm; }
}
@media (max-width:820px) {
    .sheet { width:100%; padding:20px; }
}
</style>
</head>
<body>

<div class="toolbar">
    <button onclick="window.print()"><i class="fa-solid fa-print"></i> 인쇄</button>
    <a href="javascript:history.back()" class="outline"><i class="fa-solid fa-arrow-left"></i> 돌아가기</a>
    <span style="margin-left:auto; font-size:12px; color:#6b7280; align-self:center;">A4 가로 한 장 · Ctrl+P 인쇄</span>
</div>

<div id="loading" style="text-align:center; padding:60px; color:#6b7280;">
    <i class="fa-solid fa-spinner fa-spin" style="font-size:32px;"></i>
    <div style="margin-top:12px;">작업지시서 불러오는 중...</div>
</div>

<div class="sheet" id="sheet" style="display:none;">
    <div class="head">
        <div>
            <div class="logo">COTTON PRINT</div>
            <div style="font-size:10px; color:#9ca3af; letter-spacing:2px; margin-top:2px;">— PATTERN FABRIC PRINT WORK ORDER —</div>
        </div>
        <div class="title">작 업 지 시 서</div>
        <div class="meta">
            <div>(주)카멜레온프린팅</div>
            <div>경기도 화성시 우정읍 한말길 72-2</div>
            <div>031-366-1984 · design@chameleon.design</div>
        </div>
    </div>

    <div class="barcode-area">
        <div class="order-no" id="woOrderNo">#0000</div>
        <div class="order-date" id="woOrderDate">-</div>
    </div>

    <div class="section">
        <div class="section-title">주문자 정보</div>
        <div class="kv">
            <div class="fullkey">받는 분</div><div id="woName">-</div>
            <div class="fullkey">연락처</div><div id="woPhone">-</div>
            <div class="fullkey">배송지</div><div class="fullval" id="woAddress">-</div>
            <div class="fullkey">메모</div><div class="fullval" id="woMemo">-</div>
            <div class="fullkey">결제</div><div id="woPayment">-</div>
            <div class="fullkey">상태</div><div id="woStatus">-</div>
        </div>
    </div>

    <div class="section">
        <div class="section-title">제작 항목 (<span id="woItemCount">0</span>건)</div>
        <div id="woItemList"></div>
    </div>

    <div class="summary">
        <span class="lbl">합계 결제금액</span>
        <span class="amt" id="woTotal">0원</span>
    </div>

    <div class="note" id="woAdminNote" style="display:none;"></div>

    <div class="foot">
        <span>발행일: <span id="woPrintDate"></span></span>
        <span>Cotton Print · 카멜레온프린팅 패브릭 사업부</span>
    </div>
</div>

<script>
const SB_URL = 'https://qinvtnhiidtmrzosyvys.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFpbnZ0bmhpaWR0bXJ6b3N5dnlzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjMyMDE3NjQsImV4cCI6MjA3ODc3Nzc2NH0.3z0f7R4w3bqXTOMTi19ksKSeAkx8HOOTONNSos8Xz8Y';
const sb = window.supabase.createClient(SB_URL, SB_KEY);

function fmt(n) { return (n||0).toLocaleString('ko-KR'); }
function dt(s) { if (!s) return '-'; const d = new Date(s); return d.getFullYear()+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+String(d.getDate()).padStart(2,'0')+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }

function show(id, val) { const el = document.getElementById(id); if (el) el.textContent = val||'-'; }

(async function() {
    const params = new URLSearchParams(location.search);
    const orderId = params.get('id') || params.get('order_id') || params.get('db_id');
    if (!orderId) { document.getElementById('loading').innerHTML = '<div style="color:#dc2626;">주문 ID가 필요합니다 (?id=NNN)</div>'; return; }

    try {
        const { data: order, error } = await sb.from('orders').select('*').eq('id', orderId).single();
        if (error || !order) { document.getElementById('loading').innerHTML = '<div style="color:#dc2626;">주문을 찾을 수 없습니다.</div>'; return; }

        document.getElementById('loading').style.display = 'none';
        document.getElementById('sheet').style.display = '';

        show('woOrderNo', '#' + order.id);
        show('woOrderDate', dt(order.order_date));
        show('woName', order.manager_name || '-');
        show('woPhone', order.phone || '-');
        show('woAddress', order.address || '-');
        show('woMemo', order.request_note || '-');
        show('woPayment', order.payment_method || '-' + ' / ' + (order.payment_status || '-'));
        document.getElementById('woPayment').textContent = (order.payment_method||'-') + ' · ' + (order.payment_status||'-');
        show('woStatus', order.status || '-');
        show('woTotal', fmt(order.total_amount) + '원');
        show('woPrintDate', dt(new Date().toISOString()));

        // admin_note (Cotton Print 출처 등)
        if (order.admin_note) {
            const note = document.getElementById('woAdminNote');
            note.style.display = '';
            note.innerHTML = '<b>관리자 메모:</b><br>' + order.admin_note.replace(/\n/g, '<br>');
        }

        // 파일 (디자인 이미지) 매핑 - files[]
        const fileMap = {};
        (order.files || []).forEach((f, i) => { fileMap[i] = f.url; });

        // items 렌더링
        const items = order.items || [];
        document.getElementById('woItemCount').textContent = items.length;
        const list = document.getElementById('woItemList');
        list.innerHTML = items.map((it, i) => {
            const thumb = fileMap[i] || '';
            const addons = (it.addons||[]).map(a => `${a.name}${a.price?' (+'+fmt(a.price)+'원)':''}`).join(', ');
            const widthCm = it.width_cm || (it.width_mm? it.width_mm/10 : '-');
            const heightCm = it.height_cm || (it.height_mm? it.height_mm/10 : '-');
            return `<div class="item">
                <div class="item-head">
                    <div class="name">${i+1}. ${it.product_name || it.fabric || '제작 항목'}</div>
                    <div class="price">${fmt(it.price)}원</div>
                </div>
                <div class="item-body">
                    <div class="item-thumb">
                        ${thumb ? `<img src="${thumb}" alt="design ${i+1}">` : '<i class="fa-solid fa-image" style="font-size:32px; color:#d1d5db;"></i>'}
                    </div>
                    <div class="item-spec">
                        <div class="lbl">원단</div><div class="val">${it.fabric || '-'}</div>
                        <div class="lbl">출력 사이즈</div><div class="val"><b>${widthCm}×${heightCm}cm</b> (회배 ${it.hoebae?it.hoebae.toFixed(2):'1.0'})</div>
                        <div class="lbl">레이아웃</div><div class="val">${it.layout || '-'}</div>
                        <div class="lbl">수량</div><div class="val"><b>${it.qty || 1}개</b></div>
                        <div class="lbl">단가 (출력)</div><div class="val">${fmt(it.unit_price)}원</div>
                        <div class="lbl">옵션</div><div class="val">${addons || '-'}</div>
                    </div>
                </div>
            </div>`;
        }).join('');

    } catch (e) {
        document.getElementById('loading').innerHTML = '<div style="color:#dc2626;">오류: '+e.message+'</div>';
    }
})();
</script>
</body>
</html>
