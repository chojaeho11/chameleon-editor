*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Pretendard',sans-serif;background:#f8f9fc;color:#1e293b;min-height:100vh;}
.nav{background:#fff;border-bottom:1px solid #f1f5f9;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none;color:#1e293b;font-size:18px;font-weight:900;}
.nav-logo i{color:#7c3aed;font-size:20px;}
.nav-right{display:flex;gap:6px;}

.lang-btn.active{background:#7c3aed;color:#fff;border-color:#7c3aed;}

.hero h1 em{font-style:normal;color:#d97706;}
.hero p{font-size:14px;color:#92400e;max-width:480px;margin:0 auto;line-height:1.6;}
.container{max-width:800px;margin:0 auto;padding:24px 20px 60px;}
.auth-section{background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:20px;margin-bottom:20px;}
.auth-title{font-size:15px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.auth-row{display:flex;gap:8px;margin-bottom:10px;}
.auth-row input{flex:1;padding:10px 12px;border:1px solid #d1d5db;border-radius:10px;font-size:14px;font-family:inherit;}
.auth-row input:focus{outline:none;border-color:#7c3aed;box-shadow:0 0 0 3px rgba(124,58,237,0.12);}
.auth-btns{display:flex;gap:8px;}
.auth-btns button{padding:10px 18px;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.btn-login{background:#7c3aed;color:#fff;}
.btn-login:hover{background:#6d28d9;}
.btn-signup{background:#f1f5f9;color:#475569;}

.auth-error{color:#ef4444;font-size:12px;margin-top:6px;display:none;}
.auth-logged-in{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.auth-logged-in .email{font-size:14px;font-weight:700;color:#7c3aed;}
.btn-logout{padding:8px 14px;border:1px solid #fca5a5;background:#fff;border-radius:8px;font-size:12px;font-weight:700;color:#ef4444;cursor:pointer;font-family:inherit;}
.tabs{display:flex;gap:8px;margin-bottom:20px;}
.tab-btn{padding:10px 20px;border:1.5px solid #e2e8f0;background:#fff;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;color:#64748b;transition:all .15s;}
.tab-btn.active{background:#d97706;color:#fff;border-color:#d97706;}
.filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.filters select{padding:8px 12px;border:1px solid #d1d5db;border-radius:10px;font-size:13px;font-family:inherit;background:#fff;}
.filters select:focus{outline:none;border-color:#7c3aed;}
.card-grid{display:grid;gap:14px;}
.job-card{background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:20px;transition:all .2s;cursor:pointer;}
.job-card:hover{border-color:#fde68a;box-shadow:0 8px 24px rgba(217,119,6,0.08);transform:translateY(-1px);}
.job-card .top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.job-card h3{font-size:16px;font-weight:800;color:#0f172a;margin-bottom:4px;}
.job-card .pay{font-size:18px;font-weight:900;color:#d97706;}
.job-card .meta{display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:#64748b;margin-bottom:8px;}
.job-card .meta span{display:flex;align-items:center;gap:4px;}
.job-card .desc{font-size:13px;color:#475569;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.badge-type{display:inline-block;padding:3px 10px;border-radius:999px;font-size:10px;font-weight:800;margin-bottom:8px;}
.badge-part-time{background:#fef3c7;color:#92400e;}
.badge-full-time{background:#dbeafe;color:#1e40af;}
.badge-one-day{background:#fce7f3;color:#9d174d;}
.badge-free{background:#dcfce7;color:#166534;font-size:11px;font-weight:800;padding:4px 12px;border-radius:999px;}
.apply-section{background:#f8fafc;border-top:1px solid #f1f5f9;margin:16px -20px -20px;padding:16px 20px;border-radius:0 0 16px 16px;}
.apply-section h4{font-size:13px;font-weight:700;margin-bottom:10px;color:#475569;}
.apply-row{display:flex;gap:8px;}
.apply-row input,.apply-row textarea{flex:1;padding:10px;border:1px solid #d1d5db;border-radius:8px;font-size:13px;font-family:inherit;}
.apply-row textarea{min-height:60px;resize:vertical;}
.apply-btn{padding:10px 18px;background:#d97706;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;}
.form-card{background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:24px;margin-bottom:20px;}
.form-card.disabled{opacity:0.5;pointer-events:none;}
.section-title{font-size:16px;font-weight:800;margin-bottom:16px;display:flex;align-items:center;gap:8px;color:#0f172a;padding-bottom:10px;border-bottom:1px solid #f1f5f9;}
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:13px;font-weight:700;color:#475569;margin-bottom:6px;}
.form-group label .req{color:#ef4444;}
.form-input{width:100%;padding:10px 12px;border:1px solid #d1d5db;border-radius:10px;font-size:14px;font-family:inherit;background:#fff;}
.form-input:focus{outline:none;border-color:#7c3aed;box-shadow:0 0 0 3px rgba(124,58,237,0.12);}
select.form-input{appearance:auto;}
textarea.form-input{resize:vertical;min-height:80px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

.submit-btn{width:100%;padding:14px;background:linear-gradient(135deg,#d97706,#b45309);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;margin-top:8px;}

.submit-btn:disabled{opacity:0.5;cursor:not-allowed;}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#0f172a;color:#fff;padding:12px 24px;border-radius:12px;font-size:14px;font-weight:700;z-index:999;display:none;box-shadow:0 8px 32px rgba(0,0,0,0.2);}
.toast.show{display:block;animation:fadeUp .3s;}
@keyframes fadeUp{from{opacity:0;transform:translateX(-50%) translateY(10px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
.foot{text-align:center;padding:32px 20px;color:#94a3b8;font-size:12px;border-top:1px solid #f1f5f9;}
.foot a{color:#7c3aed;text-decoration:none;font-weight:700;}
@media(max-width:640px){.container{padding:16px 14px 40px;}.form-card,.auth-section{padding:16px;}}

                <div class="form-group">
                    <label id="lblLocation"></label>

function formatPay(v){return v?Number(v).toLocaleString():'0';}

function typeBadge(type){
    const cls={['part-time']:'badge-part-time',['full-time']:'badge-full-time',['one-day']:'badge-one-day'}[type]||'badge-part-time';
    const label={['part-time']:t('partTime'),['full-time']:t('fullTime'),['one-day']:t('oneDay')}[type]||type;
    return `<span class="badge-type ${cls}">${label}</span>`;
}

// Auth
async function checkAuth(){
    const{data:{session}}=await sb.auth.getSession();
    if(session){
        currentUser=session.user;
        document.getElementById('authLoggedOut').style.display='none';
        document.getElementById('authLoggedIn').style.display='block';
        document.getElementById('userEmail').textContent=session.user.email;
        document.getElementById('postForm').classList.remove('disabled');
    } else {
        currentUser=null;
        document.getElementById('authLoggedOut').style.display='block';
        document.getElementById('authLoggedIn').style.display='none';
        document.getElementById('postForm').classList.add('disabled');
    }
}
async function doLogin(){
    const email=document.getElementById('authEmail').value.trim();
    const pw=document.getElementById('authPw').value;
    const{error}=await sb.auth.signInWithPassword({email,password:pw});
    if(error){document.getElementById('authError').textContent=error.message;document.getElementById('authError').style.display='block';return;}
    document.getElementById('authError').style.display='none';
    checkAuth();
}
async function doSignup(){
    const email=document.getElementById('authEmail').value.trim();
    const pw=document.getElementById('authPw').value;
    const{error}=await sb.auth.signUp({email,password:pw});
    if(error){document.getElementById('authError').textContent=error.message;document.getElementById('authError').style.display='block';return;}
    document.getElementById('authError').style.display='none';
    toast(t('signup')+' OK!');
    checkAuth();
}
async function doLogout(){
    await sb.auth.signOut();
    currentUser=null;
    checkAuth();
}

// Tabs
function switchTab(tab){
    document.getElementById('browseTab').style.display=tab==='browse'?'block':'none';
    document.getElementById('postTab').style.display=tab==='post'?'block':'none';
    document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===(tab==='browse'?0:1)));
}

// Load jobs
async function loadJobs(){
    const type=document.getElementById('filterType').value;
    const city=document.getElementById('filterCity').value;
    const sort=document.getElementById('sortBy').value;
    let q=sb.from('community_jobs').select('*').eq('status','active');
    if(type)q=q.eq('job_type',type);
    if(city)q=q.eq('location_city',city);
    if(sort==='pay')q=q.order('hourly_rate',{ascending:false});
    else q=q.order('created_at',{ascending:false});
    q=q.limit(50);
    const{data,error}=await q;
    const list=document.getElementById('jobList');
    if(error||!data||data.length===0){
        list.innerHTML=`<div class="empty"><i class="fa-solid fa-briefcase"></i>${t('empty')}</div>`;
        return;
    }
    list.innerHTML=data.map(j=>`
        <div class="job-card" data-id="${j.id}">
            ${typeBadge(j.job_type)}
            <div class="top">
                <h3>${esc(j.title)}</h3>
                <span class="pay">${formatPay(j.hourly_rate)} ${t('perHour')}</span>
            </div>
            <div class="meta">
                <span><i class="fa-solid fa-location-dot"></i> ${esc(j.location_city||'')} ${esc(j.location_detail||'')}</span>
                <span><i class="fa-solid fa-calendar"></i> ${esc(j.work_days||'')}</span>
                <span><i class="fa-solid fa-clock"></i> ${esc(j.work_hours||'')}</span>
            </div>
            ${j.description?`<div class="desc">${esc(j.description)}</div>`:''}
            ${j.contact_phone?`<div class="meta" style="margin-top:6px"><span><i class="fa-solid fa-phone"></i> ${esc(j.contact_phone)}</span></div>`:''}
            <div class="apply-section">
                <h4>${t('apply')}</h4>
                <div class="apply-row" style="flex-direction:column;gap:6px;">
                    <input placeholder="${t('applyPhone')}" id="applyPhone_${j.id}">
                    <textarea placeholder="${t('applyMsg')}" id="applyMsg_${j.id}" style="min-height:50px;"></textarea>
                    <button class="apply-btn" onclick="applyJob('${j.id}')">${t('apply')}</button>
                </div>
            </div>
        </div>
    `).join('');
    // Populate city filter
    const cities=[...new Set(data.map(j=>j.location_city).filter(Boolean))];
    const cf=document.getElementById('filterCity');
    const current=cf.value;
    cf.innerHTML=`<option value="">${t('allCities')}</option>`+cities.map(c=>`<option value="${esc(c)}"${c===current?' selected':''}>${esc(c)}</option>`).join('');
}

async function postJob(){
    if(!currentUser){toast(t('loginFirst'));return;}
    const title=document.getElementById('fTitle').value.trim();
    if(!title){toast(t('title')+' required');return;}
    const{error}=await sb.from('community_jobs').insert({
        poster_id:currentUser.id,
        title,
        description:document.getElementById('fDesc').value.trim()||null,
        job_type:document.getElementById('fJobType').value,
        hourly_rate:parseInt(document.getElementById('fHourly').value)||0,
        location_city:document.getElementById('fCity').value.trim()||null,
        location_detail:document.getElementById('fLocation').value.trim()||null,
        work_days:document.getElementById('fDays').value.trim()||null,
        work_hours:document.getElementById('fHours').value.trim()||null,
        contact_phone:document.getElementById('fPhone').value.trim()||null,
        country:LANG==='ja'?'JP':LANG==='en'?'US':'KR'
    });
    if(error){toast(error.message);return;}
    toast(t('posted'));
    document.getElementById('fTitle').value='';document.getElementById('fDesc').value='';
    document.getElementById('fHourly').value='';document.getElementById('fPhone').value='';
    switchTab('browse');loadJobs();
}

async function applyJob(jobId){
    if(!currentUser){toast(t('loginFirst'));return;}
    const phone=document.getElementById('applyPhone_'+jobId).value.trim();
    const msg=document.getElementById('applyMsg_'+jobId).value.trim();
    const{error}=await sb.from('community_job_applications').insert({
        job_id:jobId, applicant_id:currentUser.id, message:msg||null, phone:phone||null
    });
    if(error){toast(error.message);return;}
    toast(t('applied'));
}

function esc(s){if(!s)return'';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

renderI18n();
checkAuth();
loadJobs();
</script>
