<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Greeting Card</title>
<meta property="og:title" content="Greeting Card">
<meta property="og:description" content="A special greeting card for you">
<meta property="og:type" content="website">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✉️</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Georgia','Times New Roman',serif;overflow-x:hidden;min-height:100vh;display:flex;align-items:center;justify-content:center}
.container{max-width:420px;width:100%;margin:0 auto;position:relative;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.card-frame{position:relative;width:100%;border-radius:16px;overflow:hidden;box-shadow:0 12px 50px rgba(0,0,0,0.3)}
.card-frame img{width:100%;display:block}
.anim-layer{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.loading{text-align:center;padding:80px 20px;color:#fff;font-size:16px}
.loading .spinner{display:inline-block;width:40px;height:40px;border:3px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.footer-bar{text-align:center;padding:24px 20px;opacity:0.7}
.footer-bar a{color:#fff;text-decoration:none;font-size:13px;font-weight:600;background:rgba(255,255,255,0.15);padding:10px 20px;border-radius:20px;backdrop-filter:blur(4px)}
.footer-bar a:hover{background:rgba(255,255,255,0.25)}

/* Themes */
.theme-christmas{background:linear-gradient(180deg,#1a472a 0%,#0f2d1a 100%)}
.theme-newyear{background:linear-gradient(180deg,#0f172a 0%,#020617 100%)}
.theme-birthday{background:linear-gradient(180deg,#fef3c7 0%,#fde68a 100%)}
.theme-thankyou{background:linear-gradient(180deg,#f0fdf4 0%,#dcfce7 100%)}
.theme-congrats{background:linear-gradient(180deg,#fef9c3 0%,#fef08a 100%)}
.theme-valentines{background:linear-gradient(180deg,#fdf2f8 0%,#fce7f3 100%)}
</style>
</head>
<body>
<div class="container" id="viewer">
    <div class="loading">
        <div class="spinner"></div>
        <p style="margin-top:16px">Loading your card...</p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ═══ Animation generators (mirrors greeting-card-mode.js) ═══ */
var _injected = {};
function _kf(name, body) {
    if (_injected[name]) return;
    _injected[name] = 1;
    var s = document.createElement('style');
    s.textContent = '@keyframes ' + name + ' { ' + body + ' }';
    document.head.appendChild(s);
}

var COLORS = {
    christmas: ['#fff','#ffd700','#c41e3a','#ffa500'],
    newyear:   ['#ffd700','#a78bfa','#fff','#f59e0b'],
    birthday:  ['#f472b6','#a78bfa','#fbbf24','#34d399','#60a5fa'],
    thankyou:  ['#86efac','#16a34a','#fbbf24','#fff'],
    congrats:  ['#f97316','#fbbf24','#ef4444','#a78bfa','#34d399'],
    valentines:['#ec4899','#f9a8d4','#fff','#f472b6']
};

function createAnim(container, stk, category) {
    var type = stk.type, x = stk.x, y = stk.y, size = stk.size;
    var area = document.createElement('div');
    area.style.cssText = 'position:absolute;left:' + (x - size/2) + '%;top:' + (y - size/2) + '%;width:' + size + '%;height:' + size + '%;pointer-events:none;';

    var colors = COLORS[category] || COLORS.christmas;

    if (type === 'fireworks') animFireworks(area, colors);
    else if (type === 'hearts') animHearts(area, colors);
    else if (type === 'snow') animSnow(area);
    else if (type === 'confetti') animConfetti(area, colors);
    else if (type === 'sparkle') animSparkle(area, colors);
    else if (type === 'bow') animBow(area);
    else if (type === 'balloon') animBalloon(area, colors);
    else if (type === 'flower') animFlower(area);
    else if (type === 'star') animStar(area, colors);
    else if (type === 'fire') animFire(area);
    else if (type === 'rainbow') animRainbow(area);
    else if (type === 'lightning') animLightning(area, colors);
    else if (type === 'bubbles') animBubbles(area, colors);
    else if (type === 'shooting_star') animShootingStar(area, colors);
    else if (type === 'party') animParty(area, colors);
    else if (type === 'clap') animClap(area);
    else if (type === 'money') animMoney(area);
    else if (type === 'butterfly') animButterfly(area, colors);
    else if (type === 'rocket') animRocket(area);
    else if (type === 'love_letter') animLoveLetter(area, colors);
    else if (type === 'cherry_blossom') animCherryBlossom(area);
    else if (type === 'galaxy') animGalaxy(area, colors);
    else if (type === 'aurora') animAurora(area);
    else if (type === 'wave') animWave(area, colors);
    else if (type === 'leaves') animLeaves(area);
    else if (type === 'spotlight') animSpotlight(area, colors);
    else if (type === 'neon') animNeon(area, colors);
    else if (type === 'rose_petals') animRosePetals(area);
    else if (type === 'music_notes') animMusicNotes(area, colors);
    else if (type === 'glitter') animGlitter(area, colors);
    else if (type === 'fairy_dust') animFairyDust(area, colors);
    else if (type === 'firefly') animFirefly(area);
    else if (type === 'ribbon') animRibbon(area, colors);
    else if (type === 'champagne') animChampagne(area, colors);
    else if (type === 'snowman') animSnowman(area);
    else if (type === 'gift') animGift(area, colors);
    else if (type === 'dove') animDove(area);
    else if (type === 'rain') animRain(area);
    else if (type === 'tornado') animTornado(area, colors);
    else if (type === 'crown') animCrown(area, colors);

    container.appendChild(area);
}

function animFireworks(el, colors) {
    setInterval(function() {
        var cx = 30 + Math.random() * 40, cy = 20 + Math.random() * 40;
        var c = colors[Math.floor(Math.random() * colors.length)];
        for (var j = 0; j < 12; j++) {
            var dot = document.createElement('div');
            var angle = (j / 12) * Math.PI * 2;
            var dist = 25 + Math.random() * 25;
            var tx = Math.cos(angle) * dist, ty = Math.sin(angle) * dist;
            dot.style.cssText = 'position:absolute;left:' + cx + '%;top:' + cy + '%;width:4px;height:4px;border-radius:50%;background:' + c + ';transition:all 1s ease-out;transform:scale(1);opacity:1;';
            el.appendChild(dot);
            requestAnimationFrame(function(d, ttx, tty) { return function() { d.style.transform='translate('+ttx+'px,'+tty+'px) scale(0)'; d.style.opacity='0'; }; }(dot, tx, ty));
            setTimeout(function(d) { return function() { d.remove(); }; }(dot), 1200);
        }
    }, 1800);
}

function animHearts(el, colors) {
    var chars = ['\u2665','\uD83D\uDC95','\uD83D\uDC97','\uD83D\uDC96'];
    setInterval(function() {
        var h = document.createElement('div');
        var c = colors[Math.floor(Math.random() * colors.length)];
        var ch = chars[Math.floor(Math.random() * chars.length)];
        var sz = 12 + Math.random() * 16;
        h.textContent = ch;
        h.style.cssText = 'position:absolute;left:' + (20+Math.random()*60) + '%;bottom:0;font-size:' + sz + 'px;color:' + c + ';opacity:1;transition:all 2.5s ease-out;';
        el.appendChild(h);
        requestAnimationFrame(function() { h.style.bottom='100%'; h.style.opacity='0'; h.style.transform='translateX('+ (-20+Math.random()*40) +'px) scale(1.3)'; });
        setTimeout(function() { h.remove(); }, 2800);
    }, 400);
}

function animSnow(el) {
    _kf('gcSnowFall','0%{transform:translateY(0) rotate(0);opacity:1} 100%{transform:translateY(200%) rotate(360deg);opacity:0.2}');
    for (var i = 0; i < 8; i++) {
        var f = document.createElement('div');
        var sz = 6 + Math.random() * 12;
        var dur = 3 + Math.random() * 4;
        var delay = Math.random() * 3;
        f.textContent = Math.random() > 0.5 ? '\u2744' : '\u2022';
        f.style.cssText = 'position:absolute;left:' + Math.random()*100 + '%;top:-10%;font-size:' + sz + 'px;color:#fff;opacity:0.8;animation:gcSnowFall ' + dur + 's ' + delay + 's linear infinite;';
        el.appendChild(f);
    }
}

function animConfetti(el, colors) {
    _kf('gcConfettiFall','0%{transform:translateY(0) rotate(0) scale(1);opacity:1} 100%{transform:translateY(300%) rotate(720deg) scale(0.5);opacity:0}');
    for (var i = 0; i < 15; i++) {
        var c = colors[Math.floor(Math.random() * colors.length)];
        var w = 5 + Math.random() * 6, h = 3 + Math.random() * 5;
        var dur = 2 + Math.random() * 3;
        var delay = Math.random() * 2;
        var p = document.createElement('div');
        p.style.cssText = 'position:absolute;left:' + Math.random()*100 + '%;top:-5%;width:' + w + 'px;height:' + h + 'px;background:' + c + ';border-radius:' + (Math.random()>0.5?'50%':'1px') + ';animation:gcConfettiFall ' + dur + 's ' + delay + 's linear infinite;';
        el.appendChild(p);
    }
}

function animSparkle(el, colors) {
    _kf('gcSparklePulse','0%{transform:scale(0) rotate(0);opacity:0} 50%{transform:scale(1.2) rotate(180deg);opacity:1} 100%{transform:scale(0) rotate(360deg);opacity:0}');
    setInterval(function() {
        var s = document.createElement('div');
        var c = colors[Math.floor(Math.random() * colors.length)];
        var sz = 10 + Math.random() * 18;
        s.textContent = '\u2728';
        s.style.cssText = 'position:absolute;left:' + (Math.random()*80+10) + '%;top:' + (Math.random()*80+10) + '%;font-size:' + sz + 'px;color:' + c + ';animation:gcSparklePulse 1s ease-in-out forwards;';
        el.appendChild(s);
        setTimeout(function() { s.remove(); }, 1200);
    }, 500);
}

function animBow(el) {
    _kf('gcBow','0%,100%{transform:translate(-50%,-50%) rotate(0)} 30%{transform:translate(-50%,-30%) rotate(-45deg)} 60%{transform:translate(-50%,-30%) rotate(-45deg)} 80%{transform:translate(-50%,-50%) rotate(0)}');
    var p = document.createElement('div');
    p.textContent = '\uD83D\uDE47';
    p.style.cssText = 'position:absolute;left:50%;top:50%;font-size:36px;transform:translate(-50%,-50%);animation:gcBow 2.5s ease-in-out infinite;';
    el.appendChild(p);
}

function animBalloon(el, colors) {
    _kf('gcBalloonFloat','0%{transform:translateY(0) scale(0.8);opacity:0} 10%{opacity:1} 100%{transform:translateY(-300%) scale(1.1);opacity:0}');
    for (var i = 0; i < 4; i++) {
        var b = document.createElement('div');
        var dur = 4 + Math.random() * 3;
        var delay = Math.random() * 3;
        b.textContent = '\uD83C\uDF88';
        b.style.cssText = 'position:absolute;left:' + (15+Math.random()*70) + '%;bottom:-20%;font-size:' + (20+Math.random()*12) + 'px;animation:gcBalloonFloat ' + dur + 's ' + delay + 's ease-out infinite;';
        el.appendChild(b);
    }
}

function animFlower(el) {
    _kf('gcFlowerFall','0%{transform:translateY(0) rotate(0) translateX(0);opacity:1} 50%{transform:translateY(150%) rotate(180deg) translateX(20px);opacity:0.8} 100%{transform:translateY(300%) rotate(360deg) translateX(-10px);opacity:0}');
    var flowers = ['\uD83C\uDF38','\uD83C\uDF3A','\uD83C\uDF3C','\uD83D\uDCAE'];
    for (var i = 0; i < 8; i++) {
        var f = document.createElement('div');
        var sz = 10 + Math.random() * 14;
        var dur = 3 + Math.random() * 4;
        var delay = Math.random() * 3;
        f.textContent = flowers[Math.floor(Math.random() * flowers.length)];
        f.style.cssText = 'position:absolute;left:' + Math.random()*100 + '%;top:-10%;font-size:' + sz + 'px;animation:gcFlowerFall ' + dur + 's ' + delay + 's linear infinite;';
        el.appendChild(f);
    }
}

function animStar(el, colors) {
    _kf('gcStarTwinkle','0%{transform:scale(0) rotate(0);opacity:0} 40%{transform:scale(1.3) rotate(90deg);opacity:1} 100%{transform:scale(0) rotate(180deg);opacity:0}');
    setInterval(function() {
        var s = document.createElement('div');
        var c = colors[Math.floor(Math.random() * colors.length)];
        var sz = 8 + Math.random() * 14;
        s.textContent = Math.random() > 0.5 ? '\u2B50' : '\uD83C\uDF1F';
        s.style.cssText = 'position:absolute;left:' + (Math.random()*80+10) + '%;top:' + (Math.random()*80+10) + '%;font-size:' + sz + 'px;color:' + c + ';animation:gcStarTwinkle 1.5s ease-in-out forwards;';
        el.appendChild(s);
        setTimeout(function() { s.remove(); }, 1700);
    }, 600);
}

function animFire(el) {
    _kf('gcFireRise','0%{transform:translateY(0) scale(1);opacity:1} 100%{transform:translateY(-60px) scale(0.3);opacity:0}');
    var fires = ['\uD83D\uDD25','\uD83D\uDD25','\uD83D\uDCA5'];
    setInterval(function() {
        var f = document.createElement('div');
        var sz = 14 + Math.random() * 16;
        f.textContent = fires[Math.floor(Math.random() * fires.length)];
        f.style.cssText = 'position:absolute;left:' + (20+Math.random()*60) + '%;bottom:10%;font-size:' + sz + 'px;animation:gcFireRise 1.2s ease-out forwards;';
        el.appendChild(f);
        setTimeout(function() { f.remove(); }, 1400);
    }, 350);
}

/* ═══ NEW EFFECTS ═══ */
function animRainbow(el) {
    _kf('gcRainbowAppear','0%{opacity:0;transform:scale(0.5) translateY(20%)} 30%{opacity:0.7;transform:scale(1) translateY(0)} 70%{opacity:0.7;transform:scale(1) translateY(0)} 100%{opacity:0;transform:scale(1.1) translateY(-10%)}');
    var arc = document.createElement('div');
    arc.style.cssText = 'position:absolute;left:10%;top:20%;width:80%;height:60%;border-radius:50% 50% 0 0;background:conic-gradient(from 180deg,#ff0000,#ff8800,#ffff00,#00ff00,#0088ff,#8800ff,#ff0000);opacity:0;animation:gcRainbowAppear 4s ease-in-out infinite;-webkit-mask-image:radial-gradient(ellipse 60% 70% at 50% 100%,transparent 50%,black 51%);mask-image:radial-gradient(ellipse 60% 70% at 50% 100%,transparent 50%,black 51%);';
    el.appendChild(arc);
}

function animLightning(el, colors) {
    _kf('gcLightningFlash','0%{transform:translateY(0) scale(1.5);opacity:1} 20%{opacity:1} 100%{transform:translateY(80%) scale(0.8);opacity:0}');
    _kf('gcFlashOverlay','0%{opacity:0.4} 100%{opacity:0}');
    setInterval(function() {
        var bolt = document.createElement('div');
        bolt.textContent = '\u26A1';
        var sz = 20 + Math.random() * 24;
        bolt.style.cssText = 'position:absolute;left:' + (10+Math.random()*80) + '%;top:5%;font-size:' + sz + 'px;animation:gcLightningFlash 0.6s ease-out forwards;filter:drop-shadow(0 0 8px #ffd700);';
        el.appendChild(bolt);
        var flash = document.createElement('div');
        flash.style.cssText = 'position:absolute;inset:0;background:rgba(255,255,200,0.3);animation:gcFlashOverlay 0.3s ease-out forwards;';
        el.appendChild(flash);
        setTimeout(function() { bolt.remove(); flash.remove(); }, 800);
    }, 2500);
}

function animBubbles(el, colors) {
    _kf('gcBubbleRise','0%{transform:translateY(0) translateX(0) scale(0.5);opacity:0} 10%{opacity:0.8} 50%{transform:translateY(-150%) translateX(10px) scale(1)} 100%{transform:translateY(-300%) translateX(-5px) scale(1.2);opacity:0}');
    for (var i = 0; i < 10; i++) {
        var b = document.createElement('div');
        var sz = 8 + Math.random() * 18;
        var dur = 3 + Math.random() * 4;
        var delay = Math.random() * 3;
        var c = colors[Math.floor(Math.random() * colors.length)];
        b.style.cssText = 'position:absolute;left:' + (Math.random()*90+5) + '%;bottom:-10%;width:' + sz + 'px;height:' + sz + 'px;border-radius:50%;border:2px solid ' + c + ';background:radial-gradient(circle at 30% 30%,rgba(255,255,255,0.8),transparent);animation:gcBubbleRise ' + dur + 's ' + delay + 's ease-in infinite;';
        el.appendChild(b);
    }
}

function animShootingStar(el, colors) {
    _kf('gcShootingStar','0%{transform:translateX(0) translateY(0);opacity:1} 100%{transform:translateX(-200px) translateY(100px);opacity:0}');
    setInterval(function() {
        var s = document.createElement('div');
        var c = colors[Math.floor(Math.random() * colors.length)];
        s.style.cssText = 'position:absolute;right:-5%;top:' + Math.random()*40 + '%;width:3px;height:3px;background:' + c + ';border-radius:50%;box-shadow:0 0 6px ' + c + ',-8px 0 12px ' + c + ',-16px 0 8px ' + c + ';animation:gcShootingStar 1s ease-in forwards;';
        el.appendChild(s);
        setTimeout(function() { s.remove(); }, 1200);
    }, 1200);
}

function animParty(el, colors) {
    _kf('gcPartyPop','0%{transform:translateY(0) scale(0.3) rotate(0);opacity:0} 20%{opacity:1;transform:translateY(-30px) scale(1.2) rotate(-10deg)} 60%{transform:translateY(-80px) scale(1) rotate(15deg)} 100%{transform:translateY(-120px) scale(0.5) rotate(30deg);opacity:0}');
    var items = ['\uD83C\uDF89','\uD83C\uDF88','\uD83C\uDF8A','\uD83E\uDD73','\uD83C\uDFB5','\uD83C\uDFB6','\uD83C\uDF7E'];
    setInterval(function() {
        var p = document.createElement('div');
        p.textContent = items[Math.floor(Math.random() * items.length)];
        p.style.cssText = 'position:absolute;left:' + (Math.random()*80+10) + '%;bottom:0;font-size:' + (14+Math.random()*18) + 'px;animation:gcPartyPop 2s ease-out forwards;';
        el.appendChild(p);
        setTimeout(function() { p.remove(); }, 2200);
    }, 350);
}

function animClap(el) {
    _kf('gcClap','0%,100%{transform:translate(-50%,-50%) scale(1)} 15%{transform:translate(-50%,-50%) scale(1.3)} 30%{transform:translate(-50%,-50%) scale(1)} 45%{transform:translate(-50%,-50%) scale(1.3)} 60%{transform:translate(-50%,-50%) scale(1)}');
    _kf('gcSparklePulse','0%{transform:scale(0) rotate(0);opacity:0} 50%{transform:scale(1.2) rotate(180deg);opacity:1} 100%{transform:scale(0) rotate(360deg);opacity:0}');
    var clap = document.createElement('div');
    clap.textContent = '\uD83D\uDC4F';
    clap.style.cssText = 'position:absolute;left:50%;top:50%;font-size:32px;transform:translate(-50%,-50%);animation:gcClap 1.2s ease-in-out infinite;';
    el.appendChild(clap);
    setInterval(function() {
        for (var i = 0; i < 4; i++) {
            var sp = document.createElement('div');
            sp.textContent = '\u2728';
            sp.style.cssText = 'position:absolute;left:' + (40+Math.random()*20) + '%;top:' + (40+Math.random()*20) + '%;font-size:' + (8+Math.random()*10) + 'px;animation:gcSparklePulse 0.8s ease-out forwards;';
            el.appendChild(sp);
            setTimeout(function(s) { return function() { s.remove(); }; }(sp), 900);
        }
    }, 1200);
}

function animMoney(el) {
    _kf('gcMoneyRain','0%{transform:translateY(0) rotate(0) translateX(0);opacity:1} 25%{transform:translateY(75%) rotate(90deg) translateX(15px)} 50%{transform:translateY(150%) rotate(180deg) translateX(-10px)} 75%{transform:translateY(225%) rotate(270deg) translateX(8px)} 100%{transform:translateY(300%) rotate(360deg) translateX(0);opacity:0}');
    var bills = ['\uD83D\uDCB5','\uD83D\uDCB4','\uD83D\uDCB6','\uD83D\uDCB7','\uD83D\uDCB0','\uD83E\uDE99'];
    for (var i = 0; i < 10; i++) {
        var m = document.createElement('div');
        m.textContent = bills[Math.floor(Math.random() * bills.length)];
        var dur = 2.5 + Math.random() * 3;
        var delay = Math.random() * 2;
        m.style.cssText = 'position:absolute;left:' + Math.random()*100 + '%;top:-10%;font-size:' + (12+Math.random()*16) + 'px;animation:gcMoneyRain ' + dur + 's ' + delay + 's linear infinite;';
        el.appendChild(m);
    }
}

function animButterfly(el, colors) {
    _kf('gcButterfly0','0%{transform:translate(0,0) scaleX(1)} 25%{transform:translate(30px,-20px) scaleX(-1)} 50%{transform:translate(10px,-40px) scaleX(1)} 75%{transform:translate(-20px,-15px) scaleX(-1)} 100%{transform:translate(0,0) scaleX(1)}');
    _kf('gcButterfly1','0%{transform:translate(0,0) scaleX(-1)} 25%{transform:translate(-25px,-30px) scaleX(1)} 50%{transform:translate(-5px,10px) scaleX(-1)} 75%{transform:translate(20px,-20px) scaleX(1)} 100%{transform:translate(0,0) scaleX(-1)}');
    _kf('gcButterfly2','0%{transform:translate(0,0) scaleX(1)} 33%{transform:translate(20px,15px) scaleX(-1)} 66%{transform:translate(-15px,-25px) scaleX(1)} 100%{transform:translate(0,0) scaleX(1)}');
    for (var i = 0; i < 4; i++) {
        var b = document.createElement('div');
        b.textContent = '\uD83E\uDD8B';
        var dur = 5 + Math.random() * 4;
        var delay = Math.random() * 3;
        b.style.cssText = 'position:absolute;left:' + (Math.random()*80+10) + '%;top:' + (Math.random()*80+10) + '%;font-size:' + (16+Math.random()*14) + 'px;animation:gcButterfly' + (i%3) + ' ' + dur + 's ' + delay + 's ease-in-out infinite;';
        el.appendChild(b);
    }
}

function animRocket(el) {
    _kf('gcRocketLaunch','0%{transform:translateY(0) rotate(-45deg);opacity:1} 70%{transform:translateY(-200%) rotate(-45deg);opacity:1} 100%{transform:translateY(-300%) rotate(-45deg);opacity:0}');
    _kf('gcExhaust','0%{transform:scale(1);opacity:0.7} 100%{transform:scale(0.3) translateY(20px);opacity:0}');
    var rocket = document.createElement('div');
    rocket.textContent = '\uD83D\uDE80';
    rocket.style.cssText = 'position:absolute;left:50%;bottom:0;font-size:28px;animation:gcRocketLaunch 3s ease-in infinite;';
    el.appendChild(rocket);
    setInterval(function() {
