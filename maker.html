  $('poList').innerHTML='<div style="color:#8ea3c4;font-size:13px;">'+T.loading+'</div>';
  // keep lang on register link
  $('regLink1').href='/partner-register?lang='+LANG;
  $('regLink2').href='/partner-register?lang='+LANG;

  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
  // 국가 문자열 → 표준 코드 (드랍쉬퍼/제조사 국가 표기가 달라도 매칭되도록)
  function ctryCode(s){
    s=(s||'').toString().toLowerCase().trim();
    if(/kr|korea|한국|대한민국/.test(s))return'KR';
    if(/jp|japan|日本|일본/.test(s))return'JP';
    if(/us|usa|united states|america|미국/.test(s))return'US';
    if(/cn|china|中国|중국/.test(s))return'CN';
    if(/sa|saudi|사우디/.test(s))return'SA';
    if(/es|spain|españa|스페인/.test(s))return'ES';
    if(/de|german|deutsch|독일/.test(s))return'DE';
    if(/fr|france|프랑스/.test(s))return'FR';
    return (s||'').toUpperCase().slice(0,2)||'KR';
  }
  function toast(m,k){ var t=document.createElement('div'); t.className='toast '+(k||''); t.textContent=m; document.body.appendChild(t); setTimeout(function(){t.remove();},3800); }
  function show(id){ ['loadingScreen','screenLogin','screenNoPartner','screenDash'].forEach(function(s){ var e=$(s); if(e) e.style.display=(s===id)?'block':'none'; }); }

  async function init(){
    show('loadingScreen');
    var sess=null;
    try{ sess=(await sb.auth.getSession()).data.session; }catch(e){}
    if(!sess||!sess.user){ show('screenLogin'); return; }
    state.user=sess.user;
    await afterLogin();
  }
  async function afterLogin(){
    var r;
    try{ r=await sb.from('production_partners').select('*').eq('user_id',state.user.id).order('created_at',{ascending:false}).limit(1); }catch(e){}
    var p=(r&&r.data&&r.data[0])||null;
    if(!p){ show('screenNoPartner'); return; }
    state.partner=p;
    $('topRight').innerHTML='<span style="font-size:13px;color:#8ea3c4;margin-right:10px;">'+esc(state.user.email||'')+'</span><button class="btn btn-ghost btn-sm" id="btnLogout">'+esc(T.logout)+'</button>';
    $('btnLogout').onclick=async function(){ try{await sb.auth.signOut();}catch(e){} location.reload(); };
    var statusLabel=(T.status[p.status])||p.status||'';
    $('mkCompany').textContent='🛠️ '+(p.company_name||T.companyFallback);
    $('mkInfo').textContent=(p.country||'')+' · '+statusLabel+(p.status!=='active'&&p.status!=='verified'?T.pendingNote:'');
    show('screenDash');
    loadOrders();
  }
  async function loadOrders(){
    var box=$('poList');
    var country=ctryCode(state.partner.country);
    if(!country){ box.innerHTML='<div style="color:#8ea3c4;font-size:13px;">'+esc(T.noCountry)+'</div>'; return; }
    var dir='porders/'+country;
    var files=[];
    try{
      var lr=await sb.storage.from('logos').list(dir,{limit:300});
      files=(lr.data||[]).filter(function(f){ return f.name&&f.name.indexOf('.json')>0; });
    }catch(e){}
    if(!files.length){ box.innerHTML='<div style="color:#8ea3c4;font-size:13px;padding:8px 0;">'+esc(T.noOrders)+'</div>'; return; }
    var orders=[];
    for(var i=0;i<files.length;i++){
      try{
        var u=SB_URL+'/storage/v1/object/public/logos/'+dir+'/'+encodeURIComponent(files[i].name)+'?_t='+Date.now();
        var jr=await fetch(u);
        if(jr.ok){ var o=await jr.json(); o._file=files[i].name; orders.push(o); }
      }catch(e){}
    }
    // 이 제조사로 지정된 발주만 표시 (mfg_id 없는 구버전 발주는 호환 위해 노출)
    orders = orders.filter(function(o){ return !o.mfg_id || o.mfg_id === state.partner.id; });
    if(!orders.length){ box.innerHTML='<div style="color:#8ea3c4;font-size:13px;padding:8px 0;">'+esc(T.noOrders)+'</div>'; return; }
    orders.sort(function(a,b){ return (b.created||'').localeCompare(a.created||''); });
    box.innerHTML=orders.map(function(o){
      var d=o.created?new Date(o.created).toLocaleString(T.locale,{dateStyle:'short',timeStyle:'short'}):'';
      var st=o.status||'new';
      return '<div class="po">'
        +'<div class="poh"><span style="color:#8ea3c4;">'+esc(d)+'</span>'
        +'<span class="pst '+st+'">'+(ST[st]||st)+'</span></div>'
        +'<div class="pi">'+esc(o.item||'-')+' <span style="font-size:13px;color:#93c5fd;">× '+(o.qty||1)+'</span></div>'
        +'<div class="pm">'+esc(T.poFrom)+esc(o.drop_company||o.drop_slug||'-')+(o.drop_phone?' · '+esc(o.drop_phone):'')+'</div>'
        +(o.note?'<div class="pm">'+esc(T.poNote)+esc(o.note)+'</div>':'')
        +'<div class="pcust">'+esc(T.poInstall)+esc(o.cust_name||'-')+' / '+esc(o.cust_phone||'-')+'<br>'+esc(o.cust_addr||'-')+'</div>'
        +'<div style="margin-top:10px;display:flex;align-items:center;gap:8px;">'
        +'<span style="font-size:12px;color:#8ea3c4;">'+esc(T.poStatusChange)+'</span>'
        +'<select data-file="'+esc(o._file)+'">'
        +['new','accepted','making','done'].map(function(s){ return '<option value="'+s+'"'+(s===st?' selected':'')+'>'+ST[s]+'</option>'; }).join('')
        +'</select></div>'
        +'</div>';
    }).join('');
    box.querySelectorAll('select[data-file]').forEach(function(sel){
      sel.onchange=async function(){
        var o=orders.filter(function(x){return x._file===sel.dataset.file;})[0];
        if(!o) return;
        o.status=sel.value;
        var save={}; Object.keys(o).forEach(function(k){ if(k!=='_file') save[k]=o[k]; });
        try{
          var blob=new Blob([JSON.stringify(save)],{type:'application/json'});
          var up=await sb.storage.from('logos').upload(dir+'/'+sel.dataset.file,blob,{upsert:true,contentType:'application/json'});
          if(up.error) throw up.error;
          toast(T.toastSaved,'ok');
        }catch(e){ toast(T.toastSaveFail+(e.message||e),'err'); }
      };
    });
  }
  $('btnLogin').onclick=async function(){
    var em=$('loginEmail').value.trim(), pw=$('loginPw').value;
    if(!em||!pw){ toast(T.toastNeedLogin,'err'); return; }
    this.disabled=true; this.textContent=T.loggingIn;
    try{
      var r=await sb.auth.signInWithPassword({email:em,password:pw});
      if(r.error) throw r.error;
      state.user=r.data.user;
      await afterLogin();
    }catch(e){ toast(T.toastLoginFail+(e.message||e),'err'); this.disabled=false; this.textContent=T.login; }
  };
  $('loginPw').addEventListener('keydown',function(e){ if(e.key==='Enter') $('btnLogin').click(); });
  init();
})();
</script>
</body>
</html>
