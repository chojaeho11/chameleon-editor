<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Pretendard',sans-serif;background:#f8f9fc;color:#1e293b;min-height:100vh;}
.nav{background:#fff;border-bottom:1px solid #f1f5f9;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none;color:#1e293b;font-size:18px;font-weight:900;}
.nav-logo i{color:#f59e0b;font-size:20px;}
.nav-right{display:flex;gap:6px;}
.lang-btn{padding:5px 10px;border-radius:8px;font-size:11px;font-weight:700;text-decoration:none;color:#475569;border:1px solid #e2e8f0;background:#fff;cursor:pointer;font-family:inherit;}
.lang-btn.active{background:#f59e0b;color:#fff;border-color:#f59e0b;}
.hero{background:linear-gradient(135deg,#fffbeb,#fef3c7);padding:40px 20px;text-align:center;border-bottom:1px solid #fde68a;}
.hero-badge{display:inline-flex;align-items:center;gap:6px;background:#fff;color:#f59e0b;padding:6px 16px;border-radius:999px;font-size:12px;font-weight:800;margin-bottom:12px;border:1px solid #fde68a;}
.hero h1{font-size:clamp(24px,4vw,36px);font-weight:900;color:#78350f;letter-spacing:-1px;line-height:1.3;margin-bottom:8px;}
.hero h1 em{font-style:normal;color:#f59e0b;}
.hero p{font-size:14px;color:#92400e;max-width:480px;margin:0 auto;line-height:1.6;}
.container{max-width:900px;margin:0 auto;padding:24px 20px 60px;}
/* Auth */
.auth-section{background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:20px;margin-bottom:20px;}
.auth-title{font-size:15px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.auth-row{display:flex;gap:8px;margin-bottom:10px;}
.auth-row input{flex:1;padding:10px 12px;border:1px solid #d1d5db;border-radius:10px;font-size:14px;font-family:inherit;}
.auth-row input:focus{outline:none;border-color:#f59e0b;box-shadow:0 0 0 3px rgba(245,158,11,0.12);}
.auth-btns{display:flex;gap:8px;}
.auth-btns button{padding:10px 18px;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.btn-login{background:#f59e0b;color:#fff;}.btn-login:hover{background:#d97706;}
.btn-signup{background:#fffbeb;color:#92400e;}
.auth-error{color:#ef4444;font-size:12px;margin-top:6px;display:none;}
.auth-logged-in{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.auth-logged-in .email{font-size:14px;font-weight:700;color:#f59e0b;}
.btn-logout{padding:8px 14px;border:1px solid #fca5a5;background:#fff;border-radius:8px;font-size:12px;font-weight:700;color:#ef4444;cursor:pointer;font-family:inherit;}
/* Tabs */
.tabs{display:flex;gap:8px;margin-bottom:20px;}
.tab-btn{padding:10px 20px;border:1.5px solid #e2e8f0;background:#fff;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;color:#64748b;transition:all .15s;}
.tab-btn.active{background:#f59e0b;color:#fff;border-color:#f59e0b;}
/* Filters */
.filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.filters select{padding:8px 12px;border:1px solid #d1d5db;border-radius:10px;font-size:13px;font-family:inherit;background:#fff;}
/* Item grid */
.item-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;}
.item-card{background:#fff;border:1px solid #e2e8f0;border-radius:16px;overflow:hidden;cursor:pointer;transition:all .2s;position:relative;}
.item-card:hover{border-color:#fde68a;box-shadow:0 8px 24px rgba(245,158,11,0.08);transform:translateY(-2px);}
.item-img{width:100%;height:180px;background:#f8fafc;display:flex;align-items:center;justify-content:center;font-size:48px;color:#d1d5db;}
.item-body{padding:14px;}
.item-body h3{font-size:14px;font-weight:700;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.item-price{font-size:18px;font-weight:900;color:#0f172a;margin-bottom:6px;}
.item-meta{display:flex;gap:8px;font-size:11px;color:#94a3b8;flex-wrap:wrap;align-items:center;}
.item-meta span{display:flex;align-items:center;gap:3px;}
/* Status badges */
.status-badge{position:absolute;top:12px;left:12px;padding:4px 12px;border-radius:999px;font-size:10px;font-weight:800;z-index:1;}
.status-active{background:#dcfce7;color:#166534;}
.status-reserved{background:#fef9c3;color:#854d0e;}
.status-sold{background:#f1f5f9;color:#64748b;}
/* Condition */
.cond-badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:700;margin-right:4px;}
.cond-new{background:#dcfce7;color:#166534;}.cond-like-new{background:#e0f2fe;color:#0369a1;}.cond-good{background:#fef3c7;color:#92400e;}.cond-fair{background:#fed7aa;color:#9a3412;}.cond-poor{background:#fecaca;color:#991b1b;}
.nego-badge{display:inline-block;padding:2px 8px;background:#f5f3ff;color:#7c3aed;border-radius:999px;font-size:10px;font-weight:700;}
/* Temperature */
.temp-display{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:800;}
.temp-cold{background:#dbeafe;color:#1e40af;}
.temp-normal{background:#dcfce7;color:#166534;}
.temp-warm{background:#fef3c7;color:#92400e;}
.temp-hot{background:#fecaca;color:#991b1b;}
/* Detail overlay */
.detail-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:200;align-items:center;justify-content:center;padding:20px;}
.detail-overlay.show{display:flex;}
.detail-card{background:#fff;border-radius:20px;max-width:560px;width:100%;max-height:90vh;overflow-y:auto;padding:28px;}
.detail-close{float:right;background:none;border:none;font-size:24px;cursor:pointer;color:#94a3b8;}.detail-close:hover{color:#ef4444;}
/* Safe transaction box */
.safe-tx-box{background:linear-gradient(135deg,#fffbeb,#fef3c7);border:1.5px solid #fde68a;border-radius:14px;padding:18px;margin-top:16px;}
.safe-tx-box h4{font-size:14px;font-weight:800;color:#92400e;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.safe-tx-box p{font-size:12px;color:#78350f;line-height:1.6;margin-bottom:10px;}
.safe-tx-box .fee-note{font-size:11px;color:#b45309;font-weight:600;}
.safe-tx-btn{padding:12px 24px;background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;width:100%;}
.safe-tx-btn:hover{opacity:0.9;}
/* Form */
.form-card{background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:24px;margin-bottom:20px;}
.form-card.disabled{opacity:0.5;pointer-events:none;}
.section-title{font-size:16px;font-weight:800;margin-bottom:16px;display:flex;align-items:center;gap:8px;color:#0f172a;padding-bottom:10px;border-bottom:1px solid #f1f5f9;}
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:13px;font-weight:700;color:#475569;margin-bottom:6px;}
.form-group label .req{color:#ef4444;}
.form-input{width:100%;padding:10px 12px;border:1px solid #d1d5db;border-radius:10px;font-size:14px;font-family:inherit;background:#fff;}
.form-input:focus{outline:none;border-color:#f59e0b;box-shadow:0 0 0 3px rgba(245,158,11,0.12);}
select.form-input{appearance:auto;}
textarea.form-input{resize:vertical;min-height:80px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:640px){.form-row{grid-template-columns:1fr;}.item-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));}.item-img{height:140px;}}
.submit-btn{width:100%;padding:14px;background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;margin-top:8px;}
.submit-btn:hover{opacity:0.9;}
/* Seller profile */
.seller-profile{display:flex;align-items:center;gap:12px;padding:14px;background:#f8fafc;border-radius:12px;margin:12px 0;}
.seller-avatar{width:44px;height:44px;border-radius:50%;background:#fffbeb;display:flex;align-items:center;justify-content:center;font-size:20px;color:#f59e0b;}
.seller-info{flex:1;}
.seller-info .name{font-size:14px;font-weight:800;}
.seller-info .stats{font-size:11px;color:#64748b;margin-top:2px;}
.msg-btn{padding:10px 20px;background:#f59e0b;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;}
.msg-btn:hover{background:#d97706;}
.empty{text-align:center;padding:60px 20px;color:#94a3b8;grid-column:1/-1;}
.empty i{font-size:48px;margin-bottom:12px;display:block;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#0f172a;color:#fff;padding:12px 24px;border-radius:12px;font-size:14px;font-weight:700;z-index:999;display:none;}
.toast.show{display:block;animation:fadeUp .3s;}
@keyframes fadeUp{from{opacity:0;transform:translateX(-50%) translateY(10px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
.foot{text-align:center;padding:32px 20px;color:#94a3b8;font-size:12px;border-top:1px solid #f1f5f9;}
.foot a{color:#f59e0b;text-decoration:none;font-weight:700;}
</style>
</head>

    <div id="browseTab">

                <div class="form-group"><label id="lblPrice"></label><input class="form-input" id="fPrice" type="number" min="0"></div>
                <div class="form-group"><label id="lblCategory"></label><select class="form-input" id="fCategory"></select></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label id="lblCondition"></label><select class="form-input" id="fCondition"></select></div>
                <div class="form-group"><label id="lblCity"></label><input class="form-input" id="fCity"></div>
            </div>
            <div class="form-group" style="display:flex;align-items:center;gap:10px;">
                <input type="checkbox" id="fNego" checked style="width:18px;height:18px;accent-color:#f59e0b;">
                <label for="fNego" id="lblNego" style="margin:0;cursor:pointer;"></label>
            </div>
            <div class="form-group">
                <label>📷 상품 사진 (최대 8장)</label>
                <input type="file" id="fPhotos" accept="image/*" multiple onchange="previewPhotos(event)" style="padding:8px;border:1.5px dashed #e2e8f0;border-radius:10px;width:100%;font-family:inherit;cursor:pointer;background:#fafafa;">
                <div id="photoPreview" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;"></div>
            </div>
            <div style="background:#fef3c7;border:1px solid #fde68a;border-radius:12px;padding:14px;margin-bottom:12px;">
                <div style="font-size:13px;font-weight:800;color:#92400e;margin-bottom:8px;">🏦 판매자 입금 계좌 (안전거래 판매 대금 수령용)</div>
                <div class="form-row">
                    <div class="form-group"><label style="font-size:11px;">은행</label><input class="form-input" id="fBankName" placeholder="예: 국민은행"></div>
                    <div class="form-group"><label style="font-size:11px;">예금주</label><input class="form-input" id="fAccHolder" placeholder="홍길동"></div>
                </div>
                <div class="form-group"><label style="font-size:11px;">계좌번호</label><input class="form-input" id="fAccNum" placeholder="123-456-789012"></div>
                <div style="font-size:11px;color:#78350f;">수수료 5%를 공제한 95%가 구매자 수령 확인 후 이 계좌로 송금됩니다</div>
            </div>
            <button class="submit-btn" onclick="postItem()" id="btnSubmit"></button>
        </div>
    </div>
</div>

<!-- Detail -->
<div class="detail-overlay" id="detailOverlay" onclick="if(event.target===this)closeDetail()">
    <div class="detail-card" id="detailCard"></div>
</div>

<footer class="foot"><a href="/services" id="footBack"></a></footer>

    sellerProfile:{ko:'판매자 정보',ja:'出品者情報',en:'Seller Profile'},
    close:{ko:'닫기',ja:'閉じる',en:'Close'},
};
function t(k){return(T[k]||{})[LANG]||(T[k]||{}).ko||k;}
function catName(id){const c=ITEM_CATS.find(x=>x.id===id);return c?c[LANG]||c.ko:id;}
function condName(id){const c=CONDITIONS.find(x=>x.id===id);return c?c[LANG]||c.ko:id;}
function condClass(id){return 'cond-'+(id||'good');}
function statusLabel(s){return{active:t('active'),reserved:t('reserved'),sold:t('sold')}[s]||s;}
function statusClass(s){return{active:'status-active',reserved:'status-reserved',sold:'status-sold'}[s]||'status-active';}
function esc(s){return s?s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):'';}
function fmtPrice(v){return v?Number(v).toLocaleString():'0';}

function tempDisplay(temp){
    const v=Number(temp)||36.5;
    let cls='temp-normal';
    if(v<36)cls='temp-cold';else if(v>=36&&v<37.5)cls='temp-normal';else if(v>=37.5&&v<40)cls='temp-warm';else cls='temp-hot';
    return `<span class="temp-display ${cls}"><i class="fa-solid fa-temperature-half"></i> ${v.toFixed(1)}&deg;C</span>`;
}

async function loadItems(){
    const cat=document.getElementById('filterCat').value;
    const status=document.getElementById('filterStatus').value;
    const city=document.getElementById('filterCity').value;
    let q=sb.from('community_secondhand').select('*').order('created_at',{ascending:false}).limit(50);
    if(cat)q=q.eq('category',cat);
    if(status)q=q.eq('status',status);
    if(city)q=q.eq('city',city);
    const{data,error}=await q;
    const grid=document.getElementById('itemGrid');
    if(error||!data||data.length===0){grid.innerHTML=`<div class="empty"><i class="fa-solid fa-store"></i>${t('empty')}</div>`;return;}
    grid.innerHTML=data.map(item=>`
        <div class="item-card" onclick="showDetail('${item.id}')">
            <span class="status-badge ${statusClass(item.status)}">${statusLabel(item.status)}</span>
            <div class="item-img">${(Array.isArray(item.images)&&item.images.length>0)?`<img src="${item.images[0]}" style="width:100%;height:100%;object-fit:cover;" onerror="this.style.display='none'">`:`<i class="fa-solid fa-image"></i>`}</div>
            <div class="item-body">
                <h3>${esc(item.title)}</h3>
                <div class="item-price">${fmtPrice(item.price)} ${t('won')}</div>
                <div style="margin-bottom:6px;">
                    <span class="cond-badge ${condClass(item.condition)}">${condName(item.condition)}</span>
                    ${item.is_negotiable?`<span class="nego-badge">${t('negotiable')}</span>`:''}
                </div>
                <div class="item-meta">
                    <span><i class="fa-solid fa-location-dot"></i> ${esc(item.city||'')}</span>
                    <span><i class="fa-solid fa-eye"></i> ${item.view_count||0}</span>
                    <span><i class="fa-solid fa-comment"></i> ${item.chat_count||0}</span>
                </div>
            </div>
        </div>
    `).join('');
    window._items=data;
    // cities
    const cities=[...new Set(data.map(i=>i.city).filter(Boolean))];
    const cf=document.getElementById('filterCity');
    const cv=cf.value;
    cf.innerHTML=`<option value="">${t('allCities')}</option>`+cities.map(c=>`<option value="${esc(c)}"${c===cv?' selected':''}>${esc(c)}</option>`).join('');
}

async function showDetail(id){

    // Get seller temperature
    let temp=36.5;

        const{data:td}=await sb.from('community_user_temperature').select('temperature').eq('user_id',item.seller_id).maybeSingle();

        try{const{data:pp}=await sb.from('profiles').select('id,username,avatar_url,phone').eq('id',item.seller_id).maybeSingle();sellerProf=pp;}catch(e){}

    const isMine=currentUser&&currentUser.id===item.seller_id;

    const mainImgHtml = mainImg
        ? `<img id="mktMainImg" src="${esc(mainImg)}" style="width:100%;max-height:320px;object-fit:contain;border-radius:12px;background:#f1f5f9;margin:12px 0;">`
        : `<div style="text-align:center;font-size:60px;color:#d1d5db;margin:16px 0;"><i class="fa-solid fa-image"></i></div>`;
    document.getElementById('detailCard').innerHTML=`
        <button class="detail-close" onclick="closeDetail()">&times;</button>
        ${mainImgHtml}
        ${galleryHtml}
        <span class="status-badge ${statusClass(item.status)}" style="position:static;display:inline-block;margin-bottom:8px;">${statusLabel(item.status)}</span>
        <h2 style="font-size:20px;font-weight:900;margin-bottom:4px;">${esc(item.title)}</h2>
        <div style="font-size:24px;font-weight:900;color:#0f172a;margin-bottom:8px;">${fmtPrice(item.price)} ${t('won')}</div>
        <div style="margin-bottom:10px;">
            <span class="cond-badge ${condClass(item.condition)}">${condName(item.condition)}</span>
            ${item.is_negotiable?`<span class="nego-badge">${t('negotiable')}</span>`:''}

        <div class="item-meta" style="margin-bottom:12px;font-size:12px;color:#64748b;">
            <span><i class="fa-solid fa-tag"></i> ${catName(item.category)}</span>
            <span><i class="fa-solid fa-location-dot"></i> ${esc(item.city||'')}</span>
            <span><i class="fa-solid fa-eye"></i> ${(item.view_count||0)+1} ${t('views')}</span>
            <span><i class="fa-solid fa-comment"></i> ${item.chat_count||0} ${t('chats')}</span>
        </div>
        ${item.description?`<p style="font-size:14px;color:#475569;line-height:1.7;margin-bottom:16px;white-space:pre-wrap;">${esc(item.description)}</p>`:''}

        <!-- Seller Profile -->
        <div class="seller-profile">

            <div class="seller-info">
                <div class="name">${esc(sellerName)} ${tempDisplay(temp)}</div>
                <div class="stats">${t('sellerProfile')}</div>
                ${sellerPhone?`<div style="font-size:12px;color:#475569;margin-top:4px;"><i class="fa-solid fa-phone" style="color:#10b981;"></i> <a href="tel:${esc(sellerPhone)}" style="color:#10b981;font-weight:700;text-decoration:none;">${esc(sellerPhone)}</a></div>`:''}
            </div>
            ${!isMine?`<button class="msg-btn" onclick="sendMessage('${item.seller_id}','${esc(item.id)}')"><i class="fa-solid fa-comment"></i> ${t('sendMsg')}</button>`:''}

async function sendMessage(sellerId,itemId){
    if(!currentUser){toast(t('loginFirst'));return;}
    if(currentUser.id===sellerId){toast('본인 상품입니다');return;}
    const body=prompt(t('msgPrompt'));
    if(!body||!body.trim())return;
    try{
        const{error}=await sb.from('community_messages').insert({
            from_user_id:currentUser.id,
            to_user_id:sellerId,
            item_id:itemId||null,
            body:body.trim(),
            read_at:null
        });
        if(error){
            // 테이블 없으면 chat_rooms로 시도
            const roomId=[currentUser.id,sellerId].sort().join('_');
            await sb.from('chat_messages').insert({room_id:roomId,sender_id:currentUser.id,recipient_id:sellerId,content:body.trim(),item_id:itemId||null}).catch(()=>{});
        }
        toast(t('msgSent'));
    }catch(e){toast(e.message||'fail');}
}

    US:{provider:'stripe',publishableKey:'pk_live_51SfcQ79Uc8Z1bGiuqdFz7CmDXn7Ga7HAkf7XUxsyyvsMWbXTNSS3AMRRoXFS8U1EhTFeBsqX4Axb79Nwig8Lohzs00PIMNcGtG'}
};
const CURRENCY_RATE={KR:1,JP:0.1,US:0.001};

async function startSafeTx(itemId,amount){
    if(!currentUser){toast(t('loginFirst'));return;}
    const item=(window._items||[]).find(x=>x.id===itemId);
    if(!item){toast('item not found');return;}
    const total=amount;                          // 구매자가 이체하는 금액 = 상품가 그대로
    const fee=Math.round(amount*0.05);           // 플랫폼 수수료 5%
    const sellerReceives=total-fee;              // 판매자 수령액 = 95%
    if(!confirm(`계좌이체로 ${fmtPrice(total)}원 입금합니다.\n\n상품가: ${fmtPrice(amount)}원\n수수료(5%): ${fmtPrice(fee)}원 (판매자 송금 시 공제)\n판매자 수령액: ${fmtPrice(sellerReceives)}원\n\n계속하시겠습니까?`))return;

    // 1. safe_transactions에 pending_payment 레코드 생성
    const {data:tx,error}=await sb.from('community_safe_transactions').insert({
        item_id:itemId,
        buyer_id:currentUser.id,
        seller_id:item.seller_id,
        amount:total,
        fee:fee,
        payment_method:'transfer',
        status:'pending_payment'
    }).select('id').single();
    if(error){toast(error.message);return;}

    // 2. 상품 reserved 처리
    await sb.from('community_secondhand').update({status:'reserved'}).eq('id',itemId);

    // 3. 국가별 PG로 결제 진행
    const country=_siteCountry();
    const pg=PG_KEYS[country]||PG_KEYS.KR;
    const successUrl=location.origin+`/market?safe_paid=1&tx=${tx.id}`;
    const failUrl=location.origin+`/market?safe_failed=1&tx=${tx.id}`;
    const orderName=`중고거래 #${itemId}`;
    const customerName=currentUser.user_metadata?.nickname||currentUser.email||'Customer';

    if(pg.provider==='toss'){
        if(!window.TossPayments){toast('Toss SDK 로딩 실패');return;}
        try{
            const toss=TossPayments(pg.clientKey);
            await toss.requestPayment('계좌이체',{
                amount:total,
                orderId:'SAFE-'+Date.now()+'-'+tx.id,
                orderName:orderName,
                customerName:customerName,
                successUrl,failUrl
            });
        }catch(err){
            if(err.code!=='USER_CANCEL')toast('결제 오류: '+err.message);
            // 실패 시 pending 원복
            await sb.from('community_safe_transactions').update({status:'cancelled'}).eq('id',tx.id);
            await sb.from('community_secondhand').update({status:'active'}).eq('id',itemId);
        }
    }else if(pg.provider==='stripe'){
        if(typeof Stripe==='undefined'){toast('Stripe SDK 로딩 실패');return;}
        try{
            const stripe=Stripe(pg.publishableKey);
            const rate=CURRENCY_RATE[country]||1;
            const currencyMap={JP:'jpy',US:'usd'};
            const currency=currencyMap[country]||'usd';
            const zeroDec=['jpy'];
            const localAmount=zeroDec.includes(currency)?Math.round(total*rate):Math.round(total*rate*100)/100;
            const {data,error:fe}=await sb.functions.invoke('create-stripe-session',{
                body:{amount:localAmount,currency,order_id:'SAFE-'+tx.id,cancel_url:failUrl,success_url:successUrl}
            });
            if(fe||data?.error)throw (fe||new Error(data.error));
            await stripe.redirectToCheckout({sessionId:data.sessionId});
        }catch(err){
            toast('Stripe 오류: '+err.message);
            await sb.from('community_safe_transactions').update({status:'cancelled'}).eq('id',tx.id);
            await sb.from('community_secondhand').update({status:'active'}).eq('id',itemId);
        }
    }
}

// 결제 성공 후 돌아왔을 때 처리 — Toss는 서버 승인 API 호출, Stripe는 webhook에서 처리됨
(async()=>{
    const p=new URLSearchParams(location.search);
    // Toss 성공 콜백: paymentKey, orderId, amount 포함
    const paymentKey=p.get('paymentKey');
    const tossOrderId=p.get('orderId');
    const tossAmount=p.get('amount');
    if(paymentKey&&tossOrderId&&tossAmount){
        // orderId 형식: SAFE-{timestamp}-{txId}
        const m=/^SAFE-\d+-(\d+)$/.exec(tossOrderId);
        const txId=m?m[1]:null;
        if(!txId){toast('잘못된 주문 ID');history.replaceState({},'','/market');return;}
        toast('결제 검증 중...');
        try{
            const{data,error}=await sb.functions.invoke('confirm-safe-tx-toss',{
                body:{paymentKey,orderId:tossOrderId,amount:Number(tossAmount),txId}
            });
            if(error||data?.error){throw new Error(data?.error||error.message);}
            toast('✅ 결제 완료! 판매자에게 알림이 전송되었습니다.');
        }catch(err){
            toast('결제 검증 실패: '+err.message);
        }
        history.replaceState({},'','/market');
        loadItems();
        return;
    }
    // Toss 실패 콜백 (code, message 포함)
    const failCode=p.get('code');
    if(failCode&&tossOrderId){
        const m=/^SAFE-\d+-(\d+)$/.exec(tossOrderId);
        const txId=m?m[1]:null;
        if(txId){
            try{
                const{data:txd}=await sb.from('community_safe_transactions').select('item_id').eq('id',txId).maybeSingle();
                if(txd?.item_id)await sb.from('community_secondhand').update({status:'active'}).eq('id',txd.item_id);
                await sb.from('community_safe_transactions').update({status:'cancelled'}).eq('id',txId);
            }catch(e){}
        }
        toast('결제 취소: '+(p.get('message')||failCode));
        history.replaceState({},'','/market');
        return;
    }
    // Stripe 성공 복귀: webhook이 이미 처리했을 것. 단순 확인 메시지만.
    if(p.get('safe_paid')==='1'){
        toast('✅ 결제 처리 중입니다. 잠시 후 확인 완료됩니다.');
        history.replaceState({},'','/market');
        setTimeout(loadItems,2000);
    }else if(p.get('safe_failed')==='1'){
        const txId=p.get('tx');
        if(txId){
            try{
                const{data:txd}=await sb.from('community_safe_transactions').select('item_id').eq('id',txId).maybeSingle();
                if(txd?.item_id)await sb.from('community_secondhand').update({status:'active'}).eq('id',txd.item_id);
                await sb.from('community_safe_transactions').update({status:'cancelled'}).eq('id',txId);
            }catch(e){}
        }
        toast('결제가 취소되었습니다');
        history.replaceState({},'','/market');
    }
})();

// 사진 미리보기 + 업로드 대기
window._pendingPhotos=[];
window.previewPhotos=function(ev){
    const files=Array.from(ev.target.files||[]).slice(0,8);
    window._pendingPhotos=files;
    const box=document.getElementById('photoPreview');
    box.innerHTML=files.map((f,i)=>{
        const url=URL.createObjectURL(f);
        return `<div style="position:relative;"><img src="${url}" style="width:80px;height:80px;object-fit:cover;border-radius:8px;border:2px solid #fde68a;"><span style="position:absolute;top:-6px;right:-6px;background:#f59e0b;color:#fff;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;">${i+1}</span></div>`;
    }).join('');
};

async function uploadPhotosIfAny(){
    const files=window._pendingPhotos||[];
    if(files.length===0||!currentUser)return [];
    const urls=[];
    for(let i=0;i<files.length;i++){
        const f=files[i];
        const ext=(f.name.split('.').pop()||'jpg').toLowerCase();
        const path=`market/${currentUser.id}/${Date.now()}_${i}.${ext}`;
        const{error}=await sb.storage.from('community').upload(path,f,{upsert:false});
        if(error){console.warn('upload fail',error);continue;}
        const{data}=sb.storage.from('community').getPublicUrl(path);
        if(data?.publicUrl)urls.push(data.publicUrl);
    }
    return urls;
}

async function postItem(){
    if(!currentUser){toast(t('loginFirst'));return;}
    const title=document.getElementById('fTitle').value.trim();
    if(!title){toast(t('title')+' required');return;}
    const bankName=document.getElementById('fBankName').value.trim();
    const accHolder=document.getElementById('fAccHolder').value.trim();
    const accNum=document.getElementById('fAccNum').value.trim();
    if(!bankName||!accHolder||!accNum){toast('판매자 입금 계좌 정보를 모두 입력하세요');return;}
    const btn=document.getElementById('btnSubmit');btn.disabled=true;
    toast('사진 업로드 중...');
    const images=await uploadPhotosIfAny();
    const{error}=await sb.from('community_secondhand').insert({
        seller_id:currentUser.id,
        title,
        description:document.getElementById('fDesc').value.trim()||null,
        price:parseInt(document.getElementById('fPrice').value)||0,
        category:document.getElementById('fCategory').value,
        condition:document.getElementById('fCondition').value,
        city:document.getElementById('fCity').value.trim()||null,
        is_negotiable:document.getElementById('fNego').checked,
        images:images.length>0?images:null,
        country:LANG==='ja'?'JP':LANG==='en'?'US':'KR'
    });
    btn.disabled=false;
    if(error){toast(error.message);return;}
    // 판매자 프로필에 계좌 정보 저장 (재사용)
    await sb.from('profiles').update({bank_name:bankName,account_holder:accHolder,account_number:accNum}).eq('id',currentUser.id);
    if(currentUser){
        await sb.from('community_user_temperature').upsert({user_id:currentUser.id},{onConflict:'user_id',ignoreDuplicates:true});
    }
    toast(t('posted'));document.getElementById('fTitle').value='';document.getElementById('fDesc').value='';document.getElementById('fPrice').value='';
    document.getElementById('fPhotos').value='';document.getElementById('photoPreview').innerHTML='';window._pendingPhotos=[];
    switchTab('browse');loadItems();
}

window.markItemSold=async function(itemId){
    if(!confirm('해당 상품을 판매완료로 변경할까요?'))return;
    const{error}=await sb.from('community_secondhand').update({status:'sold'}).eq('id',itemId).eq('seller_id',currentUser.id);
    if(error){toast(error.message);return;}
    toast('판매완료 처리됨');loadMyTx();loadItems();
};
window.reactivateItem=async function(itemId){
    const{error}=await sb.from('community_secondhand').update({status:'active'}).eq('id',itemId).eq('seller_id',currentUser.id);
    if(error){toast(error.message);return;}
    toast('다시 판매중으로 변경');loadMyTx();loadItems();
};
window.deleteMyItem=async function(itemId){
    if(!confirm('정말 삭제할까요? 되돌릴 수 없습니다.'))return;
    const{error}=await sb.from('community_secondhand').delete().eq('id',itemId).eq('seller_id',currentUser.id);
    if(error){toast(error.message);return;}
    toast('삭제됨');loadMyTx();loadItems();
};
window.editMyItem=async function(itemId){
    const item=(window._myListings||[]).find(x=>x.id===itemId);
    if(!item)return;
    const nTitle=prompt('제목 수정',item.title);if(nTitle===null)return;
    const nDesc=prompt('설명 수정 (취소 시 기존 유지)',item.description||'');if(nDesc===null)return;
    const nPrice=prompt('가격 수정',item.price);if(nPrice===null)return;
    const up={title:nTitle.trim()||item.title,description:nDesc.trim()||null,price:parseInt(nPrice)||item.price};
    const{error}=await sb.from('community_secondhand').update(up).eq('id',itemId).eq('seller_id',currentUser.id);
    if(error){toast(error.message);return;}
    toast('수정됨');loadMyTx();
};

// 판매 탭 열 때 기존 계좌 정보 프리필
async function prefillBank(){
    if(!currentUser)return;
    const{data}=await sb.from('profiles').select('bank_name,account_holder,account_number').eq('id',currentUser.id).maybeSingle();
    if(data){
        if(data.bank_name)document.getElementById('fBankName').value=data.bank_name;
        if(data.account_holder)document.getElementById('fAccHolder').value=data.account_holder;
        if(data.account_number)document.getElementById('fAccNum').value=data.account_number;
    }
}
setTimeout(prefillBank,500);

// 구매자: 수령 확인 → status='received' → 관리자에게 송금 요청 (self-serve)
window.confirmReceived=async function(txId){
    if(!confirm('상품을 정상적으로 수령하셨나요?\n확인 시 판매자에게 송금 절차가 시작됩니다.'))return;
    const{error}=await sb.from('community_safe_transactions').update({
        status:'received',
        received_confirmed_at:new Date().toISOString()
    }).eq('id',txId).eq('buyer_id',currentUser.id);
    if(error){toast(error.message);return;}
    toast('✅ 수령 확인 완료. 판매자 송금 예정');
    if(window.loadMyTx)loadMyTx();
};

function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2500);}
