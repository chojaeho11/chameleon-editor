  var COUNTRIES = ['Korea','Japan','USA','China','Saudi Arabia','Spain','Germany','France','Other'];

  var LANG = (function(){
    var p = new URLSearchParams(location.search).get('lang');
    if (p){ p = p.toLowerCase(); if (p==='ko') p='kr'; if (p==='jp') p='ja'; if (p==='cn') p='zh'; if (p==='us') p='en'; }
    var h = location.hostname || '';
    var l = p || (h.indexOf('cafe0101')>=0?'ja':(h.indexOf('cafe2626')>=0?'kr':'en'));
    return ['kr','ja','en','zh','ar','es','de','fr'].indexOf(l)>=0 ? l : 'en';
  })();
  var T = DICT[LANG];

  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
  function toast(msg, kind){
    var t = document.createElement('div');
    t.className = 'toast ' + (kind||'');
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(function(){ t.remove(); }, 4200);
  }

  function render(){
    document.documentElement.lang = (LANG==='kr'?'ko':LANG);
    if (LANG==='ar') document.documentElement.dir = 'rtl';
    $('hEyebrow').textContent = T.eyebrow;
    $('hTitle').innerHTML = T.title;
    $('hDesc').textContent = T.desc;
    $('hRoles').innerHTML = T.roles.map(function(r,i){
      return '<div class="role'+(i===2?' you':'')+'"><div class="rt">'+esc(r[0])+'</div><div class="rn">'+esc(r[1])+'</div><div class="rd">'+esc(r[2])+'</div></div>';
    }).join('');
    $('s1Title').textContent = T.s1Title; $('s1Text').innerHTML = T.s1Text;
    $('s2Title').textContent = T.s2Title; $('s2Lead').innerHTML = T.s2Lead;
    $('s2List').innerHTML = T.s2List.map(function(x){ return '<li>'+x+'</li>'; }).join('');
    $('s3Title').textContent = T.s3Title; $('s3Text').innerHTML = T.s3Text; $('s3Quote').textContent = T.s3Quote;
    $('btnApply').textContent = T.btnApply; $('applyNote').textContent = T.applyNote;
    $('fTitle').textContent = T.fTitle; $('fSub').textContent = T.fSub;
    $('lCompany').textContent = T.lCompany; $('lName').textContent = T.lName;
    $('lCountry').textContent = T.lCountry; $('lPhone').textContent = T.lPhone; $('lEmail').textContent = T.lEmail;
    $('lCorp').textContent = T.lCorp; $('lImport').textContent = T.lImport; $('lDetail').textContent = T.lDetail;
    $('fCancel').textContent = T.cancel; $('fSubmit').textContent = T.submit;
    $('fCountry').innerHTML = COUNTRIES.map(function(c){return '<option>'+c+'</option>';}).join('');
    $('fCorp').innerHTML = T.corpOpts.map(function(c){return '<option>'+esc(c)+'</option>';}).join('');
    $('fImport').innerHTML = T.importOpts.map(function(c){return '<option>'+esc(c)+'</option>';}).join('');
    $('langSel').innerHTML = ['kr','ja','en'].map(function(l){
      return '<button data-l="'+l+'" class="'+(l===LANG?'on':'')+'">'+({kr:'한국어',ja:'日本語',en:'EN'}[l])+'</button>';
    }).join('');
    $('langSel').querySelectorAll('button').forEach(function(b){
      b.onclick = function(){ location.search = '?lang=' + b.dataset.l; };
    });
  }

  function openForm(){
    $('fMsg').style.display = 'none';
    $('fSubmit').disabled = false; $('fSubmit').textContent = T.submit;
    ['fCompany','fName','fPhone','fEmail','fDetail'].forEach(function(id){ $(id).value=''; });
    $('ov').classList.add('on');
  }
  function closeForm(){ $('ov').classList.remove('on'); }
  $('btnApply').onclick = openForm;
  $('fCancel').onclick = closeForm;
  $('ov').onclick = function(e){ if (e.target === $('ov')) closeForm(); };

  $('fSubmit').onclick = async function(){
    var company = $('fCompany').value.trim();
    var name = $('fName').value.trim();
    var email = $('fEmail').value.trim();
    if (!company || !name || !email){ toast(T.errReq, 'err'); return; }
    var detail = '[공급사 신청]\n법인설립: ' + $('fCorp').value + '\n해외수입경험: ' + $('fImport').value + '\n상세: ' + $('fDetail').value.trim();
    this.disabled = true; this.textContent = T.sending;
    try {
      var r = await sb.from('franchise_inquiries').insert({
        name: name, company: company, country: $('fCountry').value,
        email: email, phone: $('fPhone').value.trim() || null,
        experience: 'supplier', message: detail,
        lang_submitted: (LANG==='kr'?'ko':LANG), page_url: location.href, status: 'new'
      });
      if (r.error) throw r.error;
      $('fMsg').textContent = T.done; $('fMsg').style.color = '#86efac'; $('fMsg').style.display = 'block';
      toast(T.done, 'ok');
      setTimeout(closeForm, 2600);
    } catch(e){
      toast(T.fail + (e.message||e), 'err');
      this.disabled = false; this.textContent = T.submit;
    }
  };

  render();
})();
</script>
</body>
</html>
