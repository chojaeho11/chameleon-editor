      t1Lead:'The top-tier partner that builds a country’s entire printing ecosystem with Chameleon. Holds <b>national exclusive rights</b> for honeycomb-board / printing-material production and equipment distribution, and supplies materials and equipment to the manufacturers and dropshippers in that country.',
      t1ReqT:'Requirements',
      t1Req:['An established corporation','Owns a factory of at least 1,000 pyeong (~3,300 m²)','Infrastructure for honeycomb-board / material production or equipment distribution','A long-term vision for building the country’s printing ecosystem'],
      t1Apply:'🏭 Apply as a Supplier',
      t1Note:'Exclusive rights are granted — one company per country, after HQ review and individual negotiation.',
      t2Title:'Manufacturer',
      t2Lead:'A partner that receives materials from the supplier and produces and delivers the actual products. May purchase equipment as needed and can also act as a delivery partner. Operates on roughly a <b>50% margin over material cost</b>.',
      t2ReqT:'Requirements',
      t2Req:['Currently runs an advertising or printing company','Owns production equipment (or intends to purchase)','Able to produce & deliver using supplier materials','Can also serve as a delivery partner'],
      t2Apply:'🛠️ Apply as a Manufacturer',
      t2Note:'After HQ review we connect you with the supplier in your country.',
      t3Title:'Dropshipper',
      t3Lead:'A tier you can start with no equipment. Sell Chameleon’s full product range on your own homepage. Building the homepage is <b>free</b>, and you set your own margin.',
      t3Apply:'🚀 Create your free homepage',
      t3Note:'You can start right now — signup and homepage are free.',
      fSupTitle:'Supplier Application', fMfgTitle:'Manufacturer Application',
      fSupSub:'Leave your details and an HQ representative will contact you.',
      fMfgSub:'Leave your details and an HQ representative will contact you.',
      lCompany:'Company *', lName:'Contact name *', lCountry:'Country *', lPhone:'Phone', lEmail:'Email *',
      lCorp:'Incorporation status', corpOpts:['Select','Incorporated','Sole proprietor','Planning to incorporate'],
      lFactory:'Factory size (pyeong)',
      lBiz:'Current business', bizOpts:['Select','Advertising company','Printing company','Advertising + printing','Other'],
      lDetailSup:'Describe your infrastructure, production capacity and vision', lDetailMfg:'Describe your equipment and the items you can produce',
      cancel:'Cancel', submit:'Submit application',
      errReq:'Please enter company, contact name and email.', sending:'Sending…',
      done:'Your application has been received. An HQ representative will contact you soon.', fail:'Submission failed: '
    }
  };
  var COUNTRIES = ['Korea','Japan','USA','China','Saudi Arabia','Spain','Germany','France','Other'];

  var LANG = (function(){
    var p = new URLSearchParams(location.search).get('lang');
    if (p){ p = p.toLowerCase(); if (p==='ko') p='kr'; }
    var h = location.hostname || '';
    var l = p || (h.indexOf('cafe0101')>=0?'ja':(h.indexOf('cafe2626')>=0?'kr':'en'));
    return (l==='kr'||l==='ja') ? l : 'en';
  })();
  var T = DICT[LANG];
  var curType = 'supplier';

  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
  function toast(msg, kind){
    var t = document.createElement('div');
    t.className = 'toast ' + (kind||'');
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(function(){ t.remove(); }, 4200);
  }

  function render(){
    document.documentElement.lang = (LANG==='kr'?'ko':LANG);
    $('hEyebrow').textContent = T.eyebrow;
    $('hTitle').innerHTML = T.title;
    $('hDesc').textContent = T.desc;
    $('hFlow').innerHTML = T.flow.map(function(s,i){
      return (i>0?'<div class="arrow">→</div>':'')
        + '<div class="step"><div class="n">STEP '+(i+1)+'</div><div class="t">'+esc(s[0])+'</div><div class="d">'+esc(s[1])+'</div></div>';
    }).join('');
    $('t1Title').textContent = T.t1Title; $('t1Lead').innerHTML = T.t1Lead;
    $('t1ReqT').textContent = T.t1ReqT; $('t1Req').innerHTML = T.t1Req.map(function(x){return '<li>'+esc(x)+'</li>';}).join('');
    $('t1Apply').textContent = T.t1Apply; $('t1Note').textContent = T.t1Note;
    $('t2Title').textContent = T.t2Title; $('t2Lead').innerHTML = T.t2Lead;
    $('t2ReqT').textContent = T.t2ReqT; $('t2Req').innerHTML = T.t2Req.map(function(x){return '<li>'+esc(x)+'</li>';}).join('');
    $('t2Apply').textContent = T.t2Apply; $('t2Note').textContent = T.t2Note;
    $('t3Title').textContent = T.t3Title; $('t3Lead').innerHTML = T.t3Lead;
    $('t3Apply').textContent = T.t3Apply; $('t3Note').textContent = T.t3Note;
    $('lCompany').textContent = T.lCompany; $('lName').textContent = T.lName;
    $('lCountry').textContent = T.lCountry; $('lPhone').textContent = T.lPhone; $('lEmail').textContent = T.lEmail;
    $('lCorp').textContent = T.lCorp; $('lFactory').textContent = T.lFactory; $('lBiz').textContent = T.lBiz;
    $('fCancel').textContent = T.cancel; $('fSubmit').textContent = T.submit;
    $('fCountry').innerHTML = COUNTRIES.map(function(c){return '<option>'+c+'</option>';}).join('');
    $('fCorp').innerHTML = T.corpOpts.map(function(c){return '<option>'+esc(c)+'</option>';}).join('');
    $('fBiz').innerHTML = T.bizOpts.map(function(c){return '<option>'+esc(c)+'</option>';}).join('');
    $('langSel').innerHTML = ['kr','ja','en'].map(function(l){
      return '<button data-l="'+l+'" class="'+(l===LANG?'on':'')+'">'+({kr:'한국어',ja:'日本語',en:'EN'}[l])+'</button>';
    }).join('');
    $('langSel').querySelectorAll('button').forEach(function(b){
      b.onclick = function(){ location.search = '?lang=' + b.dataset.l; };
    });
  }

  function openForm(type){
    curType = type;
    var sup = type === 'supplier';
    $('fTitle').textContent = sup ? T.fSupTitle : T.fMfgTitle;
    $('fSub').textContent = sup ? T.fSupSub : T.fMfgSub;
    $('supFields').style.display = sup ? '' : 'none';
    $('mfgFields').style.display = sup ? 'none' : '';
    $('lDetail').textContent = sup ? T.lDetailSup : T.lDetailMfg;
    $('fMsg').style.display = 'none';
    $('fSubmit').disabled = false;
    ['fCompany','fName','fPhone','fEmail','fFactory','fDetail'].forEach(function(id){ $(id).value=''; });
    $('ov').classList.add('on');
  }
  function closeForm(){ $('ov').classList.remove('on'); }

  $('t1Apply').onclick = function(){ openForm('supplier'); };
  // 제조사 = 출력·시공 파트너 — 정식 등록 페이지(production_partners)로 연결
  $('t2Apply').onclick = function(){ location.href = '/partner-register'; };
  $('fCancel').onclick = closeForm;
  $('ov').onclick = function(e){ if (e.target === $('ov')) closeForm(); };

  $('fSubmit').onclick = async function(){
    var company = $('fCompany').value.trim();
    var name = $('fName').value.trim();
    var email = $('fEmail').value.trim();
    if (!company || !name || !email){ toast(T.errReq, 'err'); return; }
    var sup = curType === 'supplier';
    var detail = sup
      ? ('[공급사 신청]\n법인설립: ' + $('fCorp').value + '\n공장규모(평): ' + ($('fFactory').value || '-') + '\n상세: ' + $('fDetail').value.trim())
      : ('[제조사 신청]\n운영사업: ' + $('fBiz').value + '\n장비/품목: ' + $('fDetail').value.trim());
    this.disabled = true; this.textContent = T.sending;
    try {
      var r = await sb.from('franchise_inquiries').insert({
        name: name,
        company: company,
        country: $('fCountry').value,
        email: email,
        phone: $('fPhone').value.trim() || null,
        experience: curType,          // 'supplier' | 'manufacturer'
        message: detail,
        lang_submitted: (LANG==='kr'?'ko':LANG),
        page_url: location.href,
        status: 'new'
      });
      if (r.error) throw r.error;
      $('fMsg').textContent = T.done;
      $('fMsg').style.color = '#86efac';
      $('fMsg').style.display = 'block';
      toast(T.done, 'ok');
      setTimeout(closeForm, 2600);
    } catch(e){
      toast(T.fail + (e.message||e), 'err');
      this.disabled = false; this.textContent = T.submit;
    }
  };

  render();
})();
</script>
</body>
</html>
