<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Production Partner Registration</title>
    <script>
        (function(){
            try {
                var params = new URLSearchParams(location.search);
                var lp = (params.get('lang')||'').toLowerCase();
                var host = location.hostname;
                var lang = 'ko';
                if (lp) {
                    if (lp==='jp'||lp==='ja') lang='ja';
                    else if (lp==='zh'||lp==='cn') lang='zh';
                    else if (lp==='ar'||lp==='sa'||lp==='ma') lang='ar';
                    else if (lp==='es') lang='es';
                    else if (lp==='de') lang='de';
                    else if (lp==='fr') lang='fr';
                    else if (lp==='en'||lp==='us') lang='en';
                    else lang = lp;
                } else if (host.includes('cafe0101')) lang='ja';
                else if (host.includes('cafe3355')||host.includes('chameleon.design')) lang='en';
                document.documentElement.lang = lang;
            } catch(_) {}
        })();
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        *{box-sizing:border-box;margin:0;padding:0;}
        body{background:#f8f9fc;font-family:'Pretendard',sans-serif;color:#1e293b;min-height:100vh;visibility:hidden;}
        body.ready{visibility:visible;}
        @keyframes __show{to{visibility:visible;}}
        body{animation:__show 0s linear 0.8s forwards;}

        .site-header{background:#fff;border-bottom:1px solid #e2e8f0;padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
        .site-header .logo{display:flex;align-items:center;gap:10px;cursor:pointer;text-decoration:none;}
        .site-header .logo i{font-size:22px;color:#7c3aed;}
        .site-header .logo span{font-size:18px;font-weight:800;color:#1e293b;}
        .header-right{display:flex;align-items:center;gap:12px;}
        .header-right .user-info{font-size:13px;color:#64748b;font-weight:600;}
        .header-btn{padding:8px 16px;border:1px solid #e2e8f0;background:#fff;border-radius:8px;font-size:13px;font-weight:600;color:#475569;cursor:pointer;transition:0.15s;text-decoration:none;font-family:inherit;}
        .header-btn:hover{background:#f8fafc;border-color:#cbd5e1;}
        .header-btn.primary{background:#7c3aed;color:#fff;border-color:#7c3aed;}
        .header-btn.primary:hover{background:#6d28d9;}
        .header-btn.danger{color:#ef4444;border-color:#fca5a5;}

        .container{max-width:720px;margin:0 auto;padding:24px 20px 60px;}

        .page-title{font-size:24px;font-weight:900;text-align:center;margin-bottom:8px;color:#0f172a;}
        .page-subtitle{font-size:14px;color:#64748b;text-align:center;margin-bottom:32px;line-height:1.6;}

        /* Auth section */
        .auth-section{background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:24px;margin-bottom:24px;}
        .auth-title{font-size:16px;font-weight:800;margin-bottom:16px;display:flex;align-items:center;gap:8px;color:#1e293b;}
        .auth-logged-in{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
        .auth-logged-in .email{font-size:14px;font-weight:700;color:#7c3aed;}
        .auth-row{display:flex;gap:10px;margin-bottom:12px;}
        .auth-row input{flex:1;padding:11px 14px;border:1px solid #d1d5db;border-radius:10px;font-size:14px;font-family:inherit;background:#fff;transition:border-color 0.15s;}
        .auth-row input:focus{outline:none;border-color:#7c3aed;box-shadow:0 0 0 3px rgba(124,58,237,0.15);}
        .auth-btns{display:flex;gap:8px;}
        .auth-btns button{padding:10px 20px;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:0.15s;}
        .auth-btns .btn-login{background:#7c3aed;color:#fff;}
        .auth-btns .btn-login:hover{background:#6d28d9;}
        .auth-btns .btn-signup{background:#f1f5f9;color:#475569;}
        .auth-btns .btn-signup:hover{background:#e2e8f0;}
        .auth-error{color:#ef4444;font-size:12px;margin-top:8px;display:none;}

        /* Form card */
        .form-card{background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:24px;margin-bottom:24px;}
        .form-card.disabled{opacity:0.5;pointer-events:none;}
        .section-title{font-size:16px;font-weight:800;margin-bottom:20px;display:flex;align-items:center;gap:8px;color:#1e293b;padding-bottom:12px;border-bottom:1px solid #f1f5f9;}
        .form-group{margin-bottom:18px;}
        .form-group label{display:block;font-size:13px;font-weight:700;color:#475569;margin-bottom:7px;}
        .form-group label .req{color:#ef4444;margin-left:2px;}
        .form-input{width:100%;padding:11px 14px;border:1px solid #d1d5db;border-radius:10px;font-size:14px;font-family:inherit;background:#fff;transition:border-color 0.15s;}
        .form-input:focus{outline:none;border-color:#7c3aed;box-shadow:0 0 0 3px rgba(124,58,237,0.15);}
        select.form-input{appearance:auto;}
        textarea.form-input{resize:vertical;min-height:100px;line-height:1.6;}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
        @media(max-width:768px){.form-row{grid-template-columns:1fr;}}

        /* Capability simple checkboxes */
        .cap-simple-item{display:flex;align-items:center;gap:12px;padding:14px 18px;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:12px;cursor:pointer;transition:all 0.15s;font-size:14px;font-weight:600;color:#1e293b;}
        .cap-simple-item:hover{background:#f5f3ff;border-color:#c4b5fd;}
        .cap-simple-item input{width:20px;height:20px;accent-color:#7c3aed;cursor:pointer;flex-shrink:0;}
        .cap-simple-item input:checked ~ span{color:#7c3aed;}

        /* Agreement */
        .agree-box{background:linear-gradient(135deg,#fef9c3,#fef3c7);border:1.5px solid #fcd34d;border-radius:12px;padding:18px 20px;display:flex;align-items:flex-start;gap:12px;}
        .agree-box input{width:20px;height:20px;accent-color:#7c3aed;margin-top:2px;cursor:pointer;flex-shrink:0;}
        .agree-box label{font-size:14px;font-weight:700;color:#78350f;cursor:pointer;line-height:1.5;}
        .agree-box .agree-detail{font-size:12px;color:#92400e;margin-top:4px;line-height:1.6;}

        /* Submit */
        .submit-btn{width:100%;padding:16px;background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:800;cursor:pointer;box-shadow:0 4px 14px rgba(124,58,237,0.3);transition:all 0.15s;font-family:inherit;margin-top:8px;}
        .submit-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(124,58,237,0.4);}
        .submit-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;box-shadow:none;}

        /* Success */
        .success-card{background:#fff;border:2px solid #22c55e;border-radius:16px;padding:40px 24px;text-align:center;display:none;}
        .success-card i{font-size:48px;color:#22c55e;margin-bottom:16px;}
        .success-card h2{font-size:20px;font-weight:900;color:#166534;margin-bottom:12px;}
        .success-card p{font-size:14px;color:#475569;line-height:1.7;}

        /* Tax section extras */
        .intl-fields{display:none;}
        .intl-fields.show{display:block;}
        .tax-hint{font-size:11px;color:#94a3b8;margin-top:4px;}

        /* Lang selector */
        .lang-selector{display:flex;align-items:center;gap:4px;}
        .lang-btn{padding:4px 8px;border:1px solid #e2e8f0;background:#fff;border-radius:6px;font-size:11px;font-weight:700;color:#64748b;cursor:pointer;font-family:inherit;}
        .lang-btn.active{background:#7c3aed;color:#fff;border-color:#7c3aed;}

        @media(max-width:768px){
            .container{padding:16px 14px 40px;}
            .form-card{padding:18px 16px;}
            .auth-section{padding:18px 16px;}
            .page-title{font-size:20px;}
        }
    </style>
</head>

<!-- Header -->
<header class="site-header">
    <a class="logo" href="index.html"><i class="fas fa-palette"></i><span>Chameleon</span></a>
    <div class="header-right">
        <div class="lang-selector" id="langSelector"></div>
    </div>
</header>

<div class="container">

    <div class="auth-section" id="authSection">

        <div id="authLoggedOut">

            </div>
            <div class="auth-row">
                <input type="password" id="authPassword" placeholder="Password (min 6 chars)">

            <div class="auth-btns">

                <button class="btn-signup" id="btnSignup" onclick="doSignup()"></button>

                    <label id="lblPhone"></label>

                    <label id="lblCity"></label>
                    <input class="form-input" id="fCity">
                </div>
            </div>
        </div>

        <!-- 2. Production Capabilities — 5 simple checkboxes -->
        <div class="form-card" id="cardCaps">

        </div>

        <!-- 3. Tax & Banking -->
        <div class="form-card" id="cardTax">
            <div class="section-title"><i class="fas fa-university" style="color:#7c3aed"></i> <span id="secTax"></span></div>
            <div class="form-group">
                <label id="lblLegalName"></label>
                <input class="form-input" id="fLegalName">
            </div>
            <div class="form-group">
                <label id="lblTaxType"></label>
                <select class="form-input" id="fTaxType">
                    <option value="personal" id="optPersonal"></option>
                    <option value="business" id="optBusiness"></option>

            </div>
            <div class="form-group">
                <label id="lblTaxId"></label>
                <input class="form-input" id="fTaxId">
                <div class="tax-hint" id="taxHint"></div>

                    <label id="lblBankName"></label>
                    <input class="form-input" id="fBankName">
                </div>
                <div class="form-group">
                    <label id="lblBankHolder"></label>
                    <input class="form-input" id="fBankHolder">
                </div>
            </div>
            <div class="form-group">
                <label id="lblBankAccount"></label>
                <input class="form-input" id="fBankAccount">
            </div>
            <!-- International fields -->
            <div class="intl-fields" id="intlFields">
                <div class="form-row">
                    <div class="form-group">
                        <label>SWIFT / BIC</label>
                        <input class="form-input" id="fSwift">
                    </div>
                    <div class="form-group">
                        <label>IBAN</label>
                        <input class="form-input" id="fIban">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Routing Number</label>
                        <input class="form-input" id="fRouting">
                    </div>
                    <div class="form-group">
                        <label id="lblBankAddr"></label>
                        <input class="form-input" id="fBankAddr">
                    </div>
                </div>
            </div>
            <div class="form-group">
                <label id="lblPayoutCurrency"></label>
                <select class="form-input" id="fPayoutCurrency">
                    <option value="KRW">KRW (Korean Won)</option>
                    <option value="JPY">JPY (Japanese Yen)</option>
                    <option value="USD">USD (US Dollar)</option>
                    <option value="EUR">EUR (Euro)</option>
                    <option value="GBP">GBP (British Pound)</option>
                    <option value="CNY">CNY (Chinese Yuan)</option>
                    <option value="SAR">SAR (Saudi Riyal)</option>
                </select>
            </div>
        </div>

        <!-- 4. Agreement -->
        <div class="form-card" id="cardAgree">
            <div class="section-title"><i class="fas fa-handshake" style="color:#7c3aed"></i> <span id="secAgree"></span></div>
            <div class="agree-box">
                <input type="checkbox" id="fAgree">
                <div>
                    <label for="fAgree" id="lblAgree"></label>
                    <div class="agree-detail" id="agreeDetail"></div>
                </div>
            </div>
        </div>

        <!-- Submit -->
        <button type="button" class="submit-btn" id="btnSubmit" disabled onclick="doSubmit()"></button>
    </form>

    <!-- Success message -->
    <div class="success-card" id="successCard">
        <i class="fas fa-check-circle"></i>
        <h2 id="successTitle"></h2>
        <p id="successMsg"></p>
        <a href="/maker" id="successToMaker" style="display:inline-block;margin-top:18px;padding:13px 30px;border-radius:10px;background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;font-weight:800;font-size:14px;text-decoration:none;"></a>
    </div>
</div>

// ===== State =====
let currentUser = null;

// ===== Render language selector =====
function renderLangSelector() {
    const langs = ['ko','ja','en','zh','ar','es','de','fr'];
    const labels = {ko:'KO',ja:'JA',en:'EN',zh:'ZH',ar:'AR',es:'ES',de:'DE',fr:'FR'};
    const el = document.getElementById('langSelector');
    el.innerHTML = langs.map(l => {
        const active = l === LANG ? ' active' : '';
        const url = new URL(location.href);
        url.searchParams.set('lang', l);
        return `<a class="lang-btn${active}" href="${url.toString()}">${labels[l]}</a>`;
    }).join('');
}

// ===== Country change =====
function onCountryChange() {
    const country = document.getElementById('fCountry').value;
    // Tax ID label
    const cfg = getTaxCfg(country);
    document.getElementById('lblTaxId').innerHTML = (cfg.label[LANG] || cfg.label.en) + ' <span class="req">*</span>';
    document.getElementById('fTaxId').placeholder = cfg.placeholder || '';
    document.getElementById('taxHint').textContent = (cfg.hint[LANG] || cfg.hint.en || '');
    // International fields
    document.getElementById('intlFields').classList.toggle('show', country !== 'KR');
}

// ===== Populate country dropdown =====
function populateCountries() {
    const sel = document.getElementById('fCountry');
    sel.innerHTML = COUNTRY_LIST.map(c => `<option value="${c.code}">${c.flag} ${c.label[LANG] || c.label.en}</option>`).join('');
    // Default based on language
    const defaults = {ko:'KR',ja:'JP',en:'US',zh:'CN',ar:'SA',es:'ES',de:'DE',fr:'FR'};
    sel.value = defaults[LANG] || 'US';
    onCountryChange();
}

// ===== Auth =====
async function checkAuth() {
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
        currentUser = session.user;
        document.getElementById('authLoggedOut').style.display = 'none';
        document.getElementById('authLoggedIn').style.display = 'block';
        document.getElementById('userEmail').textContent = currentUser.email;
        enableForm(true);
    } else {
        currentUser = null;
        document.getElementById('authLoggedOut').style.display = 'block';
        document.getElementById('authLoggedIn').style.display = 'none';
        enableForm(false);
    }
}

function enableForm(on) {
    const cards = document.querySelectorAll('#regForm .form-card');
    const btn = document.getElementById('btnSubmit');
    cards.forEach(c => c.classList.toggle('disabled', !on));
    btn.disabled = !on;
    if (!on) {
        document.getElementById('authError').style.display = 'block';
        document.getElementById('authError').textContent = t('login_required');
        document.getElementById('authError').style.color = '#64748b';
    } else {
        document.getElementById('authError').style.display = 'none';
    }
}

async function doLogin() {
    const email = document.getElementById('authEmail').value.trim();
    const pw = document.getElementById('authPassword').value;
    if (!email || !pw) return;
    const errEl = document.getElementById('authError');
    errEl.style.display = 'none';
    const { error } = await sb.auth.signInWithPassword({ email, password: pw });
    if (error) {
        errEl.textContent = error.message;
        errEl.style.display = 'block';
        errEl.style.color = '#ef4444';
        return;
    }
    await checkAuth();
}

async function doSignup() {
    const email = document.getElementById('authEmail').value.trim();
    const pw = document.getElementById('authPassword').value;
    if (!email || pw.length < 6) {
        const errEl = document.getElementById('authError');
        errEl.textContent = 'Email required, password min 6 characters';
        errEl.style.display = 'block';
        errEl.style.color = '#ef4444';
        return;
    }
    const errEl = document.getElementById('authError');
    errEl.style.display = 'none';
    const { error } = await sb.auth.signUp({ email, password: pw });
    if (error) {
        errEl.textContent = error.message;
        errEl.style.display = 'block';
        errEl.style.color = '#ef4444';
        return;
    }
    // Auto-login after signup
    await sb.auth.signInWithPassword({ email, password: pw });
    await checkAuth();
}

async function doLogout() {
    await sb.auth.signOut();
    currentUser = null;
    document.getElementById('authLoggedOut').style.display = 'block';
    document.getElementById('authLoggedIn').style.display = 'none';
    document.getElementById('authEmail').value = '';
    document.getElementById('authPassword').value = '';
    enableForm(false);
}

// ===== Submit =====
async function doSubmit() {
    if (!currentUser) return;

    // Validate agreement
    if (!document.getElementById('fAgree').checked) {
        alert(t('error_agree'));
        return;
    }

    // Validate required fields
    const required = ['fCompanyName','fPhone'];
    for (const id of required) {
        if (!document.getElementById(id).value.trim()) {
            alert(t('error_required'));
            document.getElementById(id).focus();
            return;
        }
    }

    // Collect simple capability checkboxes
    const caps = [];
    document.querySelectorAll('#capSimple input[type="checkbox"]:checked').forEach(cb => {
        caps.push({ category: cb.value, items: [] });
    });
    if (caps.length === 0) {
        alert(t('error_caps'));
        return;
    }

    const btn = document.getElementById('btnSubmit');
    btn.disabled = true;
    btn.textContent = t('submitting');

    const payload = {
        user_id: currentUser.id,
        company_name: document.getElementById('fCompanyName').value.trim(),
        country: document.getElementById('fCountry').value,
        city: document.getElementById('fCity').value.trim() || null,
        address: document.getElementById('fCity').value.trim() || '',
        contact_name: currentUser.email.split('@')[0],
        phone: document.getElementById('fPhone').value.trim(),
        email: currentUser.email,
        website: null,
        capabilities: caps,
        capabilities_note: null,
        legal_name: document.getElementById('fLegalName').value.trim() || null,
        tax_id_type: document.getElementById('fTaxType').value,
        tax_id: document.getElementById('fTaxId').value.trim() || null,
        bank_name: document.getElementById('fBankName').value.trim() || null,
        bank_holder: document.getElementById('fBankHolder').value.trim() || null,
        bank_account: document.getElementById('fBankAccount').value.trim() || null,
        swift_bic: document.getElementById('fSwift').value.trim() || null,
        iban: document.getElementById('fIban').value.trim() || null,
        routing_number: document.getElementById('fRouting').value.trim() || null,
        bank_address: document.getElementById('fBankAddr').value.trim() || null,
        payout_currency: document.getElementById('fPayoutCurrency').value,
        agreed_5pct: true
    };

    const { error } = await sb.from('production_partners').insert(payload);
    if (error) {
        alert('Error: ' + error.message);
        btn.disabled = false;
        btn.textContent = t('submit');
        return;
    }

    // Show success
    document.getElementById('regForm').style.display = 'none';
    document.getElementById('successCard').style.display = 'block';
}

    renderLangSelector();
    translatePage();
    // Capabilities are static checkboxes, no dynamic render needed
    populateCountries();
    await checkAuth();
    document.body.classList.add('ready');
})();
