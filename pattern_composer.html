<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>패턴 컴포저 · Cotton Print</title>
<meta name="description" content="투명 캔버스에 원하는 그래픽을 검색·선택·배치해 나만의 패턴을 만드세요.">
<link rel="icon" href="favicon.ico">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root {
    --brown: #78350f;
    --brown-dark: #451a03;
    --accent: #b45309;
    --cream: #fef3c7;
    --cream-dark: #fde68a;
    --bg: #faf6ed;
    --text: #3f2a14;
    --text-light: #92400e;
    --border: #e7d8be;
}
* { box-sizing: border-box; }
html, body { margin:0; height:100%; font-family:'Pretendard','Apple SD Gothic Neo','맑은 고딕',sans-serif; background:var(--bg); color:var(--text); }

/* Header */
.cp-header { position:sticky; top:0; z-index:50; background:#fff; border-bottom:1px solid var(--border); padding:10px 18px; display:flex; align-items:center; gap:14px; }
.cp-logo { font-family:'Times New Roman',serif; font-weight:900; letter-spacing:3px; color:var(--brown-dark); font-size:20px; text-decoration:none; }
.cp-back { color:var(--brown); text-decoration:none; font-size:13px; font-weight:700; display:inline-flex; align-items:center; gap:6px; padding:8px 14px; border-radius:50px; background:var(--cream); }
.cp-back:hover { background:var(--cream-dark); }
.cp-title { font-size:14px; color:var(--text-light); font-weight:700; }

/* Layout */
.composer { display:grid; grid-template-columns: 280px 1fr 320px; gap:14px; padding:14px; height:calc(100vh - 56px); }
@media (max-width: 1100px) {
    .composer { grid-template-columns: 220px 1fr 280px; }
}
@media (max-width: 860px) {
    .composer { grid-template-columns: 1fr; grid-auto-rows: auto; height:auto; }
}

/* Panels */
.panel { background:#fff; border:1px solid var(--border); border-radius:14px; box-shadow:0 2px 8px rgba(69,26,3,0.04); display:flex; flex-direction:column; overflow:hidden; }
.panel-head { padding:12px 14px; border-bottom:1px solid var(--border); font-weight:900; font-size:13px; color:var(--brown-dark); display:flex; align-items:center; gap:8px; flex-shrink:0; }
.panel-body { padding:12px 14px; overflow-y:auto; flex:1; min-height:0; }

/* Search panel */
.search-input { width:100%; padding:9px 36px 9px 12px; border:1.5px solid var(--border); border-radius:50px; font-size:13px; font-family:inherit; background:#fff; outline:none; }
.search-input:focus { border-color:var(--brown); }
.search-wrap { position:relative; margin-bottom:10px; }
.search-wrap i { position:absolute; right:14px; top:50%; transform:translateY(-50%); color:var(--brown); pointer-events:none; }
.lib-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:6px; }
.lib-card { aspect-ratio:1; background:#fafaf9; border:1px solid var(--border); border-radius:8px; overflow:hidden; cursor:pointer; transition:all 0.15s; padding:0; position:relative; }
.lib-card:hover { border-color:var(--brown-dark); transform:scale(1.04); box-shadow:0 4px 12px rgba(69,26,3,0.15); }
.lib-card img { width:100%; height:100%; object-fit:contain; display:block; pointer-events:none; }
.lib-card-name { position:absolute; left:0; right:0; bottom:0; padding:3px 5px; background:linear-gradient(transparent, rgba(0,0,0,0.65)); color:#fff; font-size:9px; font-weight:700; text-overflow:ellipsis; overflow:hidden; white-space:nowrap; opacity:0; transition:opacity 0.2s; }
.lib-card:hover .lib-card-name { opacity:1; }
.lib-loading, .lib-empty { padding:30px 10px; text-align:center; color:var(--text-light); font-size:12px; grid-column:1/-1; }
.lib-more { width:100%; padding:8px; margin-top:8px; border:1px dashed var(--border); background:#fff; color:var(--brown); font-size:12px; font-weight:700; border-radius:8px; cursor:pointer; font-family:inherit; }
.lib-more:hover { background:var(--cream); }

/* Canvas panel */
.canvas-wrap { flex:1; position:relative; display:flex; align-items:center; justify-content:center; background:repeating-conic-gradient(#f5f5f4 0% 25%, #fff 0% 50%) 0 0 / 16px 16px; border-radius:0; overflow:hidden; }
.canvas-box { position:relative; width:100%; max-width:920px; aspect-ratio:13/10; background:transparent; box-shadow:0 8px 32px rgba(0,0,0,0.12); border:1px solid rgba(0,0,0,0.08); }
canvas#stage { display:block; width:100%; height:100%; cursor:crosshair; image-rendering:auto; }
.canvas-tip { position:absolute; top:14px; left:14px; right:14px; background:rgba(255,255,255,0.92); padding:8px 14px; border-radius:50px; font-size:11px; color:var(--brown); font-weight:700; box-shadow:0 2px 8px rgba(0,0,0,0.08); text-align:center; pointer-events:none; transition:opacity 0.3s; }
.canvas-tip.hidden { opacity:0; }

/* Bottom toolbar inside center column */
.center-col { display:flex; flex-direction:column; gap:10px; min-height:0; }
.canvas-toolbar { background:#fff; border:1px solid var(--border); border-radius:14px; padding:10px 14px; display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.cv-btn { padding:8px 14px; border:1px solid var(--border); background:#fff; color:var(--brown-dark); font-size:12px; font-weight:700; border-radius:8px; cursor:pointer; font-family:inherit; display:inline-flex; align-items:center; gap:6px; transition:all 0.15s; }
.cv-btn:hover { background:var(--cream); border-color:var(--brown); }
.cv-btn.primary { background:linear-gradient(135deg,#451a03,#78350f); color:#fde047; border:none; }
.cv-btn.primary:hover { transform:translateY(-1px); box-shadow:0 4px 12px rgba(69,26,3,0.25); }
.cv-btn.danger:hover { background:#fee2e2; color:#dc2626; border-color:#dc2626; }
.cv-btn:disabled { opacity:0.4; cursor:not-allowed; }
.cv-sep { width:1px; height:22px; background:var(--border); margin:0 4px; }

/* Right panel */
.section-title { font-size:11px; font-weight:900; letter-spacing:1.5px; color:var(--brown); text-transform:uppercase; margin:14px 0 8px; }
.section-title:first-child { margin-top:0; }

.bg-swatches { display:grid; grid-template-columns:repeat(7,1fr); gap:5px; }
.bg-sw { width:100%; aspect-ratio:1; border:1.5px solid transparent; border-radius:6px; cursor:pointer; padding:0; transition:transform 0.15s, box-shadow 0.15s; position:relative; }
.bg-sw:hover { transform:scale(1.08); }
.bg-sw.active { border-color:var(--brown-dark); box-shadow:0 0 0 2px var(--accent); }
.bg-sw.active::after { content:'✓'; position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:#fff; font-weight:900; font-size:13px; text-shadow:0 1px 2px rgba(0,0,0,0.6); }
.bg-sw.bg-transparent { background:repeating-conic-gradient(#cbd5e1 0% 25%, #fff 0% 50%) 0 0 / 8px 8px; }
.bg-custom { display:flex; align-items:center; gap:8px; margin-top:8px; padding:6px 10px; background:#fafaf9; border-radius:8px; }
.bg-custom code { font-size:11px; font-family:monospace; color:var(--brown); }
input[type=color] { flex:1; height:26px; border:1px solid var(--border); border-radius:6px; padding:0; cursor:pointer; background:transparent; }

.field-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; font-size:12px; }
.field-row label { flex-shrink:0; width:60px; color:var(--text-light); font-weight:700; }
.field-row input[type=range] { flex:1; }
.field-row .field-val { width:48px; text-align:right; font-family:monospace; font-size:11px; color:var(--brown); }

.empty-sel { padding:16px 10px; text-align:center; color:var(--text-light); font-size:11px; background:#fafaf9; border-radius:8px; line-height:1.5; }

/* Seamless tile preview */
.tile-preview { width:100%; aspect-ratio:1; border:1px solid var(--border); border-radius:8px; overflow:hidden; background:#fff; }
.tile-preview canvas { width:100%; height:100%; display:block; }

/* Toast */
#toast { position:fixed; left:50%; bottom:30px; transform:translateX(-50%); background:rgba(31,41,55,0.96); color:#fff; padding:11px 22px; border-radius:50px; font-size:13px; font-weight:700; box-shadow:0 8px 24px rgba(0,0,0,0.25); z-index:99; display:none; }
</style>
</head>
<body>

<!-- ───── Header ───── -->
<div class="cp-header">
    <a href="/cotton_print.html" class="cp-back"><i class="fa-solid fa-arrow-left"></i> 마켓플레이스</a>
    <a href="/cotton_print.html" class="cp-logo">COTTON&nbsp;PRINT</a>
    <div class="cp-title"><i class="fa-solid fa-wand-magic-sparkles" style="color:var(--accent);"></i> 패턴 컴포저 — 나만의 패턴 만들기</div>
</div>

<div class="composer">

    <!-- ───── 좌: 검색 ───── -->
    <div class="panel">
        <div class="panel-head"><i class="fa-solid fa-magnifying-glass"></i> 그래픽 검색</div>
        <div class="panel-body">
            <div class="search-wrap">
                <input id="searchInput" class="search-input" type="text" placeholder="예: 토끼, flower, 꽃, animal" autocomplete="off">
                <i class="fa-solid fa-magnifying-glass"></i>
            </div>
            <div id="libGrid" class="lib-grid">
                <div class="lib-loading"><i class="fa-solid fa-spinner fa-spin"></i> 로딩 중...</div>
            </div>
            <button id="libMoreBtn" class="lib-more" style="display:none;" onclick="loadMore()">더 보기</button>
        </div>
    </div>

    <!-- ───── 중: 캔버스 + 툴바 ───── -->
    <div class="center-col">
        <div class="canvas-wrap">
            <div class="canvas-box">
                <canvas id="stage" width="1300" height="1000"></canvas>
                <div id="canvasTip" class="canvas-tip">
                    <i class="fa-solid fa-hand-pointer"></i> 좌측에서 그래픽을 클릭해 추가 · 드래그로 이동 · 모서리로 크기조절 · 상단 점으로 회전
                </div>
            </div>
        </div>
        <div class="canvas-toolbar">
            <button class="cv-btn" onclick="undo()" id="undoBtn" title="되돌리기 (Ctrl+Z)"><i class="fa-solid fa-rotate-left"></i> 되돌리기</button>
            <button class="cv-btn" onclick="redo()" id="redoBtn" title="다시 (Ctrl+Y)"><i class="fa-solid fa-rotate-right"></i> 다시</button>
            <span class="cv-sep"></span>
            <button class="cv-btn" onclick="scatterSelected()" id="scatterBtn" title="선택 요소를 캔버스 전체에 무작위로 흩뿌리기"><i class="fa-solid fa-shower"></i> 흩뿌리기</button>
            <button class="cv-btn" onclick="duplicateSelected()" id="dupBtn"><i class="fa-solid fa-clone"></i> 복제</button>
            <button class="cv-btn" onclick="layerChange(-1)"><i class="fa-solid fa-arrow-down"></i> 뒤로</button>
            <button class="cv-btn" onclick="layerChange(1)"><i class="fa-solid fa-arrow-up"></i> 앞으로</button>
            <button class="cv-btn danger" onclick="deleteSelected()" id="delBtn"><i class="fa-solid fa-trash"></i> 삭제</button>
            <button class="cv-btn danger" onclick="clearAll()" style="margin-left:auto;"><i class="fa-solid fa-broom"></i> 모두 지우기</button>
            <span class="cv-sep"></span>
            <button class="cv-btn" onclick="downloadPng()"><i class="fa-solid fa-download"></i> PNG 저장</button>
            <button class="cv-btn primary" onclick="goOrder()"><i class="fa-solid fa-bolt"></i> 이 디자인으로 주문</button>
        </div>
    </div>

    <!-- ───── 우: 속성 + 도구 ───── -->
    <div class="panel">
        <div class="panel-head"><i class="fa-solid fa-sliders"></i> 속성 / 도구</div>
        <div class="panel-body">

            <!-- 배경색 -->
            <div class="section-title">배경색</div>
            <div class="bg-swatches" id="bgSwatches">
                <button class="bg-sw active bg-transparent" data-color="transparent" title="투명 (배경 없음)" onclick="selectBgColor('transparent', this)"></button>
                <button class="bg-sw" data-color="#ffffff" style="background:#ffffff; border:1.5px solid #d6d3d1;" title="화이트" onclick="selectBgColor('#ffffff', this)"></button>
                <button class="bg-sw" data-color="#1f2937" style="background:#1f2937;" title="차콜" onclick="selectBgColor('#1f2937', this)"></button>
                <button class="bg-sw" data-color="#000000" style="background:#000000;" title="블랙" onclick="selectBgColor('#000000', this)"></button>
                <button class="bg-sw" data-color="#fef3c7" style="background:#fef3c7;" title="아이보리" onclick="selectBgColor('#fef3c7', this)"></button>
                <button class="bg-sw" data-color="#facc15" style="background:#facc15;" title="머스타드" onclick="selectBgColor('#facc15', this)"></button>
                <button class="bg-sw" data-color="#fca5a5" style="background:#fca5a5;" title="피치" onclick="selectBgColor('#fca5a5', this)"></button>
                <button class="bg-sw" data-color="#f9a8d4" style="background:#f9a8d4;" title="핑크" onclick="selectBgColor('#f9a8d4', this)"></button>
                <button class="bg-sw" data-color="#c4b5fd" style="background:#c4b5fd;" title="라벤더" onclick="selectBgColor('#c4b5fd', this)"></button>
                <button class="bg-sw" data-color="#93c5fd" style="background:#93c5fd;" title="베이비블루" onclick="selectBgColor('#93c5fd', this)"></button>
                <button class="bg-sw" data-color="#86efac" style="background:#86efac;" title="민트" onclick="selectBgColor('#86efac', this)"></button>
                <button class="bg-sw" data-color="#a3a380" style="background:#a3a380;" title="세이지" onclick="selectBgColor('#a3a380', this)"></button>
                <button class="bg-sw" data-color="#78350f" style="background:#78350f;" title="브라운" onclick="selectBgColor('#78350f', this)"></button>
                <button class="bg-sw" data-color="#d6d3d1" style="background:#d6d3d1;" title="라이트 그레이" onclick="selectBgColor('#d6d3d1', this)"></button>
            </div>
            <div class="bg-custom">
                <input type="color" id="bgPicker" value="#ffffff" oninput="selectBgColor(this.value, null)">
                <code id="bgHex">transparent</code>
            </div>

            <!-- 선택된 요소 -->
            <div class="section-title">선택된 요소</div>
            <div id="selPanel" class="empty-sel">
                요소를 클릭해 선택하면<br>크기·회전·투명도를 조절할 수 있어요
            </div>
            <div id="selControls" style="display:none;">
                <div class="field-row">
                    <label>크기</label>
                    <input type="range" id="scaleSlider" min="20" max="800" value="200" oninput="updateScale(this.value)">
                    <span class="field-val" id="scaleVal">200</span>
                </div>
                <div class="field-row">
                    <label>회전</label>
                    <input type="range" id="rotateSlider" min="-180" max="180" value="0" oninput="updateRotate(this.value)">
                    <span class="field-val" id="rotateVal">0°</span>
                </div>
                <div class="field-row">
                    <label>투명도</label>
                    <input type="range" id="alphaSlider" min="10" max="100" value="100" oninput="updateAlpha(this.value)">
                    <span class="field-val" id="alphaVal">100%</span>
                </div>
            </div>

            <!-- 이음매(타일링) 미리보기 -->
            <div class="section-title">패턴 타일링 미리보기 (3×3)</div>
            <div class="tile-preview"><canvas id="tilePreview" width="600" height="600"></canvas></div>
            <div style="font-size:10px; color:var(--text-light); margin-top:6px; line-height:1.5;">
                실제 인쇄 시 캔버스가 한 단위로 반복됩니다. 가장자리에 그래픽이 닿지 않게 하면 자연스러워요.
            </div>

        </div>
    </div>

</div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
(function(){
    'use strict';
    // ──────────────────────────────────────────────────────────
    // 상태
    // ──────────────────────────────────────────────────────────
    const STAGE_W = 1300, STAGE_H = 1000;  // 13:10 (130×100cm 원단 비율)
    const canvas = document.getElementById('stage');
    const ctx = canvas.getContext('2d');
    const tileCv = document.getElementById('tilePreview');
    const tileCtx = tileCv.getContext('2d');

    const ST = {
        bgColor: 'transparent',
        elements: [],   // {id, url, img, x, y, w, h, angle(rad), alpha, z}
        selId: null,
        drag: null,     // {kind, sx, sy, e0:{x,y,w,h,angle}}
        history: [],
        future: [],
        nextId: 1
    };

    const sb = supabase.createClient(
        'https://qinvtnhiidtmrzosyvys.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFpbnZ0bmhpaWR0bXJ6b3N5dnlzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjMyMDE3NjQsImV4cCI6MjA3ODc3Nzc2NH0.3z0f7R4w3bqXTOMTi19ksKSeAkx8HOOTONNSos8Xz8Y'
    );

    // ──────────────────────────────────────────────────────────
    // 라이브러리 검색 (좌측 패널)
    // ──────────────────────────────────────────────────────────
    let _libPage = 0, _libQuery = '', _libDone = false, _libLoading = false;
    const LIB_PAGE_SIZE = 30;

    function thumbUrl(url, w) {
        if (!url) return '';
        const t = url.replace('/storage/v1/object/public/', '/storage/v1/render/image/public/');
        return t + (t.indexOf('?') >= 0 ? '&' : '?') + 'width=' + w + '&resize=cover&quality=72';
    }

    async function loadLibrary(reset) {
        if (reset) { _libPage = 0; _libDone = false; document.getElementById('libGrid').innerHTML = '<div class="lib-loading"><i class="fa-solid fa-spinner fa-spin"></i> 로딩 중...</div>'; }
        if (_libDone || _libLoading) return;
        _libLoading = true;
        document.getElementById('libMoreBtn').disabled = true;
        const from = _libPage * LIB_PAGE_SIZE;
        const to = from + LIB_PAGE_SIZE - 1;
        // user_patterns (이미 graphic PNG 시드 됨)에서 검색
        let q = sb.from('user_patterns').select('id,name,thumb_url,original_url')
            .eq('status','approved')
            .order('created_at',{ascending:false})
            .range(from, to);
        if (_libQuery) {
            const s = _libQuery.replace(/'/g, "''");
            q = q.or('name.ilike.%' + s + '%,description.ilike.%' + s + '%,author.ilike.%' + s + '%');
        }
        const { data, error } = await q;
        _libLoading = false;
        const grid = document.getElementById('libGrid');
        if (error) {
            grid.innerHTML = '<div class="lib-loading" style="color:#dc2626;">로딩 실패: ' + error.message + '</div>';
            return;
        }
        if (_libPage === 0) grid.innerHTML = '';
        if (!data || data.length === 0) {
            if (_libPage === 0) grid.innerHTML = '<div class="lib-empty">결과 없음. 다른 키워드를 시도해보세요.</div>';
            _libDone = true;
            document.getElementById('libMoreBtn').style.display = 'none';
            return;
        }
        const html = data.map(function(p){
            const tu = thumbUrl(p.thumb_url || p.original_url, 200);
            return '<button class="lib-card" type="button" data-url="' + (p.original_url || p.thumb_url) + '" data-name="' + (p.name||'').replace(/"/g,'&quot;') + '" onclick="addElementFromLibrary(this)">' +
                '<img src="' + tu + '" loading="lazy" decoding="async" alt="' + (p.name||'') + '" onerror="this.style.display=\'none\'">' +
                '<div class="lib-card-name">' + (p.name||'').slice(0,30) + '</div>' +
            '</button>';
        }).join('');
        grid.insertAdjacentHTML('beforeend', html);
        _libPage++;
        const more = document.getElementById('libMoreBtn');
        if (data.length < LIB_PAGE_SIZE) { _libDone = true; more.style.display='none'; }
        else { more.style.display='block'; more.disabled=false; }
    }
    window.loadMore = function(){ loadLibrary(false); };

    let _searchT;
    document.getElementById('searchInput').addEventListener('input', function(e){
        clearTimeout(_searchT);
        _searchT = setTimeout(function(){
            _libQuery = e.target.value.trim();
            loadLibrary(true);
        }, 300);
    });

    // ──────────────────────────────────────────────────────────
    // 캔버스: 요소 추가/렌더링/히트테스트
    // ──────────────────────────────────────────────────────────
    function pushHistory() {
        ST.history.push(JSON.stringify({
            bgColor: ST.bgColor,
            elements: ST.elements.map(e => ({ id:e.id, url:e.url, x:e.x, y:e.y, w:e.w, h:e.h, angle:e.angle, alpha:e.alpha, z:e.z }))
        }));
        if (ST.history.length > 50) ST.history.shift();
        ST.future = [];
        document.getElementById('undoBtn').disabled = false;
        document.getElementById('redoBtn').disabled = true;
    }

    const _imgCache = new Map();
    function loadImg(url) {
        if (_imgCache.has(url)) return Promise.resolve(_imgCache.get(url));
        return new Promise(function(resolve, reject){
            const img = new Image();
            img.crossOrigin = 'anonymous';
            img.onload = function(){ _imgCache.set(url, img); resolve(img); };
            img.onerror = reject;
            img.src = url;
        });
    }

    window.addElementFromLibrary = async function(btn) {
        const url = btn.dataset.url;
        const name = btn.dataset.name;
        try {
            const img = await loadImg(url);
            const maxSide = 350;
            const r = img.width / img.height;
            let w, h;
            if (r >= 1) { w = maxSide; h = maxSide / r; } else { h = maxSide; w = maxSide * r; }
            pushHistory();
            const el = {
                id: ST.nextId++, url, img, name,
                x: STAGE_W/2 + (Math.random()-0.5)*100,
                y: STAGE_H/2 + (Math.random()-0.5)*100,
                w, h, angle: 0, alpha: 1,
                z: ST.elements.length
            };
            ST.elements.push(el);
            ST.selId = el.id;
            renderAll();
            updateSelPanel();
            hideTip();
            toast('"' + (name||'') + '" 추가됨');
        } catch (e) {
            toast('이미지 로드 실패: ' + (e && e.message || e));
        }
    };

    function getEl(id) { return ST.elements.find(e => e.id === id); }
    function selectedEl() { return getEl(ST.selId); }

    function renderAll() {
        ctx.clearRect(0, 0, STAGE_W, STAGE_H);
        // 배경
        if (ST.bgColor && ST.bgColor !== 'transparent') {
            ctx.fillStyle = ST.bgColor;
            ctx.fillRect(0, 0, STAGE_W, STAGE_H);
        }
        // z-order 정렬
        const sorted = ST.elements.slice().sort((a,b) => a.z - b.z);
        sorted.forEach(function(e){
            ctx.save();
            ctx.globalAlpha = e.alpha;
            ctx.translate(e.x, e.y);
            ctx.rotate(e.angle);
            ctx.drawImage(e.img, -e.w/2, -e.h/2, e.w, e.h);
            ctx.restore();
        });
        // 선택 박스
        const sel = selectedEl();
        if (sel) drawSelection(sel);
        renderTilePreview();
    }

    function drawSelection(e) {
        ctx.save();
        ctx.translate(e.x, e.y);
        ctx.rotate(e.angle);
        ctx.strokeStyle = '#b45309';
        ctx.lineWidth = 2;
        ctx.setLineDash([6, 4]);
        ctx.strokeRect(-e.w/2, -e.h/2, e.w, e.h);
        ctx.setLineDash([]);
        // 4 모서리 핸들
        const hs = 12;
        ctx.fillStyle = '#fff';
        ctx.strokeStyle = '#451a03';
        ctx.lineWidth = 2;
        const corners = [[-e.w/2,-e.h/2],[e.w/2,-e.h/2],[e.w/2,e.h/2],[-e.w/2,e.h/2]];
        corners.forEach(function(c){
            ctx.fillRect(c[0]-hs/2, c[1]-hs/2, hs, hs);
            ctx.strokeRect(c[0]-hs/2, c[1]-hs/2, hs, hs);
        });
        // 회전 핸들 (상단)
        ctx.beginPath(); ctx.moveTo(0, -e.h/2); ctx.lineTo(0, -e.h/2 - 30); ctx.stroke();
        ctx.beginPath(); ctx.arc(0, -e.h/2 - 30, 7, 0, Math.PI*2); ctx.fillStyle='#fde047'; ctx.fill(); ctx.stroke();
        ctx.restore();
    }

    // 캔버스 좌표 → 요소 로컬 좌표 변환 (회전 역적용)
    function toLocal(e, gx, gy) {
        const dx = gx - e.x, dy = gy - e.y;
        const c = Math.cos(-e.angle), s = Math.sin(-e.angle);
        return { x: dx*c - dy*s, y: dx*s + dy*c };
    }

    // 클릭 위치에서 어떤 요소/핸들이 잡혔는지 (위→아래 z 순서로 검사)
    function hitTest(gx, gy) {
        const sel = selectedEl();
        if (sel) {
            // 회전 핸들
            const rh = toLocal(sel, gx, gy);
            if (Math.hypot(rh.x, rh.y + sel.h/2 + 30) <= 14) return { kind:'rotate', id: sel.id };
            // 모서리 핸들
            const hs = 14;
            const corners = [['nw',-sel.w/2,-sel.h/2],['ne',sel.w/2,-sel.h/2],['se',sel.w/2,sel.h/2],['sw',-sel.w/2,sel.h/2]];
            for (const cr of corners) {
                if (Math.abs(rh.x - cr[1]) <= hs && Math.abs(rh.y - cr[2]) <= hs) return { kind:'resize', corner: cr[0], id: sel.id };
            }
        }
        // 요소 본체 (위쪽 z 부터)
        const sorted = ST.elements.slice().sort((a,b) => b.z - a.z);
        for (const e of sorted) {
            const lp = toLocal(e, gx, gy);
            if (Math.abs(lp.x) <= e.w/2 && Math.abs(lp.y) <= e.h/2) return { kind:'move', id: e.id };
        }
        return { kind: 'none' };
    }

    // 이벤트
    function evPos(ev) {
        const r = canvas.getBoundingClientRect();
        return {
            x: (ev.clientX - r.left) * (STAGE_W / r.width),
            y: (ev.clientY - r.top) * (STAGE_H / r.height)
        };
    }
    canvas.addEventListener('mousedown', function(ev){
        const p = evPos(ev);
        const h = hitTest(p.x, p.y);
        if (h.kind === 'none') {
            ST.selId = null; renderAll(); updateSelPanel(); return;
        }
        ST.selId = h.id;
        const e = getEl(h.id);
        pushHistory();
        ST.drag = {
            kind: h.kind, corner: h.corner,
            sx: p.x, sy: p.y,
            e0: { x:e.x, y:e.y, w:e.w, h:e.h, angle:e.angle }
        };
        renderAll(); updateSelPanel();
    });
    window.addEventListener('mousemove', function(ev){
        if (!ST.drag) return;
        const p = evPos(ev);
        const e = getEl(ST.drag.id);
        if (!e) { ST.drag = null; return; }
        const d = ST.drag;
        if (d.kind === 'move') {
            e.x = d.e0.x + (p.x - d.sx);
            e.y = d.e0.y + (p.y - d.sy);
        } else if (d.kind === 'rotate') {
            const a = Math.atan2(p.y - e.y, p.x - e.x);
            e.angle = a + Math.PI/2; // 위쪽 핸들 기준
        } else if (d.kind === 'resize') {
            // 로컬 좌표에서 거리 → uniform scale
            const lp = toLocal({ x:d.e0.x, y:d.e0.y, angle:d.e0.angle }, p.x, p.y);
            const orig = Math.hypot(d.e0.w/2, d.e0.h/2);
            const now = Math.hypot(lp.x, lp.y);
            const k = Math.max(0.1, now / orig);
            e.w = d.e0.w * k;
            e.h = d.e0.h * k;
        }
        renderAll();
        if (d.kind !== 'move') updateSelPanel();
    });
    window.addEventListener('mouseup', function(){ ST.drag = null; });

    // 터치 지원 (간단)
    canvas.addEventListener('touchstart', function(ev){
        if (!ev.touches[0]) return;
        const t = ev.touches[0];
        canvas.dispatchEvent(new MouseEvent('mousedown', { clientX:t.clientX, clientY:t.clientY }));
        ev.preventDefault();
    }, { passive:false });
    canvas.addEventListener('touchmove', function(ev){
        if (!ev.touches[0]) return;
        const t = ev.touches[0];
        window.dispatchEvent(new MouseEvent('mousemove', { clientX:t.clientX, clientY:t.clientY }));
        ev.preventDefault();
    }, { passive:false });
    canvas.addEventListener('touchend', function(){
        window.dispatchEvent(new MouseEvent('mouseup'));
    });

    // ──────────────────────────────────────────────────────────
    // 속성 패널 동기화
    // ──────────────────────────────────────────────────────────
    function updateSelPanel() {
        const e = selectedEl();
        const empty = document.getElementById('selPanel');
        const ctl = document.getElementById('selControls');
        if (!e) { empty.style.display='block'; ctl.style.display='none'; return; }
        empty.style.display='none'; ctl.style.display='block';
        document.getElementById('scaleSlider').value = Math.round(Math.max(e.w, e.h));
        document.getElementById('scaleVal').textContent = Math.round(Math.max(e.w, e.h));
        document.getElementById('rotateSlider').value = Math.round(e.angle * 180 / Math.PI);
        document.getElementById('rotateVal').textContent = Math.round(e.angle * 180 / Math.PI) + '°';
        document.getElementById('alphaSlider').value = Math.round(e.alpha * 100);
        document.getElementById('alphaVal').textContent = Math.round(e.alpha * 100) + '%';
    }
    window.updateScale = function(v) {
        const e = selectedEl(); if (!e) return;
        const ratio = e.w / e.h;
        const max = +v;
        if (ratio >= 1) { e.w = max; e.h = max / ratio; }
        else { e.h = max; e.w = max * ratio; }
        document.getElementById('scaleVal').textContent = max;
        renderAll();
    };
    window.updateRotate = function(v) {
        const e = selectedEl(); if (!e) return;
        e.angle = (+v) * Math.PI / 180;
        document.getElementById('rotateVal').textContent = v + '°';
        renderAll();
    };
    window.updateAlpha = function(v) {
        const e = selectedEl(); if (!e) return;
        e.alpha = (+v) / 100;
        document.getElementById('alphaVal').textContent = v + '%';
        renderAll();
    };

    // ──────────────────────────────────────────────────────────
    // 배경색
    // ──────────────────────────────────────────────────────────
    window.selectBgColor = function(color, btnEl) {
        pushHistory();
        ST.bgColor = color;
        document.querySelectorAll('.bg-sw').forEach(b => {
            b.classList.toggle('active', b.dataset.color && b.dataset.color.toLowerCase() === color.toLowerCase());
        });
        if (btnEl && btnEl.classList) btnEl.classList.add('active');
        const picker = document.getElementById('bgPicker');
        if (color !== 'transparent' && picker.value !== color) picker.value = color;
        document.getElementById('bgHex').textContent = color;
        // 캔버스 박스 체커보드 보이게 (투명일 때만)
        document.querySelector('.canvas-box').style.background = (color === 'transparent') ? 'transparent' : color;
        renderAll();
    };

    // ──────────────────────────────────────────────────────────
    // 툴바 액션
    // ──────────────────────────────────────────────────────────
    window.deleteSelected = function() {
        if (!ST.selId) { toast('선택된 요소 없음'); return; }
        pushHistory();
        ST.elements = ST.elements.filter(e => e.id !== ST.selId);
        ST.selId = null;
        renderAll(); updateSelPanel();
    };
    window.duplicateSelected = function() {
        const e = selectedEl(); if (!e) { toast('선택된 요소 없음'); return; }
        pushHistory();
        const copy = Object.assign({}, e, {
            id: ST.nextId++, x: e.x + 60, y: e.y + 60, z: ST.elements.length
        });
        ST.elements.push(copy); ST.selId = copy.id;
        renderAll(); updateSelPanel();
    };
    window.layerChange = function(dir) {
        const e = selectedEl(); if (!e) return;
        pushHistory();
        // 단순화: z 값을 +1/-1
        e.z += dir;
        // 정규화
        const sorted = ST.elements.slice().sort((a,b) => a.z - b.z);
        sorted.forEach((s, i) => s.z = i);
        renderAll();
    };
    window.clearAll = function() {
        if (ST.elements.length === 0) return;
        if (!confirm('모든 요소를 지울까요? (되돌리기로 복구 가능)')) return;
        pushHistory();
        ST.elements = []; ST.selId = null;
        renderAll(); updateSelPanel();
    };
    window.scatterSelected = async function() {
        const e = selectedEl();
        if (!e) { toast('선택된 요소를 캔버스에 흩뿌립니다 — 먼저 요소를 선택하세요'); return; }
        const n = parseInt(prompt('몇 개로 흩뿌릴까요? (현재 선택 요소 기준, 권장 8~30)', '15'), 10);
        if (!n || n < 1 || n > 200) return;
        pushHistory();
        const base = e;
        const baseSize = Math.max(base.w, base.h);
        for (let i = 0; i < n; i++) {
            const k = 0.6 + Math.random() * 0.8;     // 크기 변동 60~140%
            const size = baseSize * k;
            const ratio = base.w / base.h;
            const w = ratio >= 1 ? size : size * ratio;
            const h = ratio >= 1 ? size / ratio : size;
            ST.elements.push({
                id: ST.nextId++, url: base.url, img: base.img, name: base.name,
                x: 80 + Math.random() * (STAGE_W - 160),
                y: 80 + Math.random() * (STAGE_H - 160),
                w, h,
                angle: (Math.random() - 0.5) * Math.PI,  // -90 ~ +90도
                alpha: base.alpha,
                z: ST.elements.length
            });
        }
        toast('흩뿌리기 ' + n + '개 추가됨');
        renderAll();
    };
    async function rebuildElementsAsync(arr) {
        const out = [];
        for (const p of arr) {
            let img = null;
            try { img = await loadImg(p.url); } catch (e) {}
            out.push(Object.assign({}, p, { img }));
        }
        return out;
    }
    window.undo = async function() {
        if (ST.history.length === 0) return;
        const cur = JSON.stringify({
            bgColor: ST.bgColor,
            elements: ST.elements.map(e => ({ id:e.id, url:e.url, x:e.x, y:e.y, w:e.w, h:e.h, angle:e.angle, alpha:e.alpha, z:e.z }))
        });
        ST.future.push(cur);
        const prev = JSON.parse(ST.history.pop());
        ST.bgColor = prev.bgColor;
        ST.elements = await rebuildElementsAsync(prev.elements);
        ST.selId = null;
        renderAll(); updateSelPanel();
        document.getElementById('redoBtn').disabled = false;
        document.getElementById('undoBtn').disabled = ST.history.length === 0;
        // canvas-box 배경 동기화
        document.querySelector('.canvas-box').style.background = (ST.bgColor === 'transparent') ? 'transparent' : ST.bgColor;
    };
    window.redo = async function() {
        if (ST.future.length === 0) return;
        ST.history.push(JSON.stringify({
            bgColor: ST.bgColor,
            elements: ST.elements.map(e => ({ id:e.id, url:e.url, x:e.x, y:e.y, w:e.w, h:e.h, angle:e.angle, alpha:e.alpha, z:e.z }))
        }));
        const next = JSON.parse(ST.future.pop());
        ST.bgColor = next.bgColor;
        ST.elements = await rebuildElementsAsync(next.elements);
        ST.selId = null;
        renderAll(); updateSelPanel();
        document.getElementById('undoBtn').disabled = false;
        document.getElementById('redoBtn').disabled = ST.future.length === 0;
        document.querySelector('.canvas-box').style.background = (ST.bgColor === 'transparent') ? 'transparent' : ST.bgColor;
    };

    // 단축키
    document.addEventListener('keydown', function(ev){
        if (ev.target.tagName === 'INPUT' || ev.target.tagName === 'TEXTAREA') return;
        if (ev.key === 'Delete' || ev.key === 'Backspace') { if (ST.selId) { deleteSelected(); ev.preventDefault(); } }
        else if ((ev.ctrlKey || ev.metaKey) && ev.key === 'z') { ev.preventDefault(); undo(); }
        else if ((ev.ctrlKey || ev.metaKey) && (ev.key === 'y' || ev.key === 'Z')) { ev.preventDefault(); redo(); }
        else if ((ev.ctrlKey || ev.metaKey) && ev.key === 'd') { ev.preventDefault(); duplicateSelected(); }
    });

    // ──────────────────────────────────────────────────────────
    // 타일링 미리보기 (3×3)
    // ──────────────────────────────────────────────────────────
    function renderTilePreview() {
        const tw = tileCv.width, th = tileCv.height;
        tileCtx.clearRect(0, 0, tw, th);
        if (ST.bgColor && ST.bgColor !== 'transparent') {
            tileCtx.fillStyle = ST.bgColor;
            tileCtx.fillRect(0, 0, tw, th);
        } else {
            // 체커보드
            const sz = 12;
            for (let y = 0; y < th; y += sz) {
                for (let x = 0; x < tw; x += sz) {
                    tileCtx.fillStyle = ((x/sz + y/sz) % 2 === 0) ? '#f5f5f4' : '#fff';
                    tileCtx.fillRect(x, y, sz, sz);
                }
            }
        }
        const cellW = tw / 3, cellH = th / 3;
        for (let r = 0; r < 3; r++) {
            for (let c = 0; c < 3; c++) {
                tileCtx.save();
                tileCtx.translate(c * cellW, r * cellH);
                tileCtx.scale(cellW / STAGE_W, cellH / STAGE_H);
                ST.elements.slice().sort((a,b) => a.z - b.z).forEach(function(e){
                    if (!e.img) return;
                    tileCtx.save();
                    tileCtx.globalAlpha = e.alpha;
                    tileCtx.translate(e.x, e.y);
                    tileCtx.rotate(e.angle);
                    tileCtx.drawImage(e.img, -e.w/2, -e.h/2, e.w, e.h);
                    tileCtx.restore();
                });
                tileCtx.restore();
            }
        }
    }

    // ──────────────────────────────────────────────────────────
    // 저장 & 주문
    // ──────────────────────────────────────────────────────────
    function exportCanvas() {
        // 선택 표시 없이 깨끗하게 export
        const out = document.createElement('canvas');
        out.width = STAGE_W; out.height = STAGE_H;
        const o = out.getContext('2d');
        if (ST.bgColor && ST.bgColor !== 'transparent') {
            o.fillStyle = ST.bgColor;
            o.fillRect(0, 0, STAGE_W, STAGE_H);
        }
        ST.elements.slice().sort((a,b) => a.z - b.z).forEach(function(e){
            if (!e.img) return;
            o.save();
            o.globalAlpha = e.alpha;
            o.translate(e.x, e.y);
            o.rotate(e.angle);
            o.drawImage(e.img, -e.w/2, -e.h/2, e.w, e.h);
            o.restore();
        });
        return out;
    }
    window.downloadPng = function() {
        if (ST.elements.length === 0) { toast('먼저 요소를 추가하세요'); return; }
        const out = exportCanvas();
        const a = document.createElement('a');
        a.href = out.toDataURL('image/png');
        a.download = 'my_pattern_' + Date.now() + '.png';
        a.click();
        toast('PNG 다운로드 시작');
    };
    window.goOrder = function() {
        if (ST.elements.length === 0) { toast('먼저 요소를 추가하세요'); return; }
        try {
            const out = exportCanvas();
            const dataUrl = out.toDataURL('image/png');
            // sessionStorage 용량: 보통 5MB. PNG는 클 수 있어 splitter 필요할 수 있지만 일단 시도
            try {
                sessionStorage.setItem('cp_composed_image', dataUrl);
                sessionStorage.setItem('cp_composed_bg', ST.bgColor || '#ffffff');
                location.href = '/designer?from=composer';
            } catch (storageErr) {
                // 용량 초과 시 다운로드 후 안내
                toast('이미지가 커서 저장 불가 — PNG 다운로드 후 일반 업로드 사용');
                downloadPng();
            }
        } catch (e) {
            toast('주문 페이지 전환 실패: ' + e.message);
        }
    };

    // ──────────────────────────────────────────────────────────
    // 보조
    // ──────────────────────────────────────────────────────────
    function toast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg; t.style.display = 'block';
        clearTimeout(window._toastT);
        window._toastT = setTimeout(() => t.style.display = 'none', 2200);
    }
    function hideTip() {
        const tip = document.getElementById('canvasTip');
        if (tip) tip.classList.add('hidden');
        setTimeout(() => { if (tip) tip.remove(); }, 600);
    }

    // 초기화
    document.getElementById('undoBtn').disabled = true;
    document.getElementById('redoBtn').disabled = true;
    renderAll();
    loadLibrary(true);
})();
</script>

</body>
</html>
