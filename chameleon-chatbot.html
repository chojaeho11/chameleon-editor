<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chameleon AI Chat</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="style.css?v=279">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
        font-family: 'Pretendard', -apple-system, sans-serif;
        background: #374151;
        height: 100%;
        overflow: hidden;
        margin: 0;
        padding: 0;
    }
    /* advisor-panel 전체화면 (iframe/standalone 모드) */
    .advisor-panel {
        max-width: 100% !important;
        width: 100% !important;
        margin: 0 !important;
        padding: 0 !important;
        height: 100vh !important;
        display: flex !important;
        flex-direction: column !important;
        overflow: hidden !important;
    }
    .adv-panel-header {
        flex-shrink: 0 !important;
        border-radius: 0 !important;
    }
    .adv-chat-area {
        flex: 1 1 0 !important;
        max-height: none !important;
        height: 0 !important;
        min-height: 0 !important;
        overflow-y: auto !important;
        border-radius: 0 !important;
    }
    .adv-input-area {
        flex-shrink: 0 !important;
        border-radius: 0 !important;
    }
    .adv-img-preview {
        flex-shrink: 0 !important;
    }
    /* 기본 닫기 버튼 숨기고 커스텀 닫기 추가 */
    .adv-panel-close { display: none !important; }
    /* Play Here 버튼 숨기기 (standalone에서 불필요) */
    .adv-studio-btn { display: none !important; }
</style>
</head>
<body>

<div id="advisorPanel" class="advisor-panel" style="display:none"></div>

<script>
// lang 파라미터로 SITE_CONFIG 설정
(function() {
    var params = new URLSearchParams(location.search);
    var lang = (params.get('lang') || 'kr').toUpperCase();
    var countryMap = { KR: 'KR', JA: 'JP', JP: 'JP', EN: 'US', US: 'US', ZH: 'CN', CN: 'CN', AR: 'AR', ES: 'ES', DE: 'DE', FR: 'FR' };
    var country = countryMap[lang] || 'KR';
    window.__SITE_CODE = country;
    window.SITE_CONFIG = { COUNTRY: country };
})();
</script>

<script type="module">
import { initAdvisorPanel } from './advisor-panel.js?v=279';
initAdvisorPanel();

// 커스텀 닫기 버튼 삽입
setTimeout(() => {
    const header = document.querySelector('.adv-panel-header');
    if (header) {
        const closeBtn = document.createElement('button');
        closeBtn.innerHTML = '<i class="fa-solid fa-xmark"></i>';
        closeBtn.style.cssText = 'background:rgba(255,255,255,0.2);border:none;color:#fff;width:32px;height:32px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;margin-left:4px;';
        closeBtn.onclick = () => {
            try {
                if (window.parent && window.parent !== window) {
                    const wrap = window.parent.document.getElementById('chatIframeWrap');
                    if (wrap) { wrap.style.display = 'none'; window.parent._chatIframeOpen = false; return; }
                }
                window.close();
            } catch(err) { window.close(); }
        };
        // 버튼 그룹 끝에 추가
        const btnGroup = header.querySelector('div[style*="display:flex"]') || header;
        btnGroup.appendChild(closeBtn);
    }
}, 800);
</script>

</body>
</html>
