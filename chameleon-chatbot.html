<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chameleon AI Chat</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="style.css?v=279">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: 'Pretendard', -apple-system, sans-serif;
        background: #f1f5f9;
        height: 100vh;
        overflow: hidden;
    }
    /* advisor-panel을 전체화면으로 */
    .advisor-panel {
        max-width: 100% !important;
        width: 100% !important;
        margin: 0 !important;
        padding: 0 !important;
        height: 100vh !important;
        display: flex !important;
        flex-direction: column !important;
    }
    .adv-chat-area {
        flex: 1 !important;
        max-height: none !important;
        height: auto !important;
    }
    /* 닫기 버튼 숨기기 (standalone이므로) */
    .adv-panel-close { display: none !important; }
</style>
</head>
<body>

<div id="advisorPanel" class="advisor-panel" style="display:none"></div>

<script>
// lang 파라미터로 SITE_CONFIG 설정
(function() {
    var params = new URLSearchParams(location.search);
    var lang = (params.get('lang') || 'kr').toUpperCase();
    var countryMap = { KR: 'KR', JA: 'JP', JP: 'JP', EN: 'US', US: 'US', ZH: 'CN', CN: 'CN', AR: 'AR', ES: 'ES', DE: 'DE', FR: 'FR' };
    var country = countryMap[lang] || 'KR';
    window.__SITE_CODE = country;
    window.SITE_CONFIG = { COUNTRY: country };
})();
</script>

<script type="module">
import { initAdvisorPanel } from './advisor-panel.js?v=279';
initAdvisorPanel();
</script>

</body>
</html>
