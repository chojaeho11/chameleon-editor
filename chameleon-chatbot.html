<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chameleon AI Chat</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="style.css?v=411">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
        font-family: 'Pretendard', -apple-system, sans-serif;
        background: #374151;
        height: 100%;
        overflow: hidden;
        margin: 0;
        padding: 0;
    }
    /* advisor-panel 전체화면 (iframe/standalone 모드) */
    .advisor-panel {
        max-width: 100% !important;
        width: 100% !important;
        margin: 0 !important;
        padding: 0 !important;
        height: 100vh !important;
        display: flex !important;
        flex-direction: column !important;
        overflow: hidden !important;
    }
    .adv-panel-header {
        flex-shrink: 0 !important;
        border-radius: 0 !important;
    }
    .adv-chat-area {
        flex: 1 1 0 !important;
        max-height: none !important;
        height: 0 !important;
        min-height: 0 !important;
        overflow-y: auto !important;
        border-radius: 0 !important;
    }
    .adv-input-area {
        flex-shrink: 0 !important;
        border-radius: 0 !important;
    }
    .adv-img-preview {
        flex-shrink: 0 !important;
    }
    /* 기본 닫기 버튼 숨기고 커스텀 닫기 추가 */
    .adv-panel-close { display: none !important; }
    /* Play Here 버튼 — iframe에서도 표시 */
</style>
</head>
<body>

<div id="advisorPanel" class="advisor-panel" style="display:none"></div>

<script>
// lang 파라미터로 SITE_CONFIG 설정
(function() {
    var params = new URLSearchParams(location.search);
    var lang = (params.get('lang') || 'kr').toUpperCase();
    var countryMap = { KR: 'KR', JA: 'JP', JP: 'JP', EN: 'US', US: 'US', ZH: 'CN', CN: 'CN', AR: 'AR', ES: 'ES', DE: 'DE', FR: 'FR' };
    var country = countryMap[lang] || 'KR';
    window.__SITE_CODE = country;
    window.SITE_CONFIG = { COUNTRY: country };
})();
</script>

<script type="module">
import { initAdvisorPanel } from './advisor-panel.js?v=466';
initAdvisorPanel();

// 2026-06-14: iframe 내부의 닫기 버튼이 advisor-panel 의 toggleAdvisorPanel 을 호출하므로,
//   그것을 OVERRIDE 해서 부모 wrapper 까지 닫도록 한다 (X 가 여러 개여도 모두 동작).
function _closeAllParentChatWrappers() {
    if (!window.parent || window.parent === window) return false;
    var p = window.parent;
    var closed = false;
    try { p.postMessage('closeKapuChat', '*'); closed = true; } catch(_e) {}
    try { p.postMessage({ type: 'closeKapuChat' }, '*'); } catch(_e) {}
    try {
        var ids = ['chatIframeMobileWrap', 'chatIframeWrap', 'kapuChatWrap'];
        ids.forEach(function(id){
            var w = p.document.getElementById(id);
            if (w) { w.style.display = 'none'; closed = true; }
        });
        try { p.document.body.style.overflow = ''; } catch(_e) {}
        if ('_chatIframeOpen' in p) p._chatIframeOpen = false;
        var kF = p.document.getElementById('kapuFab');
        if (kF) { kF.innerHTML = '<i class="fa-solid fa-wand-magic-sparkles"></i>'; kF.style.display = ''; }
    } catch(_e) {}
    return closed;
}
// 첫 호출 시점 (initAdvisorPanel 이 window.toggleAdvisorPanel 을 정의한 후) 에 override
var _origToggle = null;
function _installToggleOverride() {
    if (typeof window.toggleAdvisorPanel !== 'function') return false;
    if (window.toggleAdvisorPanel.__cpOverridden) return true;
    _origToggle = window.toggleAdvisorPanel;
    window.toggleAdvisorPanel = function() {
        // iframe 내부에서 호출 — 부모 wrapper 도 닫고, 그 후 원본도 실행해 advisor-panel 자체 상태 정리
        if (_closeAllParentChatWrappers()) {
            try { _origToggle.apply(window, arguments); } catch(_e) {}
            return;
        }
        // 부모 없음 (standalone) — 원본 실행
        return _origToggle.apply(window, arguments);
    };
    window.toggleAdvisorPanel.__cpOverridden = true;
    return true;
}
// advisor-panel 이 비동기로 정의할 수 있으므로 polling
(function(){
    var tries = 0;
    var iv = setInterval(function(){
        tries++;
        if (_installToggleOverride() || tries > 40) clearInterval(iv);
    }, 100);
})();

// 커스텀 닫기 버튼 삽입
setTimeout(() => {
    const header = document.querySelector('.adv-panel-header');
    if (header) {
        const closeBtn = document.createElement('button');
        closeBtn.innerHTML = '<i class="fa-solid fa-xmark"></i>';
        closeBtn.style.cssText = 'background:rgba(255,255,255,0.2);border:none;color:#fff;width:32px;height:32px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;margin-left:4px;';
        // 2026-06-14: 닫기 폴백 체인 — postMessage(가장 안전) → DOM 직접 조작 → toggleAdvisorPanel → window.close
        closeBtn.onclick = () => {
            try {
                // 1) iframe 안에서 호출되는 경우 — postMessage + 부모창 DOM 양쪽 시도
                if (window.parent && window.parent !== window) {
                    var p = window.parent;
                    // postMessage 우선 — cross-origin/iframe 안전성 최고. cotton_print/cotton_designer 가 받아 처리.
                    try { p.postMessage('closeKapuChat', '*'); } catch(_pme) {}
                    try { p.postMessage({ type: 'closeKapuChat' }, '*'); } catch(_pme2) {}
                    // 동시에 DOM 직접 조작도 (same-origin 일 때 즉시 닫힘)
                    try {
                        var mWrap = p.document.getElementById('chatIframeMobileWrap');
                        if (mWrap) { mWrap.style.display = 'none'; try { p.document.body.style.overflow = ''; } catch(e){} if ('_chatIframeOpen' in p) p._chatIframeOpen = false; }
                        var dWrap = p.document.getElementById('chatIframeWrap');
                        if (dWrap) { dWrap.style.display = 'none'; if ('_chatIframeOpen' in p) p._chatIframeOpen = false; }
                        var kWrap = p.document.getElementById('kapuChatWrap');
                        if (kWrap) { kWrap.style.display = 'none'; try { p.document.body.style.overflow = ''; } catch(e){} var kF = p.document.getElementById('kapuFab'); if (kF) { kF.innerHTML = '<i class="fa-solid fa-wand-magic-sparkles"></i>'; kF.style.display = ''; } }
                        if (typeof p.toggleAdvisorPanel === 'function' && !mWrap && !dWrap && !kWrap) p.toggleAdvisorPanel();
                        else {
                            var advP = p.document.getElementById('advisorPanel');
                            if (advP && !mWrap && !dWrap && !kWrap) { advP.style.display = 'none'; try { p.document.body.style.overflow = ''; } catch(e){} }
                        }
                    } catch(_dome) {}
                    return;
                }
                // 2) 현재 창 (advisor-panel 직접 노출)
                if (typeof window.toggleAdvisorPanel === 'function') { window.toggleAdvisorPanel(); return; }
                var advSelf = document.getElementById('advisorPanel');
                if (advSelf) { advSelf.style.display = 'none'; try { document.body.style.overflow = ''; } catch(e){} return; }
                // 3) 마지막 fallback
                window.close();
            } catch(err) {
                try { window.close(); } catch(e2) {}
            }
        };
        // 버튼 그룹 끝에 추가
        const btnGroup = header.querySelector('div[style*="display:flex"]') || header;
        btnGroup.appendChild(closeBtn);
    }
}, 800);
</script>

</body>
</html>
