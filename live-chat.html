<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>카멜레온 실시간 상담</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js"></script>
<style>
:root {
    --primary: #6366f1;
    --primary-dark: #4338ca;
    --primary-light: #e0e7ff;
    --bg: #f1f5f9;
    --card: #ffffff;
    --text: #1e293b;
    --text-sub: #64748b;
    --border: #e2e8f0;
    --success: #22c55e;
    --warning: #f59e0b;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }
body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
}
body.embed { background: transparent; }

/* ===== Name Input View ===== */
.name-view {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    padding: 20px;
}
.name-card {
    background: var(--card);
    border-radius: 20px;
    padding: 40px 30px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 20px 60px rgba(99,102,241,0.12);
    border: 1px solid var(--border);
    text-align: center;
}
.name-logo {
    width: 72px; height: 72px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px;
    font-size: 32px;
    box-shadow: 0 8px 24px rgba(99,102,241,0.3);
}
.name-card h1 {
    font-size: 22px; font-weight: 800; color: var(--text); margin-bottom: 6px;
}
.name-card p {
    font-size: 14px; color: var(--text-sub); margin-bottom: 24px; line-height: 1.5;
}
.name-card input, .name-card textarea {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 15px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 12px;
    resize: none;
}
.name-card input:focus, .name-card textarea:focus {
    border-color: var(--primary);
}
.name-card .start-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
}
.start-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(99,102,241,0.4); }
.start-btn:active { transform: scale(0.98); }
.start-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

/* ===== Chat View ===== */
.chat-view {
    display: none;
    flex-direction: column;
    width: 100%;
    max-width: 500px;
    height: 100%;
    max-height: 100vh;
    background: var(--card);
    border-radius: 0;
    overflow: hidden;
}
body:not(.embed) .chat-view {
    border-radius: 16px;
    max-height: 700px;
    box-shadow: 0 20px 60px rgba(99,102,241,0.12);
    border: 1px solid var(--border);
}
@media (max-width: 520px) {
    body:not(.embed) .chat-view {
        max-width: 100%;
        max-height: 100%;
        border-radius: 0;
        border: none;
        box-shadow: none;
    }
}

/* Header */
.ch-header {
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
}
.ch-header-avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
}
.ch-header-info h2 {
    color: white; font-size: 15px; font-weight: 700;
}
.ch-header-info .ch-status {
    font-size: 12px;
    display: flex; align-items: center; gap: 5px;
    margin-top: 2px;
}
.ch-status-dot {
    width: 7px; height: 7px; border-radius: 50%; display: inline-block;
}
.ch-status-dot.waiting { background: var(--warning); }
.ch-status-dot.active { background: var(--success); }
.ch-status-dot.closed { background: #94a3b8; }
.ch-status-text { color: rgba(255,255,255,0.85); }
.ch-header-close {
    margin-left: auto;
    background: rgba(255,255,255,0.15);
    border: none; color: white;
    width: 32px; height: 32px; border-radius: 50%;
    cursor: pointer;
    display: none; /* shown only in embed mode */
    align-items: center; justify-content: center;
    font-size: 14px;
    transition: background 0.2s;
}
body.embed .ch-header-close { display: flex; }
.ch-header-close:hover { background: rgba(255,255,255,0.3); }

/* Messages Area */
.ch-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: var(--bg);
    scroll-behavior: smooth;
}
.ch-messages::-webkit-scrollbar { width: 4px; }
.ch-messages::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

/* Message Bubbles */
.msg-row {
    display: flex;
    flex-direction: column;
    max-width: 80%;
    animation: msgIn 0.3s ease-out;
}
@keyframes msgIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
}
.msg-row.customer { align-self: flex-end; align-items: flex-end; }
.msg-row.manager { align-self: flex-start; align-items: flex-start; }
.msg-row.system { align-self: center; max-width: 90%; }

.msg-sender {
    font-size: 11px; color: var(--text-sub); margin-bottom: 3px; padding: 0 4px;
    font-weight: 600;
}
.msg-bubble {
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.5;
    word-break: break-word;
    position: relative;
}
.msg-row.customer .msg-bubble {
    background: var(--primary);
    color: white;
    border-bottom-right-radius: 4px;
}
.msg-row.manager .msg-bubble {
    background: var(--card);
    color: var(--text);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
}
.msg-row.system .msg-bubble {
    background: var(--border);
    color: var(--text-sub);
    font-size: 12px;
    text-align: center;
    border-radius: 20px;
    padding: 6px 14px;
}
.msg-time {
    font-size: 10px; color: #94a3b8; margin-top: 3px; padding: 0 4px;
}
.msg-file-img {
    max-width: 220px; max-height: 200px;
    border-radius: 10px; cursor: pointer;
    border: 1px solid var(--border);
}
.msg-file-link {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 12px; background: #f8fafc; border: 1px solid var(--border);
    border-radius: 8px; font-size: 13px; color: var(--primary);
    text-decoration: none; margin-top: 4px;
}
.msg-file-link:hover { background: var(--primary-light); }

/* Typing Indicator */
.typing-indicator {
    display: none;
    align-self: flex-start;
    padding: 10px 14px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    border-bottom-left-radius: 4px;
}
.typing-dots { display: flex; gap: 4px; }
.typing-dots span {
    width: 6px; height: 6px; border-radius: 50%; background: #94a3b8;
    animation: typingBounce 1.4s infinite;
}
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-4px); }
}

/* Input Area */
.ch-input {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    padding: 12px 16px;
    background: var(--card);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
}
.ch-input-file {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: #f1f5f9;
    border: 1px solid var(--border);
    color: var(--text-sub);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: 0.2s;
    position: relative;
    overflow: hidden;
}
.ch-input-file:hover { border-color: var(--primary); color: var(--primary); }
.ch-input-file input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.ch-input-text {
    flex: 1;
    padding: 9px 14px;
    border: 1.5px solid var(--border);
    border-radius: 20px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    resize: none;
    max-height: 100px;
    line-height: 1.4;
    transition: border-color 0.2s;
}
.ch-input-text:focus { border-color: var(--primary); }
.ch-input-send {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--primary);
    border: none;
    color: white;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: 0.2s;
    font-size: 14px;
}
.ch-input-send:hover { background: var(--primary-dark); }
.ch-input-send:disabled { opacity: 0.5; cursor: not-allowed; }

/* Connection Banner */
.conn-banner {
    display: none;
    padding: 6px 12px;
    text-align: center;
    font-size: 12px;
    font-weight: 600;
}
.conn-banner.offline {
    display: block;
    background: #fef2f2;
    color: #dc2626;
    border-bottom: 1px solid #fca5a5;
}
.conn-banner.reconnecting {
    display: block;
    background: #fffbeb;
    color: #d97706;
    border-bottom: 1px solid #fde68a;
}

/* New Chat Button (after room closed) */
.new-chat-btn {
    padding: 10px 20px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin: 10px auto;
    display: block;
}

/* Toast */
.lc-toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-100px);
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    color: white;
    background: #334155;
    z-index: 99999;
    transition: transform 0.3s;
    white-space: nowrap;
}
.lc-toast.show { transform: translateX(-50%) translateY(0); }
.lc-toast.error { background: #ef4444; }
.lc-toast.success { background: #22c55e; }
</style>
</head>
<body>

<!-- VIEW A: Name Input -->
<div id="viewName" class="name-view">
    <div class="name-card">
        <div class="name-logo">
            <i class="fa-solid fa-comments" style="color:white;"></i>
        </div>
        <h1 id="titleText">실시간 상담</h1>
        <p id="subtitleText">이름과 문의 내용을 입력하시면<br>담당자가 바로 연결됩니다.</p>
        <input type="text" id="nameInput" maxlength="30">
        <textarea id="firstMsgInput" rows="3"></textarea>
        <button class="start-btn" id="startBtn" onclick="onStartChat()">
            <i class="fa-solid fa-paper-plane"></i>
            <span id="startBtnText">상담 시작</span>
        </button>
    </div>
</div>

<!-- VIEW B: Chat -->
<div id="viewChat" class="chat-view">
    <!-- Header -->
    <div class="ch-header">
        <div class="ch-header-avatar">
            <i class="fa-solid fa-headset" style="color:white;"></i>
        </div>
        <div class="ch-header-info">
            <h2 id="chatTitle">카멜레온 상담</h2>
            <div class="ch-status">
                <span class="ch-status-dot waiting" id="statusDot"></span>
                <span class="ch-status-text" id="statusText">대기중</span>
            </div>
        </div>
        <button class="ch-header-close" onclick="closeEmbed()" title="닫기">
            <i class="fa-solid fa-xmark"></i>
        </button>
    </div>

    <!-- Connection Banner -->
    <div class="conn-banner" id="connBanner"></div>

    <!-- Messages -->
    <div class="ch-messages" id="chatMessages"></div>

    <!-- Typing Indicator -->
    <div class="typing-indicator" id="typingIndicator">
        <div class="typing-dots"><span></span><span></span><span></span></div>
    </div>

    <!-- Input -->
    <div class="ch-input" id="chatInputArea">
        <label class="ch-input-file" title="파일 첨부">
            <i class="fa-solid fa-paperclip"></i>
            <input type="file" id="fileInput" multiple accept="image/*,.pdf,.zip,.doc,.docx" onchange="onFileSelect(event)">
        </label>
        <textarea class="ch-input-text" id="msgInput" rows="1" onkeydown="onMsgKeydown(event)" oninput="autoGrow(this)"></textarea>
        <button class="ch-input-send" id="sendBtn" onclick="onSendMessage()">
            <i class="fa-solid fa-paper-plane"></i>
        </button>
    </div>
</div>

<!-- Toast -->
<div class="lc-toast" id="lcToast"></div>

<script>
(function() {
'use strict';

// ===== Config =====
var SUPA_URL = 'https://qinvtnhiidtmrzosyvys.supabase.co';
var SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFpbnZ0bmhpaWR0bXJ6b3N5dnlzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjMyMDE3NjQsImV4cCI6MjA3ODc3Nzc2NH0.3z0f7R4w3bqXTOMTi19ksKSeAkx8HOOTONNSos8Xz8Y';
var STORAGE_KEY = 'chameleon_livechat_session';
var SESSION_EXPIRE_MS = 7 * 24 * 3600 * 1000; // 7 days

var sb = null;
var roomId = null;
var customerName = '';
var subscription = null;
var roomSubscription = null;
var isEmbed = false;
var roomStatus = 'waiting';
var sentMsgIds = new Set(); // track optimistically rendered messages

// ===== Site Detection =====
function detectSite() {
    var h = location.hostname;
    if (h.indexOf('cafe0101') >= 0) return { code: 'JP', lang: 'ja' };
    if (h.indexOf('cafe3355') >= 0) return { code: 'US', lang: 'en' };
    return { code: 'KR', lang: 'kr' };
}
var site = detectSite();

// ===== i18n =====
var LANG = {
    kr: {
        title: '실시간 상담',
        subtitle: '이름과 문의 내용을 입력하시면\n담당자가 바로 연결됩니다.',
        namePlaceholder: '이름 입력',
        msgPlaceholder: '문의 내용을 입력하세요',
        chatMsgPlaceholder: '메시지를 입력하세요...',
        startBtn: '상담 시작',
        chatTitle: '카멜레온 상담',
        statusWaiting: '담당자 연결 대기중...',
        statusActive: '상담 연결됨',
        statusClosed: '상담 종료',
        nameRequired: '이름을 입력해주세요',
        msgRequired: '문의 내용을 입력해주세요',
        createFail: '상담방 생성에 실패했습니다',
        sendFail: '메시지 전송 실패',
        uploadFail: '파일 업로드 실패',
        fileReceived: '파일을 받았습니다',
        newMsg: '새 메시지',
        newChatBtn: '새 상담 시작',
        roomClosed: '상담이 종료되었습니다',
        connLost: '연결이 끊어졌습니다',
        reconnecting: '재연결 중...',
        manager: '상담사'
    },
    ja: {
        title: 'リアルタイム相談',
        subtitle: 'お名前とお問い合わせ内容を入力すると\n担当者がすぐに対応いたします。',
        namePlaceholder: 'お名前',
        msgPlaceholder: 'お問い合わせ内容',
        chatMsgPlaceholder: 'メッセージを入力...',
        startBtn: '相談開始',
        chatTitle: 'カメレオン相談',
        statusWaiting: '担当者接続待ち...',
        statusActive: '相談中',
        statusClosed: '相談終了',
        nameRequired: 'お名前を入力してください',
        msgRequired: 'お問い合わせ内容を入力してください',
        createFail: '相談ルーム作成に失敗しました',
        sendFail: 'メッセージ送信失敗',
        uploadFail: 'ファイルアップロード失敗',
        fileReceived: 'ファイルを受け取りました',
        newMsg: '新しいメッセージ',
        newChatBtn: '新しい相談を開始',
        roomClosed: '相談が終了しました',
        connLost: '接続が切れました',
        reconnecting: '再接続中...',
        manager: '担当者'
    },
    en: {
        title: 'Live Chat',
        subtitle: 'Enter your name and message.\nOur team will assist you shortly.',
        namePlaceholder: 'Your name',
        msgPlaceholder: 'How can we help you?',
        chatMsgPlaceholder: 'Type a message...',
        startBtn: 'Start Chat',
        chatTitle: 'Chameleon Support',
        statusWaiting: 'Waiting for agent...',
        statusActive: 'Connected',
        statusClosed: 'Chat ended',
        nameRequired: 'Please enter your name',
        msgRequired: 'Please enter your message',
        createFail: 'Failed to create chat room',
        sendFail: 'Failed to send message',
        uploadFail: 'File upload failed',
        fileReceived: 'File received',
        newMsg: 'New message',
        newChatBtn: 'Start New Chat',
        roomClosed: 'This chat has ended',
        connLost: 'Connection lost',
        reconnecting: 'Reconnecting...',
        manager: 'Agent'
    }
};

function t(key) {
    return (LANG[site.lang] || LANG.kr)[key] || key;
}

// ===== Init =====
function init() {
    sb = window.supabase.createClient(SUPA_URL, SUPA_KEY);
    isEmbed = new URLSearchParams(location.search).get('embed') === 'true';
    if (isEmbed) document.body.classList.add('embed');

    // Apply language
    applyLanguage();

    // Check for existing session
    var session = loadSession();
    if (session && session.roomId) {
        roomId = session.roomId;
        customerName = session.name;
        showChatView();
        loadMessages();
        startSubscriptions();
    } else {
        showNameView();
    }

    // Request notification permission
    if ('Notification' in window && Notification.permission === 'default') {
        Notification.requestPermission();
    }
}

function applyLanguage() {
    document.getElementById('titleText').textContent = t('title');
    var sub = document.getElementById('subtitleText');
    sub.innerHTML = t('subtitle').replace(/\n/g, '<br>');
    document.getElementById('nameInput').placeholder = t('namePlaceholder');
    document.getElementById('firstMsgInput').placeholder = t('msgPlaceholder');
    document.getElementById('startBtnText').textContent = t('startBtn');
    document.getElementById('chatTitle').textContent = t('chatTitle');
    document.getElementById('msgInput').placeholder = t('chatMsgPlaceholder');
    document.title = t('chatTitle');
}

// ===== Session Persistence =====
function saveSession() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
        roomId: roomId,
        name: customerName,
        ts: Date.now()
    }));
}
function loadSession() {
    try {
        var s = JSON.parse(localStorage.getItem(STORAGE_KEY));
        if (s && (Date.now() - s.ts) < SESSION_EXPIRE_MS) return s;
    } catch(e) {}
    return null;
}
function clearSession() {
    localStorage.removeItem(STORAGE_KEY);
    roomId = null;
    customerName = '';
}

// ===== View Switching =====
function showNameView() {
    document.getElementById('viewName').style.display = 'flex';
    document.getElementById('viewChat').style.display = 'none';
    setTimeout(function() { document.getElementById('nameInput').focus(); }, 100);
}
function showChatView() {
    document.getElementById('viewName').style.display = 'none';
    document.getElementById('viewChat').style.display = 'flex';
    updateStatusUI(roomStatus);
    setTimeout(function() { document.getElementById('msgInput').focus(); }, 100);
}

// ===== Start Chat =====
window.onStartChat = async function() {
    var nameEl = document.getElementById('nameInput');
    var msgEl = document.getElementById('firstMsgInput');
    var name = nameEl.value.trim();
    var msg = msgEl.value.trim();

    if (!name) { showToast(t('nameRequired'), 'error'); nameEl.focus(); return; }
    if (!msg) { showToast(t('msgRequired'), 'error'); msgEl.focus(); return; }

    var btn = document.getElementById('startBtn');
    btn.disabled = true;

    try {
        customerName = name;

        // 1. Create room
        var res = await sb.from('chat_rooms').insert({
            customer_name: name,
            status: 'waiting',
            source: 'live-chat',
            site_lang: site.lang,
            assigned_manager: ''
        }).select().single();

        if (res.error) throw res.error;
        roomId = res.data.id;
        roomStatus = 'waiting';
        saveSession();

        // 2. Send first message
        var msgRes = await sb.from('chat_messages').insert({
            room_id: roomId,
            sender_type: 'customer',
            sender_name: name,
            message: msg
        }).select().single();

        // 3. Show chat
        showChatView();
        if (msgRes.data) sentMsgIds.add(msgRes.data.id);
        appendMessage({
            sender_type: 'customer',
            sender_name: name,
            message: msg,
            created_at: new Date().toISOString()
        });

        // 4. Start subscriptions
        startSubscriptions();

    } catch(err) {
        console.error('Chat create error:', err);
        showToast(t('createFail'), 'error');
    }
    btn.disabled = false;
};

// ===== Send Message =====
window.onSendMessage = async function() {
    var inp = document.getElementById('msgInput');
    var txt = inp.value.trim();
    if (!txt || !roomId) return;
    inp.value = '';
    inp.style.height = 'auto';

    // Optimistic render
    appendMessage({
        sender_type: 'customer',
        sender_name: customerName,
        message: txt,
        created_at: new Date().toISOString(),
        _optimistic: true
    });

    try {
        var res = await sb.from('chat_messages').insert({
            room_id: roomId,
            sender_type: 'customer',
            sender_name: customerName,
            message: txt
        }).select().single();

        if (res.data) sentMsgIds.add(res.data.id);
        if (res.error) throw res.error;

        // Update room timestamp
        sb.from('chat_rooms').update({ updated_at: new Date().toISOString() }).eq('id', roomId);
    } catch(err) {
        showToast(t('sendFail'), 'error');
    }
};

// ===== File Upload =====
window.onFileSelect = async function(e) {
    var files = e.target.files;
    if (!files || !files.length || !roomId) return;

    for (var i = 0; i < files.length; i++) {
        await uploadFile(files[i]);
    }
    e.target.value = '';
};

async function uploadFile(file) {
    if (file.size > 10 * 1024 * 1024) {
        showToast('Max 10MB', 'error');
        return;
    }

    var ext = file.name.split('.').pop().toLowerCase();
    var safeName = Date.now() + '-' + Math.random().toString(36).substr(2, 6) + '.' + ext;
    var path = 'room-' + roomId + '/' + safeName;

    try {
        var up = await sb.storage.from('chat-files').upload(path, file, { upsert: true });
        if (up.error) throw up.error;

        var url = sb.storage.from('chat-files').getPublicUrl(path).data.publicUrl;

        var res = await sb.from('chat_messages').insert({
            room_id: roomId,
            sender_type: 'customer',
            sender_name: customerName,
            message: '',
            file_url: url,
            file_name: file.name,
            file_type: file.type
        }).select().single();

        if (res.data) sentMsgIds.add(res.data.id);

        appendMessage({
            sender_type: 'customer',
            sender_name: customerName,
            message: '',
            file_url: url,
            file_name: file.name,
            file_type: file.type,
            created_at: new Date().toISOString()
        });
    } catch(err) {
        console.error('Upload error:', err);
        showToast(t('uploadFail'), 'error');
    }
}

// ===== Load Message History =====
async function loadMessages() {
    if (!roomId) return;

    try {
        // Load room status
        var roomRes = await sb.from('chat_rooms').select('status').eq('id', roomId).single();
        if (roomRes.data) {
            roomStatus = roomRes.data.status;
            updateStatusUI(roomStatus);
            if (roomStatus === 'closed') {
                showClosedUI();
            }
        }

        // Load messages
        var res = await sb.from('chat_messages').select('*')
            .eq('room_id', roomId)
            .order('created_at', { ascending: true })
            .limit(500);

        if (res.data) {
            var area = document.getElementById('chatMessages');
            area.innerHTML = '';
            res.data.forEach(function(m) {
                // Skip internal/admin memos
                if (m.sender_type === 'internal' || m.sender_type === 'admin_memo') return;
                sentMsgIds.add(m.id);
                appendMessage(m, false);
            });
            scrollToBottom();
        }
    } catch(err) {
        console.error('Load messages error:', err);
    }
}

// ===== Realtime Subscriptions =====
function startSubscriptions() {
    if (!roomId) return;

    // 1. Message subscription
    if (subscription) subscription.unsubscribe();
    subscription = sb.channel('lc-msg-' + roomId)
        .on('postgres_changes', {
            event: 'INSERT',
            schema: 'public',
            table: 'chat_messages',
            filter: 'room_id=eq.' + roomId
        }, function(payload) {
            var m = payload.new;
            // Skip own messages (already rendered optimistically)
            if (m.sender_type === 'customer') return;
            // Skip internal/memo
            if (m.sender_type === 'internal' || m.sender_type === 'admin_memo') return;

            appendMessage(m);
            playNotifySound();
            if (document.hidden) sendBrowserNotification(m);
        })
        .subscribe(function(status) {
            var banner = document.getElementById('connBanner');
            if (status === 'SUBSCRIBED') {
                banner.style.display = 'none';
                banner.className = 'conn-banner';
            } else if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') {
                banner.textContent = t('connLost');
                banner.className = 'conn-banner offline';
            }
        });

    // 2. Room status subscription
    if (roomSubscription) roomSubscription.unsubscribe();
    roomSubscription = sb.channel('lc-room-' + roomId)
        .on('postgres_changes', {
            event: 'UPDATE',
            schema: 'public',
            table: 'chat_rooms',
            filter: 'id=eq.' + roomId
        }, function(payload) {
            var room = payload.new;
            roomStatus = room.status;
            updateStatusUI(roomStatus);
            if (roomStatus === 'closed') {
                showClosedUI();
            }
        })
        .subscribe();
}

// ===== Status UI =====
function updateStatusUI(status) {
    var dot = document.getElementById('statusDot');
    var text = document.getElementById('statusText');
    dot.className = 'ch-status-dot ' + (status === 'active' ? 'active' : status === 'closed' ? 'closed' : 'waiting');

    if (status === 'active') text.textContent = t('statusActive');
    else if (status === 'closed') text.textContent = t('statusClosed');
    else text.textContent = t('statusWaiting');
}

function showClosedUI() {
    var inputArea = document.getElementById('chatInputArea');
    inputArea.innerHTML = '<button class="new-chat-btn" onclick="onNewChat()">' +
        '<i class="fa-solid fa-plus"></i> ' + t('newChatBtn') + '</button>';
}

window.onNewChat = function() {
    clearSession();
    if (subscription) subscription.unsubscribe();
    if (roomSubscription) roomSubscription.unsubscribe();
    sentMsgIds.clear();
    document.getElementById('chatMessages').innerHTML = '';
    roomStatus = 'waiting';

    // Restore input area
    document.getElementById('chatInputArea') || location.reload();
    location.reload();
};

// ===== Render Message =====
function appendMessage(m, scroll) {
    var area = document.getElementById('chatMessages');

    var isCustomer = m.sender_type === 'customer';
    var isSystem = m.sender_type === 'system' || m.sender_type === 'chatbot';
    var who = isSystem ? 'system' : (isCustomer ? 'customer' : 'manager');

    var time = '';
    if (m.created_at) {
        var locale = site.lang === 'ja' ? 'ja-JP' : site.lang === 'en' ? 'en-US' : 'ko-KR';
        time = new Date(m.created_at).toLocaleTimeString(locale, { hour: '2-digit', minute: '2-digit' });
    }

    var contentHtml = '';

    // File content
    if (m.file_url) {
        var isImage = m.file_type && m.file_type.startsWith('image/');
        if (isImage) {
            contentHtml = '<img class="msg-file-img" src="' + esc(m.file_url) + '" alt="' + esc(m.file_name || 'image') + '" onclick="window.open(this.src)">';
        } else {
            contentHtml = '<a class="msg-file-link" href="' + esc(m.file_url) + '" target="_blank" rel="noopener">' +
                '<i class="fa-solid fa-file-arrow-down"></i> ' + esc(m.file_name || 'file') + '</a>';
        }
    }

    // Text content
    if (m.message) {
        contentHtml += '<div class="msg-bubble">' + esc(m.message).replace(/\n/g, '<br>') + '</div>';
    } else if (!m.file_url) {
        return; // empty message with no file
    }

    var senderHtml = '';
    if (!isCustomer && !isSystem) {
        senderHtml = '<div class="msg-sender">' + esc(m.sender_name || t('manager')) + '</div>';
    }

    var html = '<div class="msg-row ' + who + '">' +
        senderHtml +
        contentHtml +
        (time ? '<div class="msg-time">' + time + '</div>' : '') +
        '</div>';

    area.insertAdjacentHTML('beforeend', html);
    if (scroll !== false) scrollToBottom();
}

// ===== Input Handlers =====
window.onMsgKeydown = function(e) {
    if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) {
        e.preventDefault();
        window.onSendMessage();
    }
};

window.autoGrow = function(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
};

// ===== Embed Close =====
window.closeEmbed = function() {
    if (window.parent !== window) {
        window.parent.postMessage('chameleon-chat-close', '*');
    }
};

// ===== Notification =====
function playNotifySound() {
    try {
        var ac = new (window.AudioContext || window.webkitAudioContext)();
        var osc = ac.createOscillator();
        var gain = ac.createGain();
        osc.connect(gain); gain.connect(ac.destination);
        osc.frequency.value = 800;
        gain.gain.value = 0.1;
        osc.start(); osc.stop(ac.currentTime + 0.15);
    } catch(e) {}
}

function sendBrowserNotification(m) {
    if (!('Notification' in window) || Notification.permission !== 'granted') return;
    try {
        new Notification(t('newMsg'), {
            body: m.message || t('fileReceived'),
            icon: '/favicon.ico',
            tag: 'livechat-' + roomId
        });
    } catch(e) {}
}

// ===== Helpers =====
function scrollToBottom() {
    requestAnimationFrame(function() {
        var area = document.getElementById('chatMessages');
        area.scrollTop = area.scrollHeight;
    });
}

function esc(s) {
    if (!s) return '';
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

function showToast(msg, type) {
    var el = document.getElementById('lcToast');
    el.textContent = msg;
    el.className = 'lc-toast' + (type ? ' ' + type : '');
    setTimeout(function() { el.classList.add('show'); }, 10);
    setTimeout(function() { el.classList.remove('show'); }, 3000);
}

// ===== Boot =====
if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
} else {
    init();
}

})();
</script>
