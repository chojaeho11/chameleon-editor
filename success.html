        // Edge Function 직접 호출 (Supabase JS 클라이언트 불필요)
        async function invokeFunction(fnName, body) {
            const res = await fetch(`${SUPABASE_URL}/functions/v1/${fnName}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${SUPABASE_KEY}`,
                    'apikey': SUPABASE_KEY,
                },
                body: JSON.stringify(body)
            });
            return await res.json();
        }

        // DB 업데이트 (REST API 직접 호출)
        async function updateOrder(dbId, updateData) {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/orders?id=eq.${dbId}`, {
                method: 'PATCH',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${SUPABASE_KEY}`,
                    'apikey': SUPABASE_KEY,
                    'Prefer': 'return=minimal'
                },
                body: JSON.stringify(updateData)
            });
            if (!res.ok) console.error("DB update failed:", res.status);
        }

        // [추천인] 카드결제 완료 후 추천인 적립
        async function creditReferralBonus(dbId, refId) {
            if (!refId) return;
            try {
                // 중복 체크
                const logRes = await fetch(`${SUPABASE_URL}/rest/v1/wallet_logs?user_id=eq.${refId}&type=eq.referral_bonus&description=ilike.*%23%23${dbId}%23%23*&select=id`, {
                    headers: { 'Authorization': `Bearer ${SUPABASE_KEY}`, 'apikey': SUPABASE_KEY }
                });
                const logs = await logRes.json();
                if (logs && logs.length > 0) return;

                // 주문 금액 + 주문자명 조회
                const orderRes = await fetch(`${SUPABASE_URL}/rest/v1/orders?id=eq.${dbId}&select=total_amount,manager_name`, {
                    headers: { 'Authorization': `Bearer ${SUPABASE_KEY}`, 'apikey': SUPABASE_KEY }
                });
                const [order] = await orderRes.json();
                if (!order || !order.total_amount) return;

                const bonus = Math.floor(order.total_amount * 0.05);
                if (bonus <= 0) return;
                const buyerName = order.manager_name || '고객';

                // 프로필 조회
                const pfRes = await fetch(`${SUPABASE_URL}/rest/v1/profiles?id=eq.${refId}&select=deposit`, {
                    headers: { 'Authorization': `Bearer ${SUPABASE_KEY}`, 'apikey': SUPABASE_KEY }
                });
                const [pf] = await pfRes.json();
                const newDeposit = (parseInt(pf?.deposit || 0)) + bonus;

                // deposit 업데이트
                await fetch(`${SUPABASE_URL}/rest/v1/profiles?id=eq.${refId}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUPABASE_KEY}`, 'apikey': SUPABASE_KEY, 'Prefer': 'return=minimal' },
                    body: JSON.stringify({ deposit: newDeposit })
                });

                // 로그 기록
                await fetch(`${SUPABASE_URL}/rest/v1/wallet_logs`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUPABASE_KEY}`, 'apikey': SUPABASE_KEY },
                    body: JSON.stringify({ user_id: refId, type: 'referral_bonus', amount: bonus, description: `##REFERRAL##${buyerName}##${dbId}##` })
                });
                console.log('[추천인] 적립 완료:', refId, '+' + bonus);
            } catch (e) {
                console.error('[추천인] 적립 오류:', e);
            }
        }

        function _fmtDate(d, lang) {
            var y = d.getFullYear(), m = d.getMonth() + 1, dd = d.getDate();
            if (lang === 'ja') return y + '年' + m + '月' + dd + '日';
            if (lang === 'en') return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][m-1] + ' ' + dd + ', ' + y;
            return y + '. ' + m + '. ' + dd + '.';
        }
        function _fmtAmt(krw, lang) {
            if (krw == null) return '-';
            if (lang === 'ja') return '¥' + Math.round(krw * 0.1).toLocaleString();
            if (lang === 'en') return '$' + (krw * 0.001).toFixed(2);
            return Number(krw).toLocaleString() + '원';
        }
        async function showPaymentSuccessModal(dbId) {
            var lang = _detectLang();
            var t = SUCCESS_I18N[lang] || SUCCESS_I18N.ko;
            // 주문 금액·생성일 조회
            var totalAmount = 0;
            var orderDate = new Date();
            try {
                var r = await fetch(SUPABASE_URL + '/rest/v1/orders?id=eq.' + encodeURIComponent(dbId) + '&select=total_amount,created_at', {
                    headers: { 'Authorization': 'Bearer ' + SUPABASE_KEY, 'apikey': SUPABASE_KEY }
                });
                var arr = await r.json();
                if (arr && arr[0]) {
                    totalAmount = arr[0].total_amount || 0;
                    if (arr[0].created_at) orderDate = new Date(arr[0].created_at);
                }
            } catch (e) { console.warn('[success] order fetch fail', e); }
            // ETA: 주문일 + 5 ~ 주문일 + 7
            var d1 = new Date(orderDate); d1.setDate(d1.getDate() + 5);
            var d2 = new Date(orderDate); d2.setDate(d2.getDate() + 7);
            var etaLow = _fmtDate(d1, lang);
            var etaHigh = _fmtDate(d2, lang);
            var orderDateTxt = _fmtDate(orderDate, lang);
            var amountTxt = _fmtAmt(totalAmount, lang);
            // 모달 DOM
            var overlay = document.createElement('div');
            overlay.id = 'paySuccessModal';
            overlay.style.cssText = 'position:fixed; inset:0; z-index:99999; background:rgba(15,23,42,0.85); display:flex; align-items:center; justify-content:center; padding:18px;';
            overlay.innerHTML =
                '<div style="background:linear-gradient(165deg,#1f2937 0%,#0f172a 100%); border:1px solid rgba(255,255,255,0.12); border-radius:20px; padding:30px 26px 24px; width:100%; max-width:460px; box-shadow:0 30px 70px -10px rgba(0,0,0,0.9); font-family:\'Pretendard Variable\',\'Pretendard\',\'Inter\',\'Noto Sans JP\',sans-serif; color:#fff;">'
              +   '<div style="display:flex; flex-direction:column; align-items:center; text-align:center; margin-bottom:18px;">'
              +     '<div style="width:74px; height:74px; border-radius:50%; background:linear-gradient(135deg,#10b981,#059669); display:flex; align-items:center; justify-content:center; box-shadow:0 12px 28px -8px rgba(16,185,129,0.7); margin-bottom:14px;">'
              +       '<svg viewBox="0 0 24 24" width="42" height="42" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>'
              +     '</div>'
              +     '<div style="font-size:18px; font-weight:900; color:#fde047; line-height:1.45; padding:0 8px;">' + t.title + '</div>'
              +     '<div style="font-size:13px; color:rgba(255,255,255,0.78); margin-top:8px; line-height:1.6; padding:0 4px;">' + t.sub + '</div>'
              +   '</div>'
              +   '<div style="background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.12); border-radius:14px; padding:18px 18px 14px;">'
              +     '<div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;">'
              +       '<div style="display:inline-block; padding:6px 14px; background:linear-gradient(135deg,#10b981,#059669); color:#fff; font-size:11.5px; font-weight:900; border-radius:50px;">' + t.received + '</div>'
              +       '<div style="font-size:11.5px; color:rgba(255,255,255,0.55); font-weight:700;">#' + dbId + '</div>'
              +     '</div>'
              +     '<div style="display:grid; grid-template-columns:auto 1fr; gap:8px 16px; font-size:13px;">'
              +       '<div style="color:#86efac; font-weight:700;">' + t.orderDate + '</div><div style="color:#fff; font-weight:700;">' + orderDateTxt + '</div>'
              +       '<div style="color:#86efac; font-weight:700;">' + t.amount + '</div><div style="color:#fff; font-weight:900;">' + amountTxt + '</div>'
              +       '<div style="color:#fde047; font-weight:800;">' + t.eta + '</div><div style="color:#fff; font-weight:900;">' + etaLow + ' 〜 ' + etaHigh + '</div>'
              +     '</div>'
              +   '</div>'
              +   '<div style="font-size:11.5px; color:rgba(255,255,255,0.58); margin:14px 4px 16px; line-height:1.6;">' + t.etaNote + '</div>'
              // 2026-06-18 v605: 영수증 이메일 수집 블록 — 전 언어 공용 (KR/JP/EN)
              +   ('<div id="receiptBlock" style="margin:0 0 16px; padding:16px 16px 14px; background:rgba(253,224,71,0.08); border:1px solid rgba(253,224,71,0.32); border-radius:12px;">'

                  +   '<div style="font-size:11.5px; color:rgba(255,255,255,0.78); line-height:1.55; margin-bottom:10px;">' + t.receiptSub + '</div>'
                  +   '<input id="receiptEmail" type="email" autocomplete="email" placeholder="' + t.receiptPlaceholder + '" style="width:100%; padding:11px 12px; border:1px solid rgba(255,255,255,0.18); border-radius:9px; font-size:13px; background:rgba(15,23,42,0.5); color:#fff; box-sizing:border-box; font-family:inherit; margin-bottom:8px;">'
                  +   '<button type="button" id="receiptSendBtn" style="width:100%; padding:11px; background:linear-gradient(135deg,#10b981,#059669); color:#fff; border:none; border-radius:9px; font-size:13px; font-weight:800; cursor:pointer; font-family:inherit;">' + t.receiptBtn + '</button>'

                  + '</div>'
                  )
              +   '<button type="button" id="paySuccessOk" style="width:100%; padding:14px; background:linear-gradient(135deg,#fde047,#eab308); color:#1f2937; border:none; border-radius:12px; font-size:15px; font-weight:900; cursor:pointer; box-shadow:0 8px 22px -6px rgba(234,179,8,0.65); font-family:inherit;">' + t.btn + '</button>'
              + '</div>';

            // 2026-06-18 v606: 영수증 자동 발송 (로그인 회원) + 수동 입력 폴백 (비회원)
            (function(){
                var INVALID_MSG = { ko:'올바른 이메일 주소를 입력해주세요', ja:'正しいメールアドレスを入力してください', en:'Please enter a valid email address' };
                var rBtn = document.getElementById('receiptSendBtn');
                var rIn = document.getElementById('receiptEmail');
                var rSt = document.getElementById('receiptStatus');
                var rBox = document.getElementById('receiptBlock');
                if (!rBtn || !rIn || !rSt || !rBox) return;

                // 수동 발송 (입력칸 + 버튼)
                async function manualSend() {
                    var em = (rIn.value || '').trim();
                    if (!em || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(em)) {
                        rSt.style.color = '#fca5a5';
                        rSt.textContent = INVALID_MSG[lang] || INVALID_MSG.ko;
                        return;
                    }
                    rBtn.disabled = true;
                    rSt.style.color = '#fde047';
                    rSt.textContent = t.receiptSending;
                    try {
                        var r = await fetch(SUPABASE_URL + '/functions/v1/send-order-receipt', {
                            method: 'POST',
                            headers: { 'Authorization':'Bearer ' + SUPABASE_KEY, 'apikey':SUPABASE_KEY, 'Content-Type':'application/json' },
                            body: JSON.stringify({ order_id: dbId, email: em, lang: lang })
                        });
                        var data = await r.json();
                        if (r.ok && data && data.ok) {
                            rSt.style.color = '#86efac';
                            rSt.textContent = t.receiptSent;
                            rBtn.style.opacity = '0.6';
                        } else {
                            rSt.style.color = '#fca5a5';
                            rSt.textContent = t.receiptFail + (data && data.error ? ' (' + data.error + ')' : '');
                            rBtn.disabled = false;
                        }
                    } catch(e) { rSt.style.color='#fca5a5'; rSt.textContent=t.receiptFail; rBtn.disabled=false; }
                }
                rBtn.addEventListener('click', manualSend);

                // 자동 발송 시도 (회원이면 가입 이메일로) — 모달 표시 직후 한 번
                (async function autoSend(){
                    // 입력칸+버튼 일단 가림
                    rIn.style.display = 'none';
                    rBtn.style.display = 'none';
                    rSt.style.color = '#fde047';
                    rSt.textContent = t.receiptSending;
                    try {
                        var r = await fetch(SUPABASE_URL + '/functions/v1/send-order-receipt', {
                            method: 'POST',
                            headers: { 'Authorization':'Bearer ' + SUPABASE_KEY, 'apikey':SUPABASE_KEY, 'Content-Type':'application/json' },
                            body: JSON.stringify({ order_id: dbId, lang: lang })
                        });
                        var data = await r.json();
                        if (r.ok && data && data.ok && data.email) {
                            // 회원 이메일 자동 발송 성공 — 결과 표시 + "다른 이메일로 받기" 토글 노출
                            rSt.style.color = '#86efac';
                            rSt.textContent = t.receiptAutoSent.replace('{email}', data.email);
                            // 다른 이메일로 받기 토글
                            var toggle = document.createElement('button');
                            toggle.type = 'button';
                            toggle.textContent = t.receiptOther;
                            toggle.style.cssText = 'margin-top:10px; background:transparent; color:rgba(255,255,255,0.65); border:1px solid rgba(255,255,255,0.25); border-radius:7px; padding:7px 12px; font-size:11.5px; cursor:pointer; font-family:inherit; width:100%;';
                            toggle.addEventListener('click', function(){
                                rIn.style.display = '';
                                rBtn.style.display = '';
                                rBtn.disabled = false;
                                rBtn.style.opacity = '1';
                                toggle.style.display = 'none';
                                rSt.textContent = '';
                                rIn.focus();
                            });
                            rBox.appendChild(toggle);
                        } else if (data && (data.error === 'no_email_available' || data.error === 'invalid email')) {

                            rBtn.style.display = '';
                            rSt.textContent = '';
                        } else {

                            rIn.style.display = '';
                            rBtn.style.display = '';
                            rSt.style.color = '#fca5a5';
                            rSt.textContent = t.receiptAutoFail;

                        rIn.style.display = '';
                        rBtn.style.display = '';
                        rSt.style.color = '#fca5a5';
                        rSt.textContent = t.receiptAutoFail;
                    }
                })();

                var btn = document.getElementById('paySuccessOk');

                    window.location.href = _frHome();
                    resolve();

        // 2026-05-16: 가맹점 스토어 경유 주문이면 홈 대신 가맹점 스토어로 복귀

            var f = '';

            if (f) return '/store/' + f;
            return "/" + (window.location.hostname.includes('cafe0101') ? '?lang=ja' : window.location.hostname.includes('cafe3355') ? '?lang=en' : '');
        }

        async function processSuccess() {
            const urlParams = new URLSearchParams(window.location.search);
            const dbId = urlParams.get("db_id");
            const sessionId = urlParams.get("session_id"); // Stripe
            const paymentKey = urlParams.get("paymentKey"); // Toss
            const refId = urlParams.get("ref_id"); // 추천인

            if (!dbId) {
                showToast("Missing order information.", "error");
                window.location.href = _frHome();
                return;
            }

            try {
                if (sessionId) {
                    // ====== Stripe 결제 확인 ======
                    console.log("Stripe session:", sessionId);

                    const data = await invokeFunction('verify-stripe-payment', {
                        session_id: sessionId, db_id: dbId
                    });

                    if (data.error) {
                        throw new Error(data.error);
                    }

                    // DB 업데이트
                    await updateOrder(dbId, {
                        status: '접수됨',
                        payment_status: '결제완료',
                        payment_method: 'Stripe Card',
                        toss_payment_key: sessionId
                    });

                } else if (paymentKey) {
                    // ====== Toss 결제 확인 ======
                    const orderId = urlParams.get("orderId");
                    const amount = urlParams.get("amount");

                    if (!orderId || !amount) {
                        throw new Error("Missing Toss payment parameters.");
                    }

                    console.log("Toss paymentKey:", paymentKey);

                    const data = await invokeFunction('confirm-payment', {
                        paymentKey, orderId, amount: Number(amount), dbId
                    });

                    if (data.error) {
                        throw new Error(data.error);
                    }

                    // confirm-payment이 DB 업데이트를 이미 처리함 (실제 결제수단 포함)
                    // 혹시 실패했을 때를 대비한 fallback
                    if (!data.paymentMethod) {
                        await updateOrder(dbId, {
                            status: '접수됨',
                            payment_status: '결제완료',
                            payment_method: '카드/간편결제',
                            toss_payment_key: paymentKey
                        });
                    }

                } else {
                    throw new Error("No payment verification data found.");
                }

                // ★ Drive 동기화: 브라우저측 핵심 트리거 (서버측 트리거는 backup)
                //   서버 fire-and-forget이 Edge Function 종료로 잘려나가는 케이스 대비
                //   sync-order-to-drive의 멱등성 체크가 중복 호출 자동 dedup
                try {
                    fetch(`${SUPABASE_URL}/functions/v1/sync-order-to-drive`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${SUPABASE_KEY}`,
                            'apikey': SUPABASE_KEY,
                        },
                        body: JSON.stringify({ order_id: dbId }),
                        keepalive: true  // 페이지 unload 후에도 fetch 완주
                    }).then(r => r.json())
                      .then(d => console.log('[drive sync] browser trigger:', d?.skipped || d?.customer_folder_url || d))
                      .catch(e => console.warn('[drive sync] browser trigger failed:', e?.message || e));
                } catch(e) { console.warn('[drive sync] browser enqueue failed:', e?.message || e); }

                // 추천인 적립
                if (refId) {
                    await creditReferralBonus(dbId, refId);
                }

                // Phase 3a: 디자인 마켓 입찰 결제 완료 마킹
                // 장바구니에 design_fee 아이템이 있었다면 해당 design_bids를 paid로 업데이트
                // 실패한 항목은 localStorage에 남겨서 design-market 페이지가 자동 재시도하게 함
                try {
                    const pending = JSON.parse(localStorage.getItem('dm_pending_design_bids') || '[]');
                    if (pending && pending.length > 0) {
                        // 현재 세션의 access token 확보 (RPC 호출용)
                        let accessToken = SUPABASE_KEY;
                        try {
                            // 키 후보들 시도 (Supabase JS는 sb-{ref}-auth-token 사용)
                            const candidates = [
                                'sb-qinvtnhiidtmrzosyvys-auth-token',
                                'supabase.auth.token'
                            ];
                            for (const k of candidates) {
                                const raw = localStorage.getItem(k);
                                if (!raw) continue;
                                try {
                                    const parsed = JSON.parse(raw);
                                    const tok = parsed?.access_token || parsed?.currentSession?.access_token;
                                    if (tok) { accessToken = tok; break; }
                                } catch(_) {}
                            }
                        } catch(_) {}

                        const stillPending = [];
                        for (const p of pending) {
                            let succeeded = false;
                            try {
                                const resp = await fetch(`${SUPABASE_URL}/rest/v1/rpc/mark_design_bid_paid`, {
                                    method: 'POST',
                                    headers: {
                                        'Content-Type': 'application/json',
                                        'Authorization': `Bearer ${accessToken}`,
                                        'apikey': SUPABASE_KEY
                                    },
                                    body: JSON.stringify({
                                        _bid_id: p.bidId,
                                        _method: 'cart',
                                        _order_id: parseInt(dbId, 10)
                                    })
                                });
                                if (resp.ok) {
                                    succeeded = true;
                                    console.log('[design-market] marked bid paid:', p.bidId);
                                } else {
                                    const txt = await resp.text();
                                    console.error('[design-market] mark paid HTTP', resp.status, txt);
                                }
                            } catch (dmErr) {
                                console.error('[design-market] mark paid fetch failed:', dmErr);
                            }
                            if (!succeeded) stillPending.push(p);
                        }
                        // 실패한 항목만 남기고 성공 항목은 제거
                        if (stillPending.length === 0) {
                            localStorage.removeItem('dm_pending_design_bids');
                        } else {
                            localStorage.setItem('dm_pending_design_bids', JSON.stringify(stillPending));
                        }
                    }
                } catch (dmOuterErr) {
                    console.error('[design-market] pending bids processing error:', dmOuterErr);
                }

                // 2026-06-14: 디자인 의뢰 — payment_pending → open 으로 flip
                //   submitDesignRequest 가 stash 한 request id 들을 REST PATCH 로 상태 변경.
                //   designer-board.html 은 status IN ('open','claimed') 만 노출하므로
                //   결제 전에는 보드에 노출되지 않고, 결제 완료 시점에만 등장한다.
                try {
                    const pendReq = JSON.parse(localStorage.getItem('dm_pending_design_requests') || '[]');
                    if (pendReq && pendReq.length > 0) {
                        // accessToken 은 위 design_bids 블록에서 확보된 값을 재사용
                        let _accessToken2 = SUPABASE_KEY;
                        try {
                            const _cands = ['sb-qinvtnhiidtmrzosyvys-auth-token','supabase.auth.token'];
                            for (const k of _cands) {
                                const raw = localStorage.getItem(k);
                                if (!raw) continue;
                                try {
                                    const parsed = JSON.parse(raw);
                                    const tok = parsed?.access_token || parsed?.currentSession?.access_token;
                                    if (tok) { _accessToken2 = tok; break; }
                                } catch(_) {}
                            }
                        } catch(_) {}
                        const stillPendReq = [];
                        for (const p of pendReq) {
                            let succeeded = false;
                            try {
                                const resp = await fetch(`${SUPABASE_URL}/rest/v1/design_requests?id=eq.${encodeURIComponent(p.requestId)}`, {
                                    method: 'PATCH',
                                    headers: {
                                        'Content-Type': 'application/json',
                                        'Authorization': `Bearer ${_accessToken2}`,
                                        'apikey': SUPABASE_KEY,
                                        'Prefer': 'return=minimal'
                                    },
                                    body: JSON.stringify({ status: 'open' })
                                });
                                if (resp.ok) {
                                    succeeded = true;
                                    console.log('[design-req] flipped to open:', p.requestId);
                                } else {
                                    const txt = await resp.text();
                                    console.error('[design-req] PATCH HTTP', resp.status, txt);
                                }
                            } catch (drErr) {
                                console.error('[design-req] PATCH fetch failed:', drErr);
                            }
                            if (!succeeded) stillPendReq.push(p);
                        }
                        if (stillPendReq.length === 0) {
                            localStorage.removeItem('dm_pending_design_requests');
                        } else {
                            localStorage.setItem('dm_pending_design_requests', JSON.stringify(stillPendReq));
                        }
                    }
                } catch (drOuterErr) {
                    console.error('[design-req] pending requests processing error:', drOuterErr);
                }

                // 결제 성공 처리
                document.getElementById('loader').style.display = 'none';
                document.getElementById('title').innerText = "";
                document.getElementById('desc').innerText = "";

                // 장바구니 비우기 (패브릭 cotton-printer.com 의 cp_cart_v1 포함)
                // 2026-05-22: 서버(cart_sync)까지 비워야 다음 방문 시 주문한 상품이 되살아나지 않음.
                try {
                    if (window._clearAllCart) { try { window._clearAllCart(); } catch(e) {} }
                    if (window.cartSync && window.cartSync.clearAll) { try { window.cartSync.clearAll(); } catch(e) {} }
                    localStorage.removeItem('chameleon_cart_current');
                    localStorage.removeItem('chameleon_cart_guest');
                    localStorage.removeItem('cp_cart_v1');
                    Object.keys(localStorage).forEach(key => {
                        if (key.startsWith('chameleon_cart_') || key.startsWith('cp_cart')) localStorage.removeItem(key);
                    });
                } catch(e) {}

                // 2026-06-17: 결제 완료 안내 모달 — 주문번호/결제일/결제금액/배송예정 표시.
                //   일본인 고객 특히 "결제됐는지 언제 오는지 잘 모르겠다" 문의 다발 → 명확한 안내.
                try { await showPaymentSuccessModal(dbId); }
                catch (mErr) { console.warn('[success modal]', mErr); window.location.href = _frHome(); }

            } catch (e) {
                console.error("Payment verification error:", e);

                // ★ 결제 승인 실패 시: paymentKey는 승인 전에 발급되므로
                //   paymentKey가 있다고 결제 성공이 아님. DB를 결제완료로 변경하지 않음.
                if (paymentKey && dbId) {
                    try {
                        // 승인 실패 상태를 DB에 기록 (결제완료가 아닌 미결제 유지 + 에러 로그)
                        await updateOrder(dbId, {
                            payment_status: '결제실패',
                            payment_method: '카드결제실패',
                            toss_payment_key: paymentKey
                        });
                        console.error("★ confirm-payment 실패 — 결제 미승인 상태, DB에 결제실패로 기록");
                    } catch (updateErr) {
                        console.error("DB 업데이트도 실패:", updateErr);
                    }
                }

                if (sessionId && dbId) {
                    try {
                        await updateOrder(dbId, {
                            payment_status: '결제실패',
                            payment_method: 'Stripe결제실패',
                            toss_payment_key: sessionId
                        });
                        console.error("★ verify-stripe 실패 — 결제 미승인 상태");
                    } catch (updateErr) {
                        console.error("DB 업데이트도 실패:", updateErr);
                    }
                }

                document.getElementById('loader').style.display = 'none';
                document.getElementById('title').innerText = "결제 승인 실패";
                document.getElementById('desc').innerText = e.message || "결제 승인에 실패했습니다. 다시 시도해주세요.";

                setTimeout(() => {
                    showToast("결제 승인에 실패했습니다. 카드 정보를 확인 후 다시 시도해주세요.", "error");
                    window.location.href = _frHome();
                }, 3000);
            }
        }

        processSuccess();
    </script>

    <!-- Google Ads tag (결제완료 전환 + 리마케팅) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=AW-11349651713"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'AW-11349651713');
      // 2026-06-09: 결제 완료 전환 — hostname 기반 자동 통화 감지 (KRW/JPY/USD).
      //   Toss (KR): URL ?amount= 는 KRW. Stripe (JP/US): URL 에 amount 없어 DB total_amount fetch 후 환산.
      //   이전 버그: 모든 사이트 KRW 하드코딩 → JP/US 전환 가치 0으로 보고됨.
      (async function _fireConv() {
          try {
              var p = new URLSearchParams(window.location.search);
              var _dbId = p.get('db_id');
              var _pKey = p.get('paymentKey');
              var _sId  = p.get('session_id');
              if (!_dbId || (!_pKey && !_sId)) return;
              var _host = (location.hostname || '').toLowerCase();
              var _country = (_host.indexOf('cafe0101') >= 0 || _host.indexOf('cotton-printer') >= 0) ? 'JP'
                           : (_host.indexOf('cafe3355') >= 0 || _host.indexOf('chameleon.design') >= 0) ? 'US'
                           : 'KR';
              var _rateMap = { KR:1, JP:0.1, US:0.001 };
              var _rate = _rateMap[_country] || 1;
              var _curr = _country === 'JP' ? 'JPY' : _country === 'US' ? 'USD' : 'KRW';
              var _value = 0;
              if (_pKey) {
                  // Toss — URL amount 그대로 (KRW). KR 전용 게이트웨이.
                  _value = parseFloat(p.get('amount')) || 0;
              } else {
                  // Stripe — DB 에서 total_amount (KRW) fetch 후 local 통화로 환산.
                  try {
                      var _r = await fetch(SUPABASE_URL + '/rest/v1/orders?id=eq.' + encodeURIComponent(_dbId) + '&select=total_amount', {
                          headers: { 'Authorization':'Bearer '+SUPABASE_KEY, 'apikey':SUPABASE_KEY }
                      });
                      var _arr = await _r.json();
                      var _ord = _arr && _arr[0];
                      var _krw = (_ord && Number(_ord.total_amount)) || 0;
                      _value = Math.round(_krw * _rate * 100) / 100;
                  } catch(e) { console.warn('[gtag conv] DB fetch fail', e); }
              }
              if (typeof gtag === 'function' && _value > 0) {
                  gtag('event', 'conversion', {
                      'send_to': 'AW-11349651713/purchase',
                      'value': _value,
                      'currency': _curr,
                      'transaction_id': _dbId
                  });
                  console.log('[gtag conv] sent', { value:_value, currency:_curr, country:_country });
              }
          } catch(e) { console.warn('[gtag conv] fail', e); }
      })();
    </script>
