<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>결제 처리 중...</title>
    <style>
        body { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'Pretendard', sans-serif; background-color: #f8fafc; color: #334155; }
        .loader { border: 4px solid #e2e8f0; border-top: 4px solid #6366f1; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <script src="toast.js?v=123"></script>
    <div class="loader" id="loader"></div>
    <h2 id="title">Processing Payment...</h2>
    <p id="desc">Please wait a moment.</p>

    <script>
        // Supabase 설정 (fetch 직접 호출 - Tracking Prevention 우회)
        const SUPABASE_URL = 'https://qinvtnhiidtmrzosyvys.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFpbnZ0bmhpaWR0bXJ6b3N5dnlzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjMyMDE3NjQsImV4cCI6MjA3ODc3Nzc2NH0.3z0f7R4w3bqXTOMTi19ksKSeAkx8HOOTONNSos8Xz8Y';

        // Edge Function 직접 호출 (Supabase JS 클라이언트 불필요)
        async function invokeFunction(fnName, body) {
            const res = await fetch(`${SUPABASE_URL}/functions/v1/${fnName}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${SUPABASE_KEY}`,
                    'apikey': SUPABASE_KEY,
                },
                body: JSON.stringify(body)
            });
            return await res.json();
        }

        // DB 업데이트 (REST API 직접 호출)
        async function updateOrder(dbId, updateData) {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/orders?id=eq.${dbId}`, {
                method: 'PATCH',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${SUPABASE_KEY}`,
                    'apikey': SUPABASE_KEY,
                    'Prefer': 'return=minimal'
                },
                body: JSON.stringify(updateData)
            });
            if (!res.ok) console.error("DB update failed:", res.status);
        }

        // [추천인] 카드결제 완료 후 추천인 적립
        async function creditReferralBonus(dbId, refId) {
            if (!refId) return;
            try {
                // 중복 체크
                const logRes = await fetch(`${SUPABASE_URL}/rest/v1/wallet_logs?user_id=eq.${refId}&type=eq.referral_bonus&description=ilike.*%23%23${dbId}%23%23*&select=id`, {
                    headers: { 'Authorization': `Bearer ${SUPABASE_KEY}`, 'apikey': SUPABASE_KEY }
                });
                const logs = await logRes.json();
                if (logs && logs.length > 0) return;

                // 주문 금액 + 주문자명 조회
                const orderRes = await fetch(`${SUPABASE_URL}/rest/v1/orders?id=eq.${dbId}&select=total_amount,manager_name`, {
                    headers: { 'Authorization': `Bearer ${SUPABASE_KEY}`, 'apikey': SUPABASE_KEY }
                });
                const [order] = await orderRes.json();
                if (!order || !order.total_amount) return;

                const bonus = Math.floor(order.total_amount * 0.05);
                if (bonus <= 0) return;
                const buyerName = order.manager_name || '고객';

                // 프로필 조회
                const pfRes = await fetch(`${SUPABASE_URL}/rest/v1/profiles?id=eq.${refId}&select=deposit`, {
                    headers: { 'Authorization': `Bearer ${SUPABASE_KEY}`, 'apikey': SUPABASE_KEY }
                });
                const [pf] = await pfRes.json();
                const newDeposit = (parseInt(pf?.deposit || 0)) + bonus;

                // deposit 업데이트
                await fetch(`${SUPABASE_URL}/rest/v1/profiles?id=eq.${refId}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUPABASE_KEY}`, 'apikey': SUPABASE_KEY, 'Prefer': 'return=minimal' },
                    body: JSON.stringify({ deposit: newDeposit })
                });

                // 로그 기록
                await fetch(`${SUPABASE_URL}/rest/v1/wallet_logs`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUPABASE_KEY}`, 'apikey': SUPABASE_KEY },
                    body: JSON.stringify({ user_id: refId, type: 'referral_bonus', amount: bonus, description: `##REFERRAL##${buyerName}##${dbId}##` })
                });
                console.log('[추천인] 적립 완료:', refId, '+' + bonus);
            } catch (e) {
                console.error('[추천인] 적립 오류:', e);
            }
        }

        async function processSuccess() {
            const urlParams = new URLSearchParams(window.location.search);
            const dbId = urlParams.get("db_id");
            const sessionId = urlParams.get("session_id"); // Stripe
            const paymentKey = urlParams.get("paymentKey"); // Toss
            const refId = urlParams.get("ref_id"); // 추천인

            if (!dbId) {
                showToast("Missing order information.", "error");
                window.location.href = "/" + (window.location.hostname.includes('cafe0101') ? '?lang=ja' : window.location.hostname.includes('cafe3355') ? '?lang=en' : '');
                return;
            }

            try {
                if (sessionId) {
                    // ====== Stripe 결제 확인 ======
                    console.log("Stripe session:", sessionId);

                    const data = await invokeFunction('verify-stripe-payment', {
                        session_id: sessionId, db_id: dbId
                    });

                    if (data.error) {
                        throw new Error(data.error);
                    }

                    // DB 업데이트
                    await updateOrder(dbId, {
                        status: '접수됨',
                        payment_status: '결제완료',
                        payment_method: 'Stripe Card',
                        toss_payment_key: sessionId
                    });

                } else if (paymentKey) {
                    // ====== Toss 결제 확인 ======
                    const orderId = urlParams.get("orderId");
                    const amount = urlParams.get("amount");

                    if (!orderId || !amount) {
                        throw new Error("Missing Toss payment parameters.");
                    }

                    console.log("Toss paymentKey:", paymentKey);

                    const data = await invokeFunction('confirm-payment', {
                        paymentKey, orderId, amount: Number(amount), dbId
                    });

                    if (data.error) {
                        throw new Error(data.error);
                    }

                    // confirm-payment이 DB 업데이트를 이미 처리함 (실제 결제수단 포함)
                    // 혹시 실패했을 때를 대비한 fallback
                    if (!data.paymentMethod) {
                        await updateOrder(dbId, {
                            status: '접수됨',
                            payment_status: '결제완료',
                            payment_method: '카드/간편결제',
                            toss_payment_key: paymentKey
                        });
                    }

                } else {
                    throw new Error("No payment verification data found.");
                }

                // ★ Drive 동기화: 브라우저측 핵심 트리거 (서버측 트리거는 backup)
                //   서버 fire-and-forget이 Edge Function 종료로 잘려나가는 케이스 대비
                //   sync-order-to-drive의 멱등성 체크가 중복 호출 자동 dedup
                try {
                    fetch(`${SUPABASE_URL}/functions/v1/sync-order-to-drive`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${SUPABASE_KEY}`,
                            'apikey': SUPABASE_KEY,
                        },
                        body: JSON.stringify({ order_id: dbId }),
                        keepalive: true  // 페이지 unload 후에도 fetch 완주
                    }).then(r => r.json())
                      .then(d => console.log('[drive sync] browser trigger:', d?.skipped || d?.customer_folder_url || d))
                      .catch(e => console.warn('[drive sync] browser trigger failed:', e?.message || e));
                } catch(e) { console.warn('[drive sync] browser enqueue failed:', e?.message || e); }

                // 추천인 적립
                if (refId) {
                    await creditReferralBonus(dbId, refId);
                }

                // Phase 3a: 디자인 마켓 입찰 결제 완료 마킹
                // 장바구니에 design_fee 아이템이 있었다면 해당 design_bids를 paid로 업데이트
                // 실패한 항목은 localStorage에 남겨서 design-market 페이지가 자동 재시도하게 함
                try {
                    const pending = JSON.parse(localStorage.getItem('dm_pending_design_bids') || '[]');
                    if (pending && pending.length > 0) {
                        // 현재 세션의 access token 확보 (RPC 호출용)
                        let accessToken = SUPABASE_KEY;
                        try {
                            // 키 후보들 시도 (Supabase JS는 sb-{ref}-auth-token 사용)
                            const candidates = [
                                'sb-qinvtnhiidtmrzosyvys-auth-token',
                                'supabase.auth.token'
                            ];
                            for (const k of candidates) {
                                const raw = localStorage.getItem(k);
                                if (!raw) continue;
                                try {
                                    const parsed = JSON.parse(raw);
                                    const tok = parsed?.access_token || parsed?.currentSession?.access_token;
                                    if (tok) { accessToken = tok; break; }
                                } catch(_) {}
                            }
                        } catch(_) {}

                        const stillPending = [];
                        for (const p of pending) {
                            let succeeded = false;
                            try {
                                const resp = await fetch(`${SUPABASE_URL}/rest/v1/rpc/mark_design_bid_paid`, {
                                    method: 'POST',
                                    headers: {
                                        'Content-Type': 'application/json',
                                        'Authorization': `Bearer ${accessToken}`,
                                        'apikey': SUPABASE_KEY
                                    },
                                    body: JSON.stringify({
                                        _bid_id: p.bidId,
                                        _method: 'cart',
                                        _order_id: parseInt(dbId, 10)
                                    })
                                });
                                if (resp.ok) {
                                    succeeded = true;
                                    console.log('[design-market] marked bid paid:', p.bidId);
                                } else {
                                    const txt = await resp.text();
                                    console.error('[design-market] mark paid HTTP', resp.status, txt);
                                }
                            } catch (dmErr) {
                                console.error('[design-market] mark paid fetch failed:', dmErr);
                            }
                            if (!succeeded) stillPending.push(p);
                        }
                        // 실패한 항목만 남기고 성공 항목은 제거
                        if (stillPending.length === 0) {
                            localStorage.removeItem('dm_pending_design_bids');
                        } else {
                            localStorage.setItem('dm_pending_design_bids', JSON.stringify(stillPending));
                        }
                    }
                } catch (dmOuterErr) {
                    console.error('[design-market] pending bids processing error:', dmOuterErr);
                }

                // 결제 성공 처리
                document.getElementById('loader').style.display = 'none';
                document.getElementById('title').innerText = "Payment Successful!";
                document.getElementById('desc').innerText = "Redirecting...";

                // 장바구니 비우기
                try {
                    localStorage.removeItem('chameleon_cart_current');
                    localStorage.removeItem('chameleon_cart_guest');
                    Object.keys(localStorage).forEach(key => {
                        if (key.startsWith('chameleon_cart_')) localStorage.removeItem(key);
                    });
                } catch(e) {}

                setTimeout(() => window.location.href = "index.html", 1500);

            } catch (e) {
                console.error("Payment verification error:", e);

                // ★ 결제 승인 실패 시: paymentKey는 승인 전에 발급되므로
                //   paymentKey가 있다고 결제 성공이 아님. DB를 결제완료로 변경하지 않음.
                if (paymentKey && dbId) {
                    try {
                        // 승인 실패 상태를 DB에 기록 (결제완료가 아닌 미결제 유지 + 에러 로그)
                        await updateOrder(dbId, {
                            payment_status: '결제실패',
                            payment_method: '카드결제실패',
                            toss_payment_key: paymentKey
                        });
                        console.error("★ confirm-payment 실패 — 결제 미승인 상태, DB에 결제실패로 기록");
                    } catch (updateErr) {
                        console.error("DB 업데이트도 실패:", updateErr);
                    }
                }

                if (sessionId && dbId) {
                    try {
                        await updateOrder(dbId, {
                            payment_status: '결제실패',
                            payment_method: 'Stripe결제실패',
                            toss_payment_key: sessionId
                        });
                        console.error("★ verify-stripe 실패 — 결제 미승인 상태");
                    } catch (updateErr) {
                        console.error("DB 업데이트도 실패:", updateErr);
                    }
                }

                document.getElementById('loader').style.display = 'none';
                document.getElementById('title').innerText = "결제 승인 실패";
                document.getElementById('desc').innerText = e.message || "결제 승인에 실패했습니다. 다시 시도해주세요.";

                setTimeout(() => {
                    showToast("결제 승인에 실패했습니다. 카드 정보를 확인 후 다시 시도해주세요.", "error");
                    window.location.href = "/" + (window.location.hostname.includes('cafe0101') ? '?lang=ja' : window.location.hostname.includes('cafe3355') ? '?lang=en' : '');
                }, 3000);
            }
        }

        processSuccess();
    </script>

    <!-- Google Ads tag (결제완료 전환 + 리마케팅) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=AW-11349651713"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'AW-11349651713');
      // 결제 완료 전환 이벤트
      var params = new URLSearchParams(window.location.search);
      if (params.get('db_id') && (params.get('paymentKey') || params.get('session_id'))) {
          gtag('event', 'conversion', {
              'send_to': 'AW-11349651713/purchase',
              'value': parseFloat(params.get('amount')) || 0,
              'currency': 'KRW',
              'transaction_id': params.get('db_id')
          });
      }
    </script>
</body>
</html>
